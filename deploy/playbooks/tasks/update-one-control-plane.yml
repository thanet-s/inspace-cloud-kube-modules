---
- name: Copy operator RKE2 configuration to {{ deploy_control_plane.name }}
  ansible.builtin.command:
    argv:
      - scp
      - -F
      - "{{ deploy_state_dir }}/ssh-config"
      - "{{ deploy_state_dir }}/control-plane-extra-config.yaml"
      - "inspace-cp{{ deploy_cp_index }}:/tmp/90-inspace-operator.yaml"
  changed_when: false

- name: Copy the fixed config installer to {{ deploy_control_plane.name }}
  ansible.builtin.command:
    argv:
      - scp
      - -F
      - "{{ deploy_state_dir }}/ssh-config"
      - "{{ deploy_state_dir }}/apply-control-plane-config.sh"
      - "inspace-cp{{ deploy_cp_index }}:/tmp/inspace-apply-control-plane-config.sh"
  changed_when: false

- name: Install operator RKE2 configuration and restart only when changed
  ansible.builtin.command:
    argv:
      - ssh
      - -F
      - "{{ deploy_state_dir }}/ssh-config"
      - "inspace-cp{{ deploy_cp_index }}"
      - "sudo sh /tmp/inspace-apply-control-plane-config.sh"
  register: deploy_control_plane_config_update
  changed_when: deploy_control_plane_config_update.stdout == 'changed'

- name: Wait for the restarted local RKE2 API on {{ deploy_control_plane.name }}
  ansible.builtin.command:
    argv:
      - ssh
      - -F
      - "{{ deploy_state_dir }}/ssh-config"
      - "inspace-cp{{ deploy_cp_index }}"
      - >-
        sudo /var/lib/rancher/rke2/bin/kubectl
        --kubeconfig /etc/rancher/rke2/rke2.yaml
        --request-timeout=10s get --raw=/readyz
  register: deploy_local_rke2_ready
  changed_when: false
  retries: 120
  delay: 5
  until: deploy_local_rke2_ready.rc == 0

- name: Wait for {{ deploy_control_plane.name }} to become Ready after its rolling update
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ deploy_state_dir }}/kubeconfig.yaml"
      - wait
      - --for=condition=Ready
      - "node/{{ deploy_control_plane.name }}"
      - --timeout=15m
  changed_when: false

- name: Require the private API to recover before updating the next server
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ deploy_state_dir }}/kubeconfig.yaml"
      - --request-timeout=10s
      - get
      - --raw=/readyz
  register: deploy_control_plane_api_recovery
  changed_when: false
  retries: 60
  delay: 5
  until: deploy_control_plane_api_recovery.rc == 0
