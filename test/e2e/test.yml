---
- name: Attach to an initialized RKE2 E2E cluster
  hosts: localhost
  gather_facts: false
  tags:
    - e2e-attach
  vars:
    e2e_state_dir: "{{ lookup('env', 'E2E_STATE_DIR') }}"
    e2e_state_file: "{{ lookup('env', 'E2E_STATE_DIR') }}/state.json"
    e2e_kubeconfig: "{{ lookup('env', 'E2E_STATE_DIR') }}/kubeconfig.yaml"
    e2e_ssh_config: "{{ lookup('env', 'E2E_STATE_DIR') }}/ssh-config"
    e2e_attach_requires_initialized: "{{ e2e_attach_require_initialized | default(true) | bool }}"
  environment:
    KUBECONFIG: "{{ e2e_kubeconfig }}"
  tasks:
    - name: Require the durable initialization journal
      ansible.builtin.stat:
        path: "{{ e2e_state_file }}"
      register: e2e_attach_state_stat

    - name: Refuse to attach without an ownership journal
      ansible.builtin.assert:
        that: e2e_attach_state_stat.stat.exists
        fail_msg: "The selected E2E run has no ownership journal; initialize a cluster first."

    - name: Load the initialized cluster topology
      ansible.builtin.set_fact:
        e2e_attach_state: "{{ lookup('file', e2e_state_file) | from_json }}"

    - name: Inspect durable access files
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "{{ e2e_kubeconfig }}"
        - "{{ e2e_state_dir }}/known-hosts-bastion"
        - "{{ e2e_state_dir }}/bootstrap-cache-key"
        - "{{ e2e_state_dir }}/bootstrap-cache-not-before"
      register: e2e_attach_access_files

    - name: Validate the exact reusable cluster identity
      ansible.builtin.assert:
        that:
          - e2e_attach_state.runID == lookup('env', 'E2E_RUN_ID')
          - e2e_attach_state.version == lookup('env', 'INSPACE_E2E_VERSION')
          - e2e_attach_state.controlPlanes | default([]) | length == 3
          - not e2e_attach_requires_initialized or (e2e_attach_state.initComplete | default(false) | bool)
          - not e2e_attach_requires_initialized or (e2e_attach_state.workerVMs | default([]) | length == 1)
          - e2e_attach_state.bastionPublicIPv4 | default('') | length > 0
          - e2e_attach_state.bastionPrivateIPv4 | default('') | length > 0
          - e2e_attach_state.virtualIPv4 | default('') | length > 0
          - e2e_attach_state.bootstrapCacheAddress == e2e_attach_state.bastionPrivateIPv4
          - e2e_attach_state.bootstrapCacheRegistry == 'cache.' + e2e_attach_state.clusterName + '.inspace.internal:8443'
          - e2e_attach_state.bootstrapCacheEndpoint == 'https://' + e2e_attach_state.bootstrapCacheRegistry
          - e2e_attach_state.bootstrapCacheCABundle is match('^-----BEGIN CERTIFICATE-----\n')
          - e2e_attach_access_files.results | selectattr('stat.exists') | list | length == 4
        fail_msg: >-
          The selected run lacks the required cluster access facts or, for a
          test phase, is not completely initialized.

    - name: Rebuild the container-local SSH topology
      ansible.builtin.command:
        argv:
          - /opt/e2e/scripts/render-ssh-config.py
          - --state
          - "{{ e2e_state_file }}"
          - --output
          - "{{ e2e_ssh_config }}"
      changed_when: true

    - name: Recreate the dynamic bastion inventory host
      ansible.builtin.add_host:
        name: e2e-bastion
        groups: rke2_bastion
        ansible_host: e2e-bastion
        ansible_user: "{{ e2e_attach_state.sshUsername }}"
        ansible_ssh_common_args: "-F {{ e2e_ssh_config }}"
        e2e_public_ip: "{{ e2e_attach_state.bastionPublicIPv4 }}"
        e2e_private_ip: "{{ e2e_attach_state.bastionPrivateIPv4 }}"
        e2e_node_name: "{{ e2e_attach_state.bastionName }}"

    - name: Normalize the persisted kubeconfig for the container-local tunnel
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig
          - "{{ e2e_kubeconfig }}"
          - config
          - set-cluster
          - default
          - --server=https://127.0.0.1:16443
          - "--tls-server-name={{ e2e_attach_state.virtualIPv4 }}"
      changed_when: true

    - name: Re-establish the private API tunnel through the bastion
      ansible.builtin.command:
        argv: [/opt/e2e/scripts/api-tunnel.sh, start, "{{ e2e_state_file }}"]
      changed_when: true

    - name: Wait for the selected cluster API through the tunnel
      ansible.builtin.command:
        argv: [kubectl, --request-timeout=10s, get, --raw=/readyz]
      register: e2e_attach_readyz
      changed_when: false
      retries: 60
      delay: 5
      until: e2e_attach_readyz.rc == 0

- name: Prepare the initialized cluster for a repeatable acceptance run
  hosts: localhost
  gather_facts: false
  tags:
    - e2e-test
  vars:
    e2e_state_dir: "{{ lookup('env', 'E2E_STATE_DIR') }}"
    e2e_state_file: "{{ lookup('env', 'E2E_STATE_DIR') }}/state.json"
    e2e_kubeconfig: "{{ lookup('env', 'E2E_STATE_DIR') }}/kubeconfig.yaml"
    e2e_baseline_inventory_file: "{{ lookup('env', 'E2E_STATE_DIR') }}/baseline-inventory.json"
    e2e_state: "{{ lookup('file', lookup('env', 'E2E_STATE_DIR') + '/state.json') | from_json }}"
  environment:
    KUBECONFIG: "{{ e2e_kubeconfig }}"
  tasks:
    - name: Mark the acceptance attempt incomplete before mutation
      ansible.builtin.command:
        argv:
          - /opt/e2e/scripts/state-update.py
          - "{{ e2e_state_file }}"
          - testComplete
          - "false"
      changed_when: true

    - name: Mark the combined lifecycle incomplete before acceptance
      ansible.builtin.command:
        argv:
          - /opt/e2e/scripts/state-update.py
          - "{{ e2e_state_file }}"
          - completed
          - "false"
      changed_when: true

    - name: Remove stale acceptance scratch state
      ansible.builtin.file:
        path: "{{ e2e_state_dir }}/{{ item }}"
        state: absent
      loop:
        - old-pod
        - node-load-balancer-baseline.json
        - node-load-balancer.yaml
        - node-load-balancer-expansion.yaml
        - public-node-local-capacity.yaml
        - public-node-local-service.yaml
        - public-node-local-present.json

    - name: Heal state left by an interrupted acceptance run
      ansible.builtin.shell: |
        set -euo pipefail
        while IFS= read -r node; do
          test -z "$node" || kubectl label node "$node" inspace.cloud/l2-announcement-disabled-
        done < <(kubectl get nodes -o json | jq -r '
          .items[] |
          select(.metadata.labels["inspace.cloud/l2-announcement-disabled"] != null) |
          .metadata.name')
        while IFS= read -r node; do
          test -z "$node" || kubectl label node "$node" node.kubernetes.io/exclude-from-external-load-balancers-
        done < <(kubectl get nodes -o json | jq -r '
          .items[] |
          select(.metadata.labels["node.kubernetes.io/exclude-from-external-load-balancers"] != null) |
          .metadata.name')
        if kubectl -n default get service inspace-e2e-web >/dev/null 2>&1; then
          kubectl -n default label service inspace-e2e-web \
            inspace.cloud/load-balancer-scope=public --overwrite
          kubectl -n default annotate service inspace-e2e-web \
            service.beta.kubernetes.io/inspace-load-balancer-public=true --overwrite
        fi
        if kubectl -n default get deployment inspace-e2e-web >/dev/null 2>&1; then
          kubectl -n default scale deployment/inspace-e2e-web --replicas=1
        fi
      args:
        executable: /bin/bash
      changed_when: true

    - name: Wait for the released controllers before acceptance
      ansible.builtin.command:
        argv: [kubectl, -n, kube-system, rollout, status, "{{ item }}", --timeout=10m]
      loop:
        - deployment/inspace-ccm
        - deployment/inspace-csi-controller
        - daemonset/inspace-csi-node
        - deployment/inspace-karpenter
        - daemonset/cilium
      changed_when: false

    - name: Remove stale paid and Node-LB acceptance owners
      ansible.builtin.command:
        argv:
          - kubectl
          - -n
          - default
          - delete
          - service/inspace-e2e-web
          - deployment/inspace-e2e-node-lb
          - deployment/inspace-e2e-public-local
          - service/inspace-e2e-node-traefik
          - service/inspace-e2e-node-shared-b
          - service/inspace-e2e-node-shared-conflict
          - service/inspace-e2e-node-dedicated
          - service/inspace-e2e-public-local
          - --ignore-not-found
          - --wait=false
      changed_when: true

    - name: Wait for the stale public-node-local Service firewall owner to disappear
      ansible.builtin.shell: |
        set -euo pipefail
        test -z "$(kubectl -n default get service/inspace-e2e-public-local --ignore-not-found -o name)"
      args:
        executable: /bin/bash
      register: e2e_stale_public_local_service_cleanup
      changed_when: false
      retries: 180
      delay: 10
      until: e2e_stale_public_local_service_cleanup.rc == 0

    - name: Wait for the stale paid public Service owner to disappear
      ansible.builtin.shell: |
        set -euo pipefail
        test -z "$(kubectl -n default get service/inspace-e2e-web --ignore-not-found -o name)"
      args:
        executable: /bin/bash
      register: e2e_stale_paid_service_cleanup
      changed_when: false
      retries: 180
      delay: 10
      until: e2e_stale_paid_service_cleanup.rc == 0

    - name: Require stale paid NLB inventory to return to the immutable account baseline
      ansible.builtin.command:
        argv:
          - /opt/e2e/scripts/verify-service-cloud.py
          - --state
          - "{{ e2e_state_file }}"
          - --immutable-baseline
          - "{{ e2e_baseline_inventory_file }}"
          - --public
          - absent
      register: e2e_stale_paid_nlb_cleanup
      changed_when: false
      retries: 180
      delay: 10
      until: e2e_stale_paid_nlb_cleanup.rc == 0
      no_log: true

    - name: Wait for stale Node-LB cloud and Kubernetes owners to quiesce
      ansible.builtin.command:
        argv:
          - /opt/e2e/scripts/verify-node-load-balancer.py
          - --state
          - "{{ e2e_state_file }}"
          - --kubeconfig
          - "{{ e2e_kubeconfig }}"
          - --expect
          - absent
          - --immutable-baseline
          - "{{ e2e_baseline_inventory_file }}"
      register: e2e_stale_node_lb_cleanup
      changed_when: false
      retries: 180
      delay: 10
      until: e2e_stale_node_lb_cleanup.rc == 0
      no_log: true

    - name: Delete a stale generated Node-LB NodeClass
      ansible.builtin.command:
        argv:
          - kubectl
          - delete
          - inspacenodeclass
          - -l
          - "inspace.cloud/node-lb-managed=true,inspace.cloud/node-lb-cluster={{ e2e_state.clusterName }}"
          - --ignore-not-found
          - --wait=true
          - --timeout=5m
      changed_when: true

    - name: Delete stale public-node-local static capacity after Service cleanup
      ansible.builtin.command:
        argv:
          - kubectl
          - delete
          - nodepool
          - "{{ e2e_state.publicLocalNodePoolName }}"
          - --ignore-not-found
          - --wait=false
      changed_when: true

    - name: Wait for stale public-node-local NodeClaims and Nodes to disappear
      ansible.builtin.shell: |
        set -euo pipefail
        pool={{ e2e_state.publicLocalNodePoolName | quote }}
        test "$(kubectl get nodeclaims -l "karpenter.sh/nodepool=$pool" -o json | jq '.items | length')" -eq 0
        test "$(kubectl get nodes -l "karpenter.sh/nodepool=$pool" -o json | jq '.items | length')" -eq 0
        test -z "$(kubectl get nodepool "$pool" --ignore-not-found -o name)"
      args:
        executable: /bin/bash
      register: e2e_stale_public_local_capacity_cleanup
      changed_when: false
      retries: 180
      delay: 10
      until: e2e_stale_public_local_capacity_cleanup.rc == 0

    - name: Delete the stale public-node-local NodeClass
      ansible.builtin.command:
        argv:
          - kubectl
          - delete
          - inspacenodeclass
          - "{{ e2e_state.publicLocalNodeClassName }}"
          - --ignore-not-found
          - --wait=true
          - --timeout=5m
      changed_when: true

    - name: Require the persisted default bootstrap cache contract
      ansible.builtin.shell: |
        set -euo pipefail
        cache_address={{ e2e_state.bootstrapCacheAddress | quote }}
        cache_registry={{ e2e_state.bootstrapCacheRegistry | quote }}
        cache_ca={{ e2e_state.bootstrapCacheCABundle | quote }}
        nodeclass=$(kubectl get "inspacenodeclass/{{ e2e_state.nodeClassName }}" -o json)
        jq -e --arg address "$cache_address" --arg ca "$cache_ca" '
          (.spec.bootstrapCache | keys | sort) == ["address", "caBundle", "directDownload"] and
          .spec.bootstrapCache.directDownload == false and
          .spec.bootstrapCache.address == $address and
          .spec.bootstrapCache.caBundle == $ca and
          .spec.rke2.skipOSUpgrade == true' <<<"$nodeclass"
        test "$(helm -n kube-system get values inspace -o json | jq -r '.global.inspace.systemImageRegistry')" = "$cache_registry"
        test "$(kubectl -n default get deployment/inspace-e2e-trigger -o jsonpath='{.spec.template.spec.containers[0].image}')" = \
          "$cache_registry/rancher/mirrored-pause:3.6@sha256:c2280d2f5f56cf9c9a01bb64b2db4651e35efd6d62a54dcfc12049fe6449c5e4"
      args:
        executable: /bin/bash
      changed_when: false

    - name: Recheck the private bastion cache by its stable TLS hostname
      ansible.builtin.command:
        argv:
          - ssh
          - -F
          - "{{ e2e_state_dir }}/ssh-config"
          - e2e-bastion
          - >-
            curl --fail --silent --show-error
            --cacert /etc/inspace-cache/tls/ca.crt
            --resolve "{{ e2e_state.bootstrapCacheRegistry }}:{{ e2e_state.bootstrapCacheAddress }}"
            "{{ e2e_state.bootstrapCacheEndpoint }}/healthz"
      register: e2e_cache_health
      changed_when: false
      retries: 12
      delay: 5
      until: e2e_cache_health.rc == 0 and e2e_cache_health.stdout | trim == 'ready'

    - name: Require the fixed control plane and one Karpenter worker to remain Ready
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl wait --for=condition=Ready node --all --timeout=10m
        nodes=$(kubectl get nodes -o json)
        test "$(jq '.items | length' <<<"$nodes")" -eq 4
        test "$(jq '[.items[] | select(.metadata.labels["karpenter.sh/nodepool"] == "general")] | length' <<<"$nodes")" -eq 1
      args:
        executable: /bin/bash
      changed_when: false

- name: Verify CSI persistence private Cilium L2 VIPs and the public TCP-only NLB
  hosts: localhost
  gather_facts: false
  tags:
    - e2e-test
  vars:
    e2e_state_dir: "{{ lookup('env', 'E2E_STATE_DIR') }}"
    e2e_state_file: "{{ lookup('env', 'E2E_STATE_DIR') }}/state.json"
    e2e_kubeconfig: "{{ lookup('env', 'E2E_STATE_DIR') }}/kubeconfig.yaml"
    e2e_baseline_inventory_file: "{{ lookup('env', 'E2E_STATE_DIR') }}/baseline-inventory.json"
    e2e_state: "{{ lookup('file', lookup('env', 'E2E_STATE_DIR') + '/state.json') | from_json }}"
    e2e_node_lb_baseline: "{{ lookup('env', 'E2E_STATE_DIR') }}/node-load-balancer-baseline.json"
    e2e_node_lb_manifest: "{{ lookup('env', 'E2E_STATE_DIR') }}/node-load-balancer.yaml"
    e2e_node_lb_shared_expansion_manifest: "{{ lookup('env', 'E2E_STATE_DIR') }}/node-load-balancer-shared-expansion.yaml"
    e2e_node_lb_expansion_manifest: "{{ lookup('env', 'E2E_STATE_DIR') }}/node-load-balancer-expansion.yaml"
    e2e_node_lb_initial_snapshot: "{{ lookup('env', 'E2E_STATE_DIR') }}/node-load-balancer-initial.json"
    e2e_node_lb_expanded_snapshot: "{{ lookup('env', 'E2E_STATE_DIR') }}/node-load-balancer-expanded.json"
    e2e_node_lb_recreated_snapshot: "{{ lookup('env', 'E2E_STATE_DIR') }}/node-load-balancer-recreated.json"
    e2e_node_lb_probe_stop: "{{ lookup('env', 'E2E_STATE_DIR') }}/node-load-balancer-probe.stop"
    e2e_node_lb_probe_ready: "{{ lookup('env', 'E2E_STATE_DIR') }}/node-load-balancer-probe.ready"
    e2e_public_local_capacity_manifest: "{{ lookup('env', 'E2E_STATE_DIR') }}/public-node-local-capacity.yaml"
    e2e_public_local_service_manifest: "{{ lookup('env', 'E2E_STATE_DIR') }}/public-node-local-service.yaml"
    e2e_public_local_snapshot: "{{ lookup('env', 'E2E_STATE_DIR') }}/public-node-local-present.json"
    e2e_public_local_nodeclass_name: "{{ e2e_state.publicLocalNodeClassName }}"
    e2e_public_local_nodepool_name: "{{ e2e_state.publicLocalNodePoolName }}"
    e2e_public_local_pool: "{{ e2e_state.publicLocalPool }}"
    e2e_nodepool_name: "general"
    e2e_marker: "inspace-e2e-{{ lookup('env', 'E2E_RUN_ID') }}"
  environment:
    KUBECONFIG: "{{ e2e_kubeconfig }}"
  tasks:
    - name: Prove native-routing kube-proxy replacement and L2 announcements on every node
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl -n kube-system rollout status daemonset/cilium --timeout=15m
        kubectl -n kube-system get configmap cilium-config -o json | jq -e '
          .data["routing-mode"] == "native" and
          .data["ipv4-native-routing-cidr"] == "10.42.0.0/16" and
          .data["auto-direct-node-routes"] == "true" and
          .data["kube-proxy-replacement"] == "true" and
          .data["enable-ipv4-masquerade"] == "true" and
          .data["enable-bpf-masquerade"] == "true" and
          .data["enable-l2-announcements"] == "true" and
          .data["default-lb-service-ipam"] == "none"'
        kubectl get ciliumloadbalancerippool inspace-private
        kubectl get ciliuml2announcementpolicy inspace-private
        nodes=$(kubectl get nodes -o json | jq -c '[.items[].metadata.name] | sort')
        test "$(jq 'length' <<<"$nodes")" -eq 4
        cilium=$(kubectl -n kube-system get pods -l k8s-app=cilium -o json)
        jq -e --argjson nodes "$nodes" '
          .items | length == 4 and
          ([.[].spec.nodeName] | sort) == $nodes and
          all(.[]; .status.phase == "Running")' <<<"$cilium"
        exec_cilium() {
          local pod=$1
          shift
          local cilium_exec_attempt=0
          local cilium_exec_output
          while true; do
            cilium_exec_attempt=$((cilium_exec_attempt + 1))
            if cilium_exec_output=$(timeout --kill-after=5s 60s kubectl -n kube-system exec "$pod" -- "$@" 2>&1); then
              printf '%s\n' "$cilium_exec_output"
              return 0
            fi
            if [ "$cilium_exec_attempt" -ge 5 ]; then
              printf '%s\n' "$cilium_exec_output" >&2
              return 1
            fi
            sleep 2
          done
        }
        while IFS=$'\t' read -r pod node; do
          test -n "$pod"
          status=$(exec_cilium "$pod" cilium-dbg status --verbose)
          grep -E 'KubeProxyReplacement:[[:space:]]+True' <<<"$status"
          grep -E '(Routing:.*Native|Direct Routing)' <<<"$status"
          grep -E '^[[:space:]]*Masquerading:[[:space:]]+BPF([[:space:]]+\(ip-masq-agent\))?[[:space:]]+\[[^][]+\][[:space:]]+10\.42\.0\.0/16([[:space:]]|$)' <<<"$status"
          config=$(exec_cilium "$pod" cilium-dbg config --all)
          grep -E '^EnableBPFMasquerade[[:space:]]*:[[:space:]]*true$' <<<"$config"
          grep -E '^EnableIPv4Masquerade[[:space:]]*:[[:space:]]*true$' <<<"$config"
          grep -E 'EnableL2Announcements[[:space:]]*:[[:space:]]*true' <<<"$config"
          printf 'verified cilium datapath on %s via %s\n' "$node" "$pod"
        done < <(jq -r '.items[] | [.metadata.name,.spec.nodeName] | @tsv' <<<"$cilium")
        kubectl -n kube-system get daemonsets -o json | jq -e '
          all(.items[]; .metadata.name != "kube-proxy")'
        kubectl -n kube-system get pods -o json | jq -e '
          all(.items[]; (.metadata.name | startswith("kube-proxy-")) | not)'
      args:
        executable: /bin/bash
      changed_when: false

    - name: Require worker CSI registration
      ansible.builtin.shell: |
        set -euo pipefail
        worker=$(kubectl get node -l "karpenter.sh/nodepool={{ e2e_nodepool_name }}" -o jsonpath='{.items[0].metadata.name}')
        test -n "$worker"
        kubectl -n kube-system rollout status daemonset/inspace-csi-node --timeout=10m
        kubectl get csinode "$worker"
      args:
        executable: /bin/bash
      changed_when: false

    - name: Render the RWO public NLB and two same-port private L2 workloads
      ansible.builtin.template:
        src: templates/workload.yaml.j2
        dest: "{{ e2e_state_dir }}/workload.yaml"
        mode: "0600"

    - name: Apply the RWO public NLB and two same-port private L2 workloads
      ansible.builtin.command:
        argv: [kubectl, apply, -f, "{{ e2e_state_dir }}/workload.yaml"]
      changed_when: true

    - name: Persist workload ownership before waiting
      ansible.builtin.command:
        argv:
          - /opt/e2e/scripts/persist-workload.py
          - --state
          - "{{ e2e_state_file }}"
          - --kubeconfig
          - "{{ e2e_kubeconfig }}"
      changed_when: true

    - name: Wait for the RWO private L2 workloads and bound PVC
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl -n default rollout status deployment/inspace-e2e-web --timeout=20m
        kubectl -n default rollout status deployment/inspace-e2e-private-a --timeout=20m
        kubectl -n default rollout status deployment/inspace-e2e-private-b --timeout=20m
        kubectl -n default wait --for=jsonpath='{.status.phase}'=Bound pvc/inspace-e2e-rwo --timeout=10m
      args:
        executable: /bin/bash
      changed_when: false

    - name: Persist PV disk ownership after binding
      ansible.builtin.command:
        argv:
          - /opt/e2e/scripts/persist-workload.py
          - --state
          - "{{ e2e_state_file }}"
          - --kubeconfig
          - "{{ e2e_kubeconfig }}"
      changed_when: true

    - name: Require an attached CSI VolumeAttachment
      ansible.builtin.shell: |
        set -euo pipefail
        pv=$(kubectl -n default get pvc inspace-e2e-rwo -o jsonpath='{.spec.volumeName}')
        worker=$(kubectl get nodes -l "karpenter.sh/nodepool={{ e2e_nodepool_name }}" -o json | jq -er '
          [.items[].metadata.name] |
          if length == 1 then .[0] else error("expected exactly one Karpenter worker") end')
        kubectl get volumeattachments -o json | jq -e --arg pv "$pv" --arg worker "$worker" '
          [.items[] | select(.spec.source.persistentVolumeName == $pv)] as $attachments |
          ($attachments | length) == 1 and
          $attachments[0].spec.attacher == "csi.inspace.cloud" and
          $attachments[0].spec.nodeName == $worker and
          $attachments[0].status.attached == true'
      args:
        executable: /bin/bash
      register: e2e_attachment
      changed_when: false
      retries: 120
      delay: 5
      until: e2e_attachment.rc == 0

    - name: Require two distinct reserved private VIPs on the same TCP port
      ansible.builtin.shell: |
        set -euo pipefail
        export E2E_PRIVATE_SERVICES_JSON
        E2E_PRIVATE_SERVICES_JSON=$(kubectl -n default get services \
          inspace-e2e-private-a inspace-e2e-private-b -o json)
        python3 - "$INSPACE_PRIVATE_LOAD_BALANCER_POOL_START" "$INSPACE_PRIVATE_LOAD_BALANCER_POOL_STOP" <<'PY'
        import ipaddress
        import json
        import os
        import sys

        start, stop = map(ipaddress.ip_address, sys.argv[1:])
        services = json.loads(os.environ["E2E_PRIVATE_SERVICES_JSON"])["items"]
        if len(services) != 2:
            raise SystemExit("expected exactly two private Services")
        result = {}
        for service in services:
            metadata = service["metadata"]
            spec = service["spec"]
            if (
                metadata.get("labels", {}).get("inspace.cloud/load-balancer-scope") != "private"
                or spec.get("loadBalancerClass") != "io.cilium/l2-announcer"
                or spec.get("externalTrafficPolicy") != "Cluster"
                or len(spec.get("ports", [])) != 1
                or spec["ports"][0].get("protocol") != "TCP"
                or spec["ports"][0].get("port") != 80
                or "lbipam.cilium.io/sharing-key" in metadata.get("annotations", {})
            ):
                raise SystemExit("private Service does not match the classed L2 contract")
            ingresses = service.get("status", {}).get("loadBalancer", {}).get("ingress", [])
            if len(ingresses) != 1 or not ingresses[0].get("ip"):
                raise SystemExit("private Service does not have exactly one LB-IPAM address")
            address = ipaddress.ip_address(ingresses[0]["ip"])
            if address.version != 4 or not int(start) <= int(address) <= int(stop):
                raise SystemExit("private Service VIP is outside the reserved range")
            conditions = service.get("status", {}).get("conditions", [])
            if not any(
                condition.get("type") == "cilium.io/IPAMRequestSatisfied"
                and condition.get("status") == "True"
                for condition in conditions
            ):
                raise SystemExit("Cilium LB-IPAM did not report a satisfied allocation")
            result[metadata["name"]] = str(address)
        if len(set(result.values())) != 2:
            raise SystemExit("same-port private Services must receive distinct VIPs")
        print(json.dumps(result, sort_keys=True))
        PY
      args:
        executable: /bin/bash
      register: e2e_private_service_command
      changed_when: false
      retries: 120
      delay: 5
      until: e2e_private_service_command.rc == 0

    - name: Decode the exact private Service VIPs
      ansible.builtin.set_fact:
        e2e_private_service_vips: "{{ e2e_private_service_command.stdout | from_json }}"

    - name: Persist private Service ownership and VIPs
      ansible.builtin.command:
        argv:
          - /opt/e2e/scripts/persist-workload.py
          - --state
          - "{{ e2e_state_file }}"
          - --kubeconfig
          - "{{ e2e_kubeconfig }}"
      changed_when: true

    - name: Prove two Cilium L2 leases announcements and allocated addresses
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl get ciliumloadbalancerippool inspace-private -o json | jq -e '
          any(.status.conditions[]?; .type == "cilium.io/IPsUsed" and .message == "2") and
          all(.status.conditions[]?; .type != "cilium.io/PoolConflict" or .status == "False")'
        while IFS=$'\t' read -r service vip; do
          lease="cilium-l2announce-default-$service"
          holder=$(kubectl -n kube-system get lease "$lease" -o jsonpath='{.spec.holderIdentity}')
          test -n "$holder"
          pod=$(kubectl -n kube-system get pods -l k8s-app=cilium \
            --field-selector "spec.nodeName=$holder" -o jsonpath='{.items[0].metadata.name}')
          test -n "$pod"
          state=$(kubectl -n kube-system exec "$pod" -- cilium-dbg shell -- db/show l2-announce)
          grep -F -- "$vip" <<<"$state"
        done < <(jq -r 'to_entries[] | [.key,.value] | @tsv' <<<'{{ e2e_private_service_vips | to_json }}')
      args:
        executable: /bin/bash
      register: e2e_l2_announcement_proof
      changed_when: false
      retries: 120
      delay: 5
      until: e2e_l2_announcement_proof.rc == 0

    - name: Reach both same-port private VIPs from the VPC bastion
      ansible.builtin.uri:
        url: "http://{{ e2e_private_service_vips[item.name] }}/"
        return_content: true
        timeout: 10
        use_proxy: false
      delegate_to: e2e-bastion
      register: e2e_private_marker_response
      retries: 60
      delay: 5
      until: >-
        e2e_private_marker_response.status == 200 and
        e2e_private_marker_response.content | trim == e2e_marker + item.suffix
      loop:
        - {name: inspace-e2e-private-a, suffix: "-private-a"}
        - {name: inspace-e2e-private-b, suffix: "-private-b"}

    - name: Exercise private L2 lease migration after a Cilium-agent failure
      block:
        - name: Capture the original private L2 lease holder
          ansible.builtin.command:
            argv:
              - kubectl
              - -n
              - kube-system
              - get
              - lease
              - cilium-l2announce-default-inspace-e2e-private-a
              - -o
              - jsonpath={.spec.holderIdentity}
          register: e2e_l2_original_holder
          changed_when: false

        - name: Bind the original lease holder to its node address and Cilium pod UID
          ansible.builtin.shell: |
            set -euo pipefail
            holder={{ e2e_l2_original_holder.stdout | quote }}
            node_ip=$(kubectl get node "$holder" -o json | jq -er '
              [.status.addresses[] | select(.type == "InternalIP") | .address] |
              if length == 1 then .[0] else error("expected one InternalIP") end')
            pod=$(kubectl -n kube-system get pods -l k8s-app=cilium \
              --field-selector "spec.nodeName=$holder" -o json | jq -cer '
              if (.items | length) == 1 then
                {name:.items[0].metadata.name,uid:.items[0].metadata.uid}
              else error("expected one Cilium pod on holder") end')
            jq -cn --arg nodeIP "$node_ip" --argjson pod "$pod" \
              '{nodeIP:$nodeIP,podName:$pod.name,podUID:$pod.uid}'
          args:
            executable: /bin/bash
          register: e2e_l2_original_topology
          changed_when: false

        - name: Prove the original VIP neighbor MAC is the original holder NIC
          ansible.builtin.shell: |
            set -euo pipefail
            vip={{ e2e_private_service_vips['inspace-e2e-private-a'] | quote }}
            node_ip={{ (e2e_l2_original_topology.stdout | from_json).nodeIP | quote }}
            ip -4 neigh flush to "$vip"
            ip -4 neigh flush to "$node_ip"
            python3 - "$node_ip" <<'PY'
            import socket
            import sys
            with socket.create_connection((sys.argv[1], 22), timeout=10):
                pass
            PY
            python3 - "$vip" "{{ e2e_marker }}-private-a" <<'PY'
            import sys
            import urllib.request
            opener = urllib.request.build_opener(urllib.request.ProxyHandler({}))
            with opener.open(f"http://{sys.argv[1]}/", timeout=10) as response:
                assert response.status == 200
                assert response.read().decode().strip() == sys.argv[2]
            PY
            neighbor_mac() {
              ip -4 neigh show to "$1" | awk '
                { for (i = 1; i <= NF; i++) if ($i == "lladdr") { print $(i + 1); exit } }'
            }
            node_mac=$(neighbor_mac "$node_ip")
            vip_mac=$(neighbor_mac "$vip")
            test -n "$node_mac"
            test "$vip_mac" = "$node_mac"
            jq -cn --arg nodeMAC "$node_mac" --arg vipMAC "$vip_mac" \
              '{nodeMAC:$nodeMAC,vipMAC:$vipMAC}'
          args:
            executable: /bin/bash
          become: true
          delegate_to: e2e-bastion
          register: e2e_l2_original_neighbor
          changed_when: true
          retries: 30
          delay: 1
          until: e2e_l2_original_neighbor.rc == 0

        - name: Exclude the original holder and terminate its Cilium agent
          ansible.builtin.shell: |
            set -euo pipefail
            kubectl label node "{{ e2e_l2_original_holder.stdout }}" \
              inspace.cloud/l2-announcement-disabled=true --overwrite
            pod={{ (e2e_l2_original_topology.stdout | from_json).podName | quote }}
            uid={{ (e2e_l2_original_topology.stdout | from_json).podUID | quote }}
            kubectl -n kube-system delete pod "$pod" --wait=false
            kubectl -n kube-system wait --for=delete "pod/$pod" --timeout=2m
            kubectl -n kube-system get pods -l k8s-app=cilium -o json | jq -e --arg uid "$uid" '
              all(.items[]; .metadata.uid != $uid)'
          args:
            executable: /bin/bash
          changed_when: true

        - name: Wait for the private Service lease to move to another node
          ansible.builtin.shell: |
            set -euo pipefail
            lease=$(kubectl -n kube-system get lease \
              cilium-l2announce-default-inspace-e2e-private-a -o json)
            jq -er --arg old "{{ e2e_l2_original_holder.stdout }}" '
              (.spec.holderIdentity // "") as $holder |
              # Cilium may replace the Lease during L2 failover, which resets
              # the optional leaseTransitions counter. The new holder plus the
              # following NIC-MAC and VIP reachability checks prove migration.
              if (($holder | length) > 0 and $holder != $old)
              then $holder else error("lease has not migrated") end' <<<"$lease"
          args:
            executable: /bin/bash
          register: e2e_l2_new_holder
          changed_when: false
          retries: 60
          delay: 1
          until: e2e_l2_new_holder.rc == 0

        - name: Read the migrated lease holder private node address
          ansible.builtin.shell: |
            set -euo pipefail
            kubectl get node "{{ e2e_l2_new_holder.stdout }}" -o json | jq -er '
              [.status.addresses[] | select(.type == "InternalIP") | .address] |
              if length == 1 then .[0] else error("expected one InternalIP") end'
          args:
            executable: /bin/bash
          register: e2e_l2_new_holder_ip
          changed_when: false

        - name: Require gratuitous ARP to update the existing VIP neighbor to the migrated holder
          ansible.builtin.shell: |
            set -euo pipefail
            vip={{ e2e_private_service_vips['inspace-e2e-private-a'] | quote }}
            node_ip={{ e2e_l2_new_holder_ip.stdout | quote }}
            old_mac={{ (e2e_l2_original_neighbor.stdout | from_json).nodeMAC | quote }}
            ip -4 neigh flush to "$node_ip"
            python3 - "$node_ip" <<'PY'
            import socket
            import sys
            with socket.create_connection((sys.argv[1], 22), timeout=10):
                pass
            PY
            neighbor_mac() {
              ip -4 neigh show to "$1" | awk '
                { for (i = 1; i <= NF; i++) if ($i == "lladdr") { print $(i + 1); exit } }'
            }
            node_mac=$(neighbor_mac "$node_ip")
            vip_mac=$(neighbor_mac "$vip")
            test -n "$node_mac"
            test "$vip_mac" = "$node_mac"
            test "$vip_mac" != "$old_mac"
            python3 - "$vip" "{{ e2e_marker }}-private-a" <<'PY'
            import sys
            import urllib.request
            opener = urllib.request.build_opener(urllib.request.ProxyHandler({}))
            with opener.open(f"http://{sys.argv[1]}/", timeout=10) as response:
                assert response.status == 200
                assert response.read().decode().strip() == sys.argv[2]
            PY
          args:
            executable: /bin/bash
          become: true
          delegate_to: e2e-bastion
          register: e2e_l2_gratuitous_arp
          changed_when: false
          retries: 30
          delay: 1
          until: e2e_l2_gratuitous_arp.rc == 0

        - name: Flush the VIP neighbor and prove fresh ARP resolves to the migrated holder
          ansible.builtin.shell: |
            set -euo pipefail
            vip={{ e2e_private_service_vips['inspace-e2e-private-a'] | quote }}
            node_ip={{ e2e_l2_new_holder_ip.stdout | quote }}
            old_mac={{ (e2e_l2_original_neighbor.stdout | from_json).nodeMAC | quote }}
            ip -4 neigh flush to "$vip"
            python3 - "$vip" "{{ e2e_marker }}-private-a" <<'PY'
            import sys
            import urllib.request
            opener = urllib.request.build_opener(urllib.request.ProxyHandler({}))
            with opener.open(f"http://{sys.argv[1]}/", timeout=10) as response:
                assert response.status == 200
                assert response.read().decode().strip() == sys.argv[2]
            PY
            neighbor_mac() {
              ip -4 neigh show to "$1" | awk '
                { for (i = 1; i <= NF; i++) if ($i == "lladdr") { print $(i + 1); exit } }'
            }
            node_mac=$(neighbor_mac "$node_ip")
            vip_mac=$(neighbor_mac "$vip")
            test -n "$node_mac"
            test "$vip_mac" = "$node_mac"
            test "$vip_mac" != "$old_mac"
          args:
            executable: /bin/bash
          become: true
          delegate_to: e2e-bastion
          register: e2e_l2_fresh_arp
          changed_when: true
          retries: 30
          delay: 1
          until: e2e_l2_fresh_arp.rc == 0
      always:
        - name: Restore the original node to L2 announcement eligibility
          ansible.builtin.command:
            argv:
              - kubectl
              - label
              - node
              - "{{ e2e_l2_original_holder.stdout }}"
              - inspace.cloud/l2-announcement-disabled-
          changed_when: true
          when: e2e_l2_original_holder is defined and (e2e_l2_original_holder.stdout | default('')) | length > 0

        - name: Wait for every Cilium agent after the failover exercise
          ansible.builtin.command:
            argv: [kubectl, -n, kube-system, rollout, status, daemonset/cilium, --timeout=10m]
          changed_when: false

    - name: Wait for the public TCP load balancer address
      ansible.builtin.shell: |
        kubectl -n default get service inspace-e2e-web -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
      args:
        executable: /bin/bash
      register: e2e_service_ip_command
      changed_when: false
      retries: 120
      delay: 5
      until: e2e_service_ip_command.rc == 0 and e2e_service_ip_command.stdout | length > 0

    - name: Validate the service address is public IPv4
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - >-
            import ipaddress,sys;
            a=ipaddress.ip_address(sys.argv[1]);
            assert a.version == 4 and not a.is_private and not a.is_loopback and not a.is_multicast
          - "{{ e2e_service_ip_command.stdout }}"
      changed_when: false

    - name: Prove private Services own zero cloud resources and public ownership is exact
      ansible.builtin.command:
        argv:
          - /opt/e2e/scripts/verify-service-cloud.py
          - --state
          - "{{ e2e_state_file }}"
          - --immutable-baseline
          - "{{ e2e_baseline_inventory_file }}"
          - --public
          - present
      register: e2e_public_cloud_proof
      changed_when: false
      retries: 120
      delay: 5
      until: >-
        e2e_public_cloud_proof.rc == 0 and
        (e2e_public_cloud_proof.stdout | from_json).publicIPv4 == e2e_service_ip_command.stdout
      no_log: true

    - name: Prove explicit paid public CCM ownership before Node-LB acceptance
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl -n default get service inspace-e2e-web -o json | jq -e '
          .metadata.labels["inspace.cloud/load-balancer-scope"] == "public" and
          .metadata.annotations["service.beta.kubernetes.io/inspace-load-balancer-public"] == "true" and
          (.spec.loadBalancerClass == null) and
          .spec.externalTrafficPolicy == "Local" and
          (.spec.healthCheckNodePort | type) == "number" and
          all(.status.conditions[]?; (.type | startswith("cilium.io/")) | not)'
        kubectl -n kube-system get leases -o json | jq -e '
          all(.items[]; .metadata.name != "cilium-l2announce-default-inspace-e2e-web")'
      args:
        executable: /bin/bash
      changed_when: false

    - name: Exercise control-plane exclusion under Cluster traffic policy
      block:
        - name: Switch the public Service to Cluster traffic policy
          ansible.builtin.command:
            argv:
              - kubectl
              - -n
              - default
              - patch
              - service
              - inspace-e2e-web
              - --type=merge
              - --patch
              - '{"spec":{"externalTrafficPolicy":"Cluster"}}'
          changed_when: true

        - name: Require Cluster policy and exactly three Ready control-plane nodes
          ansible.builtin.shell: |
            set -euo pipefail
            test "$(kubectl -n default get service inspace-e2e-web -o jsonpath='{.spec.externalTrafficPolicy}')" = Cluster
            kubectl get nodes -o json | jq -e '
              [.items[] | select(
                .metadata.labels["node-role.kubernetes.io/control-plane"] != null or
                .metadata.labels["node-role.kubernetes.io/master"] != null
              )] as $control_planes |
              ($control_planes | length) == 3 and
              all($control_planes[]; any(.status.conditions[]?; .type == "Ready" and .status == "True"))'
          args:
            executable: /bin/bash
          changed_when: false

        - name: Require Cluster public NLB target to remain exactly the eligible Ready worker
          ansible.builtin.command:
            argv:
              - /opt/e2e/scripts/verify-service-cloud.py
              - --state
              - "{{ e2e_state_file }}"
              - --immutable-baseline
              - "{{ e2e_baseline_inventory_file }}"
              - --public
              - present
              - --targets
              - ready
          register: e2e_cluster_public_target
          changed_when: false
          retries: 120
          delay: 1
          until: e2e_cluster_public_target.rc == 0
          no_log: true
      always:
        - name: Restore the public Service to Local traffic policy
          ansible.builtin.command:
            argv:
              - kubectl
              - -n
              - default
              - patch
              - service
              - inspace-e2e-web
              - --type=merge
              - --patch
              - '{"spec":{"externalTrafficPolicy":"Local"}}'
          changed_when: true

        - name: Require restored Local policy and exact eligible Ready worker target
          ansible.builtin.shell: |
            set -euo pipefail
            test "$(kubectl -n default get service inspace-e2e-web -o jsonpath='{.spec.externalTrafficPolicy}')" = Local
            /opt/e2e/scripts/verify-service-cloud.py \
              --state "{{ e2e_state_file }}" \
              --immutable-baseline "{{ e2e_baseline_inventory_file }}" \
              --public present \
              --targets ready
          args:
            executable: /bin/bash
          register: e2e_local_public_target
          changed_when: false
          retries: 120
          delay: 1
          until: e2e_local_public_target.rc == 0
          no_log: true

    - name: Exercise public NLB removal for a node excluded from external load balancers
      block:
        - name: Resolve the exact public workload node
          ansible.builtin.shell: |
            set -euo pipefail
            kubectl -n default get pod -l app=inspace-e2e-web -o json | jq -er '
              [.items[] | select(.status.phase == "Running") | .spec.nodeName] |
              unique | if length == 1 then .[0] else error("expected one public workload node") end'
          args:
            executable: /bin/bash
          register: e2e_public_worker
          changed_when: false

        - name: Exclude the public workload node from external load balancers
          ansible.builtin.command:
            argv:
              - kubectl
              - label
              - node
              - "{{ e2e_public_worker.stdout }}"
              - node.kubernetes.io/exclude-from-external-load-balancers=true
              - --overwrite
          changed_when: true

        - name: Require the public NLB to remove the excluded local-endpoint node
          ansible.builtin.command:
            argv:
              - /opt/e2e/scripts/verify-service-cloud.py
              - --state
              - "{{ e2e_state_file }}"
              - --immutable-baseline
              - "{{ e2e_baseline_inventory_file }}"
              - --public
              - present
              - --targets
              - empty
          register: e2e_excluded_public_target
          changed_when: false
          retries: 120
          delay: 1
          until: e2e_excluded_public_target.rc == 0
          no_log: true
      always:
        - name: Restore the public workload node to load-balancer eligibility
          ansible.builtin.command:
            argv:
              - kubectl
              - label
              - node
              - "{{ e2e_public_worker.stdout }}"
              - node.kubernetes.io/exclude-from-external-load-balancers-
          changed_when: true
          when: e2e_public_worker is defined and (e2e_public_worker.stdout | default('')) | length > 0

    - name: Require the public NLB to restore the eligible local-endpoint node
      ansible.builtin.command:
        argv:
          - /opt/e2e/scripts/verify-service-cloud.py
          - --state
          - "{{ e2e_state_file }}"
          - --immutable-baseline
          - "{{ e2e_baseline_inventory_file }}"
          - --public
          - present
          - --targets
          - ready
      register: e2e_restored_public_target
      changed_when: false
      retries: 120
      delay: 1
      until: e2e_restored_public_target.rc == 0
      no_log: true

    - name: Require the expected marker through the TCP-only InSpace NLB
      ansible.builtin.uri:
        url: "http://{{ e2e_service_ip_command.stdout }}/"
        return_content: true
        timeout: 10
        use_proxy: false
      register: e2e_marker_response
      retries: 120
      delay: 5
      until: e2e_marker_response.status == 200 and e2e_marker_response.content | trim == e2e_marker

    - name: Remove only the public scope label while keeping the annotation and Service type
      ansible.builtin.command:
        argv:
          - kubectl
          - -n
          - default
          - label
          - service
          - inspace-e2e-web
          - inspace.cloud/load-balancer-scope-
      changed_when: true

    - name: Require public status and exact owned NLB FIP cleanup
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl -n default get service inspace-e2e-web -o json | jq -e '
          ((.status.loadBalancer.ingress // []) | length) == 0'
        /opt/e2e/scripts/verify-service-cloud.py \
          --state "{{ e2e_state_file }}" \
          --immutable-baseline "{{ e2e_baseline_inventory_file }}" \
          --public absent >/dev/null
      args:
        executable: /bin/bash
      register: e2e_public_transition_cleanup
      changed_when: false
      retries: 120
      delay: 5
      until: e2e_public_transition_cleanup.rc == 0
      no_log: true

    - name: Restore only the public scope label to recreate the NLB
      ansible.builtin.command:
        argv:
          - kubectl
          - -n
          - default
          - label
          - service
          - inspace-e2e-web
          - inspace.cloud/load-balancer-scope=public
          - --overwrite
      changed_when: true

    - name: Wait for the recreated public TCP NLB address
      ansible.builtin.shell: |
        kubectl -n default get service inspace-e2e-web -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
      args:
        executable: /bin/bash
      register: e2e_service_ip_command
      changed_when: false
      retries: 120
      delay: 5
      until: e2e_service_ip_command.rc == 0 and e2e_service_ip_command.stdout | length > 0

    - name: Re-prove exact public cloud ownership after transition
      ansible.builtin.command:
        argv:
          - /opt/e2e/scripts/verify-service-cloud.py
          - --state
          - "{{ e2e_state_file }}"
          - --immutable-baseline
          - "{{ e2e_baseline_inventory_file }}"
          - --public
          - present
      register: e2e_recreated_public_cloud
      changed_when: false
      retries: 120
      delay: 5
      until: >-
        e2e_recreated_public_cloud.rc == 0 and
        (e2e_recreated_public_cloud.stdout | from_json).publicIPv4 == e2e_service_ip_command.stdout
      no_log: true

    - name: Recheck the restored public TCP NLB
      ansible.builtin.uri:
        url: "http://{{ e2e_service_ip_command.stdout }}/"
        return_content: true
        timeout: 10
        use_proxy: false
      register: e2e_restored_public_marker
      retries: 120
      delay: 5
      until: e2e_restored_public_marker.status == 200 and e2e_restored_public_marker.content | trim == e2e_marker

    - name: Scale away the serving replica to prove RWO persistence and local target removal
      ansible.builtin.shell: |
        set -euo pipefail
        old=$(kubectl -n default get pod -l app=inspace-e2e-web -o jsonpath='{.items[0].metadata.name}')
        test -n "$old"
        sentinel={{ (e2e_marker + '-persistence-sentinel') | quote }}
        kubectl -n default exec "$old" -c nginx -- sh -ec \
          'printf "%s\n" "$1" > /usr/share/nginx/html/e2e-persistence-sentinel; sync' \
          sh "$sentinel"
        test "$(kubectl -n default exec "$old" -c nginx -- \
          cat /usr/share/nginx/html/e2e-persistence-sentinel)" = "$sentinel"
        printf '%s' "$old" >"{{ e2e_state_dir }}/old-pod"
        kubectl -n default scale deployment/inspace-e2e-web --replicas=0
        kubectl -n default wait --for=delete "pod/$old" --timeout=5m
      args:
        executable: /bin/bash
      changed_when: true

    - name: Require zero public NLB targets without a ready local endpoint
      ansible.builtin.command:
        argv:
          - /opt/e2e/scripts/verify-service-cloud.py
          - --state
          - "{{ e2e_state_file }}"
          - --immutable-baseline
          - "{{ e2e_baseline_inventory_file }}"
          - --public
          - present
          - --targets
          - empty
      register: e2e_empty_public_targets
      changed_when: false
      retries: 120
      delay: 1
      until: e2e_empty_public_targets.rc == 0
      no_log: true

    - name: Restore the serving replica
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl -n default scale deployment/inspace-e2e-web --replicas=1
        kubectl -n default rollout status deployment/inspace-e2e-web --timeout=10m
      args:
        executable: /bin/bash
      changed_when: true

    - name: Prove pod replacement retained the exact disk marker
      ansible.builtin.shell: |
        set -euo pipefail
        old=$(cat "{{ e2e_state_dir }}/old-pod")
        new=$(kubectl -n default get pod -l app=inspace-e2e-web -o jsonpath='{.items[0].metadata.name}')
        test -n "$new"
        test "$new" != "$old"
        test "$(kubectl -n default exec "$new" -c nginx -- cat /usr/share/nginx/html/index.html)" = "{{ e2e_marker }}"
        test "$(kubectl -n default exec "$new" -c nginx -- \
          cat /usr/share/nginx/html/e2e-persistence-sentinel)" = \
          "{{ e2e_marker }}-persistence-sentinel"
      args:
        executable: /bin/bash
      changed_when: false

    - name: Require the public NLB to restore exactly the ready local-endpoint worker
      ansible.builtin.command:
        argv:
          - /opt/e2e/scripts/verify-service-cloud.py
          - --state
          - "{{ e2e_state_file }}"
          - --immutable-baseline
          - "{{ e2e_baseline_inventory_file }}"
          - --public
          - present
          - --targets
          - ready
      register: e2e_replacement_public_targets
      changed_when: false
      retries: 120
      delay: 1
      until: e2e_replacement_public_targets.rc == 0
      no_log: true

    - name: Recheck the public TCP NLB after pod replacement
      ansible.builtin.uri:
        url: "http://{{ e2e_service_ip_command.stdout }}/"
        return_content: true
        timeout: 10
        use_proxy: false
      register: e2e_replacement_marker
      retries: 60
      delay: 5
      until: e2e_replacement_marker.status == 200 and e2e_replacement_marker.content | trim == e2e_marker

    - name: Delete only the paid public Service after its acceptance checks
      ansible.builtin.command:
        argv:
          - kubectl
          - -n
          - default
          - delete
          - service/inspace-e2e-web
          - --wait=false
      changed_when: true

    - name: Require public NLB FIP cleanup while preserving the remaining workloads
      ansible.builtin.shell: |
        set -euo pipefail
        public_service=$(kubectl -n default get service/inspace-e2e-web --ignore-not-found -o name)
        test -z "$public_service"
        kubectl -n default get service/inspace-e2e-private-a >/dev/null
        kubectl -n default get service/inspace-e2e-private-b >/dev/null
        kubectl -n default get deployment/inspace-e2e-web >/dev/null
        kubectl -n default get deployment/inspace-e2e-private-a >/dev/null
        kubectl -n default get deployment/inspace-e2e-private-b >/dev/null
        kubectl -n default get deployment/inspace-e2e-trigger >/dev/null
        kubectl -n default get pvc/inspace-e2e-rwo >/dev/null
        /opt/e2e/scripts/verify-service-cloud.py \
          --state "{{ e2e_state_file }}" \
          --immutable-baseline "{{ e2e_baseline_inventory_file }}" \
          --public absent >/dev/null
      args:
        executable: /bin/bash
      register: e2e_final_public_cleanup
      changed_when: false
      retries: 120
      delay: 5
      until: e2e_final_public_cleanup.rc == 0
      no_log: true

    - name: Require the immutable zero-NLB anchor before Node-LB baseline capture
      ansible.builtin.command:
        argv:
          - /opt/e2e/scripts/verify-node-load-balancer.py
          - --state
          - "{{ e2e_state_file }}"
          - --kubeconfig
          - "{{ e2e_kubeconfig }}"
          - --expect
          - absent
          - --immutable-baseline
          - "{{ e2e_baseline_inventory_file }}"
      register: e2e_node_lb_immutable_nlb_anchor
      changed_when: false
      retries: 180
      delay: 10
      until: e2e_node_lb_immutable_nlb_anchor.rc == 0
      no_log: true

    - name: Capture the exact account inventory before Node-LB acceptance
      ansible.builtin.command:
        argv:
          - /opt/e2e/scripts/account-inventory.py
          - capture
          - --output
          - "{{ e2e_node_lb_baseline }}"
      changed_when: true
      no_log: true

    - name: Render the isolated Node-LB acceptance workload
      ansible.builtin.template:
        src: templates/node-load-balancer.yaml.j2
        dest: "{{ e2e_node_lb_manifest }}"
        mode: "0600"

    - name: Render the conflicting and dedicated Node-LB expansion
      ansible.builtin.template:
        src: templates/node-load-balancer-expansion.yaml.j2
        dest: "{{ e2e_node_lb_expansion_manifest }}"
        mode: "0600"

    - name: Render the non-conflicting shared Node-LB expansion
      ansible.builtin.template:
        src: templates/node-load-balancer-shared-expansion.yaml.j2
        dest: "{{ e2e_node_lb_shared_expansion_manifest }}"
        mode: "0600"

    - name: Exercise shared conflict and dedicated public Node-LB modes
      block:
        - name: Create the Node-LB workload and establish Traefik first
          ansible.builtin.command:
            argv:
              - kubectl
              - apply
              - --server-side
              - --field-manager=inspace-e2e
              - -f
              - "{{ e2e_node_lb_manifest }}"
          changed_when: true

        - name: Journal initial Node-LB identities before cloud convergence
          ansible.builtin.command:
            argv:
              - /opt/e2e/scripts/persist-workload.py
              - --state
              - "{{ e2e_state_file }}"
              - --kubeconfig
              - "{{ e2e_kubeconfig }}"
          changed_when: true
          no_log: true

        - name: Wait for the Node-LB data-path workload
          ansible.builtin.command:
            argv:
              - kubectl
              - -n
              - default
              - rollout
              - status
              - deployment/inspace-e2e-node-lb
              - --timeout=10m
          changed_when: false

        - name: Capture the established Traefik shard firewall and readiness identities
          ansible.builtin.command:
            argv:
              - /opt/e2e/scripts/verify-node-load-balancer.py
              - --state
              - "{{ e2e_state_file }}"
              - --kubeconfig
              - "{{ e2e_kubeconfig }}"
              - --expect
              - present
              - --baseline
              - "{{ e2e_node_lb_baseline }}"
              - --service
              - inspace-e2e-node-traefik
          register: e2e_node_lb_initial_proof
          changed_when: false
          retries: 180
          delay: 10
          until: e2e_node_lb_initial_proof.rc == 0
          no_log: true

        - name: Persist the immutable established Traefik shard snapshot
          ansible.builtin.copy:
            content: "{{ e2e_node_lb_initial_proof.stdout }}\n"
            dest: "{{ e2e_node_lb_initial_snapshot }}"
            mode: "0600"
          no_log: true

        - name: Reset the retained Traefik continuity probe fence
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - "{{ e2e_node_lb_probe_stop }}"
            - "{{ e2e_node_lb_probe_ready }}"

        - name: Continuously probe retained Traefik traffic across every shard policy mutation
          ansible.builtin.command:
            argv:
              - /opt/e2e/scripts/continuous-http-probe.py
              - --url
              - "http://{{ (e2e_node_lb_initial_proof.stdout | from_json).services['inspace-e2e-node-traefik'].ip }}:80/"
              - --expected
              - "{{ e2e_marker }}-node-traefik-http"
              - --stop-file
              - "{{ e2e_node_lb_probe_stop }}"
              - --ready-file
              - "{{ e2e_node_lb_probe_ready }}"
              - --overall-timeout
              - "7200"
          async: 7500
          poll: 0
          register: e2e_node_lb_continuity_job
          changed_when: false
          no_log: true

        - name: Require retained Traefik continuity monitoring before mutation
          ansible.builtin.wait_for:
            path: "{{ e2e_node_lb_probe_ready }}"
            state: present
            timeout: 30

        - name: Add the non-conflicting shared Node-LB sibling
          ansible.builtin.command:
            argv:
              - kubectl
              - apply
              - --server-side
              - --field-manager=inspace-e2e
              - -f
              - "{{ e2e_node_lb_shared_expansion_manifest }}"
          changed_when: true

        - name: Journal the first shared sibling identity
          ansible.builtin.command:
            argv:
              - /opt/e2e/scripts/persist-workload.py
              - --state
              - "{{ e2e_state_file }}"
              - --kubeconfig
              - "{{ e2e_kubeconfig }}"
          changed_when: true
          no_log: true

        - name: Prove in-place aggregate firewall expansion without a Node readiness flap
          ansible.builtin.command:
            argv:
              - /opt/e2e/scripts/verify-node-load-balancer.py
              - --state
              - "{{ e2e_state_file }}"
              - --kubeconfig
              - "{{ e2e_kubeconfig }}"
              - --expect
              - present
              - --baseline
              - "{{ e2e_node_lb_baseline }}"
              - --service
              - inspace-e2e-node-traefik
              - --service
              - inspace-e2e-node-shared-b
              - --anchor
              - "{{ e2e_node_lb_initial_snapshot }}"
              - --policy-change
              - expanded
          register: e2e_node_lb_expanded_proof
          changed_when: false
          retries: 180
          delay: 10
          until: e2e_node_lb_expanded_proof.rc == 0
          no_log: true

        - name: Persist the first expanded aggregate firewall snapshot
          ansible.builtin.copy:
            content: "{{ e2e_node_lb_expanded_proof.stdout }}\n"
            dest: "{{ e2e_node_lb_expanded_snapshot }}"
            mode: "0600"
          no_log: true

        - name: Delete the shared sibling while retaining Traefik
          ansible.builtin.command:
            argv:
              - kubectl
              - -n
              - default
              - delete
              - service/inspace-e2e-node-shared-b
              - --wait=false
          changed_when: true

        - name: Prove in-place aggregate firewall shrink without a Node readiness flap
          ansible.builtin.command:
            argv:
              - /opt/e2e/scripts/verify-node-load-balancer.py
              - --state
              - "{{ e2e_state_file }}"
              - --kubeconfig
              - "{{ e2e_kubeconfig }}"
              - --expect
              - present
              - --baseline
              - "{{ e2e_node_lb_baseline }}"
              - --service
              - inspace-e2e-node-traefik
              - --anchor
              - "{{ e2e_node_lb_expanded_snapshot }}"
              - --policy-change
              - shrunk
          register: e2e_node_lb_shrunk_proof
          changed_when: false
          retries: 180
          delay: 10
          until: e2e_node_lb_shrunk_proof.rc == 0
          no_log: true

        - name: Recreate the same shared sibling Service name
          ansible.builtin.command:
            argv:
              - kubectl
              - apply
              - --server-side
              - --field-manager=inspace-e2e
              - -f
              - "{{ e2e_node_lb_shared_expansion_manifest }}"
          changed_when: true

        - name: Journal the recreated shared sibling UID
          ansible.builtin.command:
            argv:
              - /opt/e2e/scripts/persist-workload.py
              - --state
              - "{{ e2e_state_file }}"
              - --kubeconfig
              - "{{ e2e_kubeconfig }}"
          changed_when: true
          no_log: true

        - name: Prove same-name new-UID recreation reuses the aggregate shard firewall safely
          ansible.builtin.command:
            argv:
              - /opt/e2e/scripts/verify-node-load-balancer.py
              - --state
              - "{{ e2e_state_file }}"
              - --kubeconfig
              - "{{ e2e_kubeconfig }}"
              - --expect
              - present
              - --baseline
              - "{{ e2e_node_lb_baseline }}"
              - --service
              - inspace-e2e-node-traefik
              - --service
              - inspace-e2e-node-shared-b
              - --anchor
              - "{{ e2e_node_lb_expanded_snapshot }}"
              - --policy-change
              - same
              - --require-new-uid
              - inspace-e2e-node-shared-b
          register: e2e_node_lb_recreated_proof
          changed_when: false
          retries: 180
          delay: 10
          until: e2e_node_lb_recreated_proof.rc == 0
          no_log: true

        - name: Persist the recreated shared aggregate firewall snapshot
          ansible.builtin.copy:
            content: "{{ e2e_node_lb_recreated_proof.stdout }}\n"
            dest: "{{ e2e_node_lb_recreated_snapshot }}"
            mode: "0600"
          no_log: true

        - name: Add the conflicting shared and dedicated Node-LB Services
          ansible.builtin.command:
            argv:
              - kubectl
              - apply
              - --server-side
              - --field-manager=inspace-e2e
              - -f
              - "{{ e2e_node_lb_expansion_manifest }}"
          changed_when: true

        - name: Journal every Node-LB identity before the full convergence proof
          ansible.builtin.command:
            argv:
              - /opt/e2e/scripts/persist-workload.py
              - --state
              - "{{ e2e_state_file }}"
              - --kubeconfig
              - "{{ e2e_kubeconfig }}"
          changed_when: true
          no_log: true

        - name: Prove Node-LB Kubernetes cloud and ownership convergence
          ansible.builtin.command:
            argv:
              - /opt/e2e/scripts/verify-node-load-balancer.py
              - --state
              - "{{ e2e_state_file }}"
              - --kubeconfig
              - "{{ e2e_kubeconfig }}"
              - --expect
              - present
              - --baseline
              - "{{ e2e_node_lb_baseline }}"
              - --anchor
              - "{{ e2e_node_lb_recreated_snapshot }}"
              - --policy-change
              - same
          register: e2e_node_lb_proof
          changed_when: false
          retries: 180
          delay: 10
          until: e2e_node_lb_proof.rc == 0
          no_log: true

        - name: Read the converged Node-LB proof
          ansible.builtin.set_fact:
            e2e_node_lb_result: "{{ e2e_node_lb_proof.stdout | from_json }}"
          no_log: true

        - name: Prove every public Node-LB TCP port reaches its exact backend
          ansible.builtin.uri:
            url: "http://{{ item.ip }}:{{ item.port }}/"
            return_content: true
            timeout: 10
            use_proxy: false
          loop: "{{ e2e_node_lb_result.httpProbes }}"
          loop_control:
            label: "{{ item.service }} via {{ item.ip }}:{{ item.port }}"
          register: e2e_node_lb_http
          retries: 60
          delay: 5
          until: >-
            e2e_node_lb_http.status == 200 and
            (e2e_node_lb_http.content | trim) ==
            (e2e_marker ~ '-' ~ item.markerSuffix)

        - name: Require Cilium to report no duplicate Node-LB frontend ownership
          ansible.builtin.shell: |
            set -euo pipefail
            pods=$(kubectl -n kube-system get pods -l k8s-app=cilium \
              -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}')
            test -n "$pods"
            while IFS= read -r pod; do
              logs=$(kubectl -n kube-system logs "$pod" -c cilium-agent \
                --since=30m --tail=-1)
              if grep -Fqi 'frontend already owned by another service' <<<"$logs"; then
                printf 'Cilium/%s reported duplicate frontend ownership\n' "$pod" >&2
                exit 1
              fi
            done <<<"$pods"
          args:
            executable: /bin/bash
          changed_when: false

        - name: Stop the retained Traefik continuity probe after all mutations
          ansible.builtin.file:
            path: "{{ e2e_node_lb_probe_stop }}"
            state: touch

        - name: Require every retained Traefik continuity probe to have succeeded
          ansible.builtin.async_status:
            jid: "{{ e2e_node_lb_continuity_job.ansible_job_id }}"
          register: e2e_node_lb_continuity_result
          changed_when: false
          retries: 30
          delay: 1
          until: e2e_node_lb_continuity_result.finished
          no_log: true

        - name: Select the dedicated shard for background-delete recovery
          ansible.builtin.set_fact:
            e2e_node_lb_background_shard: >-
              {{ e2e_node_lb_result.services['inspace-e2e-node-dedicated'].shard }}
          no_log: true

        - name: Capture the exact dedicated NodePool UID before background deletion
          ansible.builtin.command:
            argv:
              - kubectl
              - get
              - nodepool
              - "{{ e2e_node_lb_background_shard }}"
              - -o
              - jsonpath={.metadata.uid}
          register: e2e_node_lb_background_pool_uid
          changed_when: false
          no_log: true

        - name: Capture the exact dedicated NodeClaim UID before background deletion
          ansible.builtin.command:
            argv:
              - kubectl
              - get
              - nodeclaims
              - -l
              - "karpenter.sh/nodepool={{ e2e_node_lb_background_shard }}"
              - -o
              - 'jsonpath={range .items[*]}{.metadata.uid}{"\n"}{end}'
          register: e2e_node_lb_background_claim_uid
          changed_when: false
          failed_when: >-
            e2e_node_lb_background_claim_uid.rc != 0 or
            (e2e_node_lb_background_claim_uid.stdout_lines | length) != 1
          no_log: true

        - name: Start a user-style background deletion of the dedicated NodePool
          ansible.builtin.command:
            argv:
              - kubectl
              - delete
              - nodepool
              - "{{ e2e_node_lb_background_shard }}"
              - --cascade=background
              - --wait=false
          changed_when: true

        - name: Require CCM to upgrade the same live owner to foreground deletion
          ansible.builtin.shell: |
            set -euo pipefail
            pool_uid=$(kubectl get nodepool "{{ e2e_node_lb_background_shard }}" -o jsonpath='{.metadata.uid}')
            finalizers=$(kubectl get nodepool "{{ e2e_node_lb_background_shard }}" -o jsonpath='{.metadata.finalizers}')
            claim_uids=$(kubectl get nodeclaims \
              -l "karpenter.sh/nodepool={{ e2e_node_lb_background_shard }}" \
              -o jsonpath='{range .items[*]}{.metadata.uid}{"\n"}{end}')
            test "$pool_uid" = "{{ e2e_node_lb_background_pool_uid.stdout }}"
            test "$claim_uids" = "{{ e2e_node_lb_background_claim_uid.stdout }}"
            grep -qw foregroundDeletion <<<"$finalizers"
          args:
            executable: /bin/bash
          register: e2e_node_lb_background_upgrade
          changed_when: false
          retries: 90
          delay: 1
          until: e2e_node_lb_background_upgrade.rc == 0
          no_log: true
      always:
        - name: Stop any retained Node-LB continuity probe before cleanup
          ansible.builtin.file:
            path: "{{ e2e_node_lb_probe_stop }}"
            state: touch
          when: e2e_node_lb_continuity_job is defined

        - name: Delete every Node-LB acceptance Service and workload owner
          ansible.builtin.command:
            argv:
              - kubectl
              - delete
              - -f
              - "{{ e2e_node_lb_expansion_manifest }}"
              - -f
              - "{{ e2e_node_lb_shared_expansion_manifest }}"
              - -f
              - "{{ e2e_node_lb_manifest }}"
              - --ignore-not-found
              - --wait=false
          changed_when: true

        - name: Require Node-LB Services datapaths NodePools firewalls VMs and FIPs to disappear
          ansible.builtin.command:
            argv:
              - /opt/e2e/scripts/verify-node-load-balancer.py
              - --state
              - "{{ e2e_state_file }}"
              - --kubeconfig
              - "{{ e2e_kubeconfig }}"
              - --expect
              - absent
              - --immutable-baseline
              - "{{ e2e_baseline_inventory_file }}"
          register: e2e_node_lb_absent
          changed_when: false
          retries: 180
          delay: 10
          until: e2e_node_lb_absent.rc == 0
          no_log: true

        - name: Delete the generated Node-LB NodeClass after its shards are gone
          ansible.builtin.command:
            argv:
              - kubectl
              - delete
              - inspacenodeclass
              - -l
              - "inspace.cloud/node-lb-managed=true,inspace.cloud/node-lb-cluster={{ e2e_state.clusterName }}"
              - --ignore-not-found
              - --wait=true
              - --timeout=5m
          changed_when: true

        - name: Require exact pre-Node-LB account inventory after cleanup
          ansible.builtin.command:
            argv:
              - /opt/e2e/scripts/account-inventory.py
              - compare
              - --baseline
              - "{{ e2e_node_lb_baseline }}"
          register: e2e_node_lb_inventory_cleanup
          changed_when: false
          retries: 30
          delay: 10
          until: e2e_node_lb_inventory_cleanup.rc == 0
          no_log: true

    - name: Render the public-node-local static edge capacity
      ansible.builtin.template:
        src: templates/public-node-local-capacity.yaml.j2
        dest: "{{ e2e_public_local_capacity_manifest }}"
        mode: "0600"

    - name: Render the public-node-local Service
      ansible.builtin.template:
        src: templates/public-node-local-service.yaml.j2
        dest: "{{ e2e_public_local_service_manifest }}"
        mode: "0600"

    - name: Exercise user-owned endpoint-local public capacity
      block:
        - name: Create the public-node-local NodeClass NodePool and workload
          ansible.builtin.command:
            argv:
              - kubectl
              - apply
              - --server-side
              - --field-manager=inspace-e2e
              - -f
              - "{{ e2e_public_local_capacity_manifest }}"
          changed_when: true

        - name: Wait for static public-node-local capacity before Service authorization
          ansible.builtin.shell: |
            set -euo pipefail
            pool={{ e2e_public_local_nodepool_name | quote }}
            label={{ ('karpenter.sh/nodepool=' + e2e_public_local_nodepool_name) | quote }}
            nodes=$(kubectl get nodes -l "$label" -o json)
            test "$(jq '.items | length' <<<"$nodes")" -eq 1
            jq -e 'all(.items[];
              any(.status.conditions[]?; .type == "Ready" and .status == "True"))' <<<"$nodes"
            test "$(kubectl get nodeclaims -l "$label" -o json | jq '.items | length')" -eq 1
          args:
            executable: /bin/bash
          register: e2e_public_local_capacity_ready
          changed_when: false
          retries: 60
          delay: 10
          until: e2e_public_local_capacity_ready.rc == 0

        - name: Create the public-node-local Service
          ansible.builtin.command:
            argv:
              - kubectl
              - apply
              - --server-side
              - --field-manager=inspace-e2e
              - -f
              - "{{ e2e_public_local_service_manifest }}"
          changed_when: true

        - name: Journal the public-node-local Service UID before cloud convergence
          ansible.builtin.shell: |
            set -euo pipefail
            uid=$(kubectl -n default get service/inspace-e2e-public-local -o jsonpath='{.metadata.uid}')
            test -n "$uid"
            /opt/e2e/scripts/state-update.py \
              "{{ e2e_state_file }}" publicLocalServiceUID \
              "$(jq -cn --arg value "$uid" '$value')"
          args:
            executable: /bin/bash
          register: e2e_public_local_uid_journal
          changed_when: true

        - name: Wait for CCM to authorize the edge Node and schedule its local Pod
          ansible.builtin.shell: |
            set -euo pipefail
            label={{ ('karpenter.sh/nodepool=' + e2e_public_local_nodepool_name) | quote }}
            pool={{ e2e_public_local_pool | quote }}
            nodes=$(kubectl get nodes -l "$label" -o json)
            test "$(jq '.items | length' <<<"$nodes")" -eq 1
            jq -e --arg pool "$pool" 'all(.items[];
              .metadata.labels["inspace.cloud.node-restriction.kubernetes.io/public-local-pool"] == $pool)' <<<"$nodes"
            kubectl -n default rollout status deployment/inspace-e2e-public-local --timeout=30s
          args:
            executable: /bin/bash
          register: e2e_public_local_authorized
          changed_when: false
          retries: 180
          delay: 10
          until: e2e_public_local_authorized.rc == 0

        - name: Prove public-node-local TCP UDP status firewall FIP identity and client source
          ansible.builtin.command:
            argv:
              - /opt/e2e/scripts/verify-public-node-local.py
              - --state
              - "{{ e2e_state_file }}"
              - --kubeconfig
              - "{{ e2e_kubeconfig }}"
              - --baseline
              - "{{ e2e_node_lb_baseline }}"
              - --expect
              - present
              - --probe-public
          register: e2e_public_local_present
          changed_when: false
          retries: 180
          delay: 10
          until: e2e_public_local_present.rc == 0
          no_log: true

        - name: Persist the established public-node-local VM and FIP identity
          ansible.builtin.copy:
            content: "{{ e2e_public_local_present.stdout }}\n"
            dest: "{{ e2e_public_local_snapshot }}"
            mode: "0600"
          no_log: true

        - name: Remove every local endpoint while retaining static edge capacity
          ansible.builtin.command:
            argv:
              - kubectl
              - -n
              - default
              - scale
              - deployment/inspace-e2e-public-local
              - --replicas=0
          changed_when: true

        - name: Prove endpoint loss withdraws status and firewall but preserves the FIP
          ansible.builtin.command:
            argv:
              - /opt/e2e/scripts/verify-public-node-local.py
              - --state
              - "{{ e2e_state_file }}"
              - --kubeconfig
              - "{{ e2e_kubeconfig }}"
              - --baseline
              - "{{ e2e_node_lb_baseline }}"
              - --expect
              - withdrawn
              - --anchor
              - "{{ e2e_public_local_snapshot }}"
          register: e2e_public_local_withdrawn
          changed_when: false
          retries: 180
          delay: 10
          until: e2e_public_local_withdrawn.rc == 0
          no_log: true

        - name: Restore the endpoint-local workload
          ansible.builtin.command:
            argv:
              - kubectl
              - -n
              - default
              - scale
              - deployment/inspace-e2e-public-local
              - --replicas=1
          changed_when: true

        - name: Wait for the restored endpoint-local workload
          ansible.builtin.command:
            argv:
              - kubectl
              - -n
              - default
              - rollout
              - status
              - deployment/inspace-e2e-public-local
              - --timeout=10m
          changed_when: false

        - name: Prove the same public-node-local FIP is republished
          ansible.builtin.command:
            argv:
              - /opt/e2e/scripts/verify-public-node-local.py
              - --state
              - "{{ e2e_state_file }}"
              - --kubeconfig
              - "{{ e2e_kubeconfig }}"
              - --baseline
              - "{{ e2e_node_lb_baseline }}"
              - --expect
              - present
          register: e2e_public_local_restored
          changed_when: false
          retries: 180
          delay: 10
          until: >-
            e2e_public_local_restored.rc == 0 and
            (e2e_public_local_restored.stdout | from_json).statusIPs ==
            (lookup('file', e2e_public_local_snapshot) | from_json).statusIPs
          no_log: true

        - name: Delete the established edge NodeClaim to force static replacement
          ansible.builtin.shell: |
            set -euo pipefail
            claim=$(jq -er '.nodes[0].nodeClaim' {{ e2e_public_local_snapshot | quote }})
            kubectl delete nodeclaim "$claim" --wait=false
          args:
            executable: /bin/bash
          changed_when: true

        - name: Prove replacement rotates capacity and reconverges the live Service
          ansible.builtin.command:
            argv:
              - /opt/e2e/scripts/verify-public-node-local.py
              - --state
              - "{{ e2e_state_file }}"
              - --kubeconfig
              - "{{ e2e_kubeconfig }}"
              - --baseline
              - "{{ e2e_node_lb_baseline }}"
              - --expect
              - present
              - --anchor
              - "{{ e2e_public_local_snapshot }}"
              - --probe-public
          register: e2e_public_local_replaced
          changed_when: false
          retries: 240
          delay: 10
          until: e2e_public_local_replaced.rc == 0
          no_log: true

        - name: Persist the replacement VM and FIP identity for cleanup proof
          ansible.builtin.copy:
            content: "{{ e2e_public_local_replaced.stdout }}\n"
            dest: "{{ e2e_public_local_snapshot }}"
            mode: "0600"
          no_log: true

        - name: Delete the public-node-local Service immediately after exposure checks
          ansible.builtin.command:
            argv:
              - kubectl
              - -n
              - default
              - delete
              - service/inspace-e2e-public-local
              - --wait=false
          changed_when: true

        - name: Prove Service cleanup preserves its user-owned VM and FIP
          ansible.builtin.command:
            argv:
              - /opt/e2e/scripts/verify-public-node-local.py
              - --state
              - "{{ e2e_state_file }}"
              - --kubeconfig
              - "{{ e2e_kubeconfig }}"
              - --baseline
              - "{{ e2e_node_lb_baseline }}"
              - --expect
              - service-absent
              - --anchor
              - "{{ e2e_public_local_snapshot }}"
          register: e2e_public_local_service_absent
          changed_when: false
          retries: 180
          delay: 10
          until: e2e_public_local_service_absent.rc == 0
          no_log: true

        - name: Delete the public-node-local workload before static capacity
          ansible.builtin.command:
            argv:
              - kubectl
              - -n
              - default
              - delete
              - deployment/inspace-e2e-public-local
              - --ignore-not-found
              - --wait=false
          changed_when: true

        - name: Delete the public-node-local static NodePool
          ansible.builtin.command:
            argv:
              - kubectl
              - delete
              - nodepool
              - "{{ e2e_public_local_nodepool_name }}"
              - --ignore-not-found
              - --wait=false
          changed_when: true

        - name: Wait for public-node-local static capacity cleanup
          ansible.builtin.shell: |
            set -euo pipefail
            pool={{ e2e_public_local_nodepool_name | quote }}
            test "$(kubectl get nodeclaims -l "karpenter.sh/nodepool=$pool" -o json | jq '.items | length')" -eq 0
            test "$(kubectl get nodes -l "karpenter.sh/nodepool=$pool" -o json | jq '.items | length')" -eq 0
            test -z "$(kubectl get nodepool "$pool" --ignore-not-found -o name)"
          args:
            executable: /bin/bash
          register: e2e_public_local_capacity_absent
          changed_when: false
          retries: 180
          delay: 10
          until: e2e_public_local_capacity_absent.rc == 0

        - name: Delete the public-node-local NodeClass after capacity is gone
          ansible.builtin.command:
            argv:
              - kubectl
              - delete
              - inspacenodeclass
              - "{{ e2e_public_local_nodeclass_name }}"
              - --ignore-not-found
              - --wait=true
              - --timeout=5m
          changed_when: true

        - name: Require complete public-node-local capacity and cloud cleanup
          ansible.builtin.command:
            argv:
              - /opt/e2e/scripts/verify-public-node-local.py
              - --state
              - "{{ e2e_state_file }}"
              - --kubeconfig
              - "{{ e2e_kubeconfig }}"
              - --baseline
              - "{{ e2e_node_lb_baseline }}"
              - --expect
              - absent
          register: e2e_public_local_absent
          changed_when: false
          retries: 180
          delay: 10
          until: e2e_public_local_absent.rc == 0
          no_log: true

        - name: Require exact pre-public-node-local account inventory
          ansible.builtin.command:
            argv:
              - /opt/e2e/scripts/account-inventory.py
              - compare
              - --baseline
              - "{{ e2e_node_lb_baseline }}"
          register: e2e_public_local_inventory_cleanup
          changed_when: false
          retries: 30
          delay: 10
          until: e2e_public_local_inventory_cleanup.rc == 0
          no_log: true
      always:
        - name: Delete the public-node-local Service before fallback capacity cleanup
          ansible.builtin.command:
            argv:
              - kubectl
              - -n
              - default
              - delete
              - service/inspace-e2e-public-local
              - --ignore-not-found
              - --wait=false
          changed_when: true

        - name: Wait for the public-node-local firewall finalizer before capacity cleanup
          ansible.builtin.shell: |
            set -euo pipefail
            test -z "$(kubectl -n default get service/inspace-e2e-public-local --ignore-not-found -o name)"
          args:
            executable: /bin/bash
          register: e2e_public_local_fallback_service_absent
          changed_when: false
          retries: 180
          delay: 10
          until: e2e_public_local_fallback_service_absent.rc == 0

        - name: Delete the fallback public-node-local workload
          ansible.builtin.command:
            argv:
              - kubectl
              - -n
              - default
              - delete
              - deployment/inspace-e2e-public-local
              - --ignore-not-found
              - --wait=false
          changed_when: true

        - name: Delete the fallback public-node-local NodePool
          ansible.builtin.command:
            argv:
              - kubectl
              - delete
              - nodepool
              - "{{ e2e_public_local_nodepool_name }}"
              - --ignore-not-found
              - --wait=false
          changed_when: true

        - name: Wait for fallback public-node-local capacity cleanup
          ansible.builtin.shell: |
            set -euo pipefail
            pool={{ e2e_public_local_nodepool_name | quote }}
            test "$(kubectl get nodeclaims -l "karpenter.sh/nodepool=$pool" -o json | jq '.items | length')" -eq 0
            test "$(kubectl get nodes -l "karpenter.sh/nodepool=$pool" -o json | jq '.items | length')" -eq 0
            test -z "$(kubectl get nodepool "$pool" --ignore-not-found -o name)"
          args:
            executable: /bin/bash
          register: e2e_public_local_fallback_capacity_absent
          changed_when: false
          retries: 180
          delay: 10
          until: e2e_public_local_fallback_capacity_absent.rc == 0

        - name: Delete the fallback public-node-local NodeClass
          ansible.builtin.command:
            argv:
              - kubectl
              - delete
              - inspacenodeclass
              - "{{ e2e_public_local_nodeclass_name }}"
              - --ignore-not-found
              - --wait=true
              - --timeout=5m
          changed_when: true

        - name: Reprove complete public-node-local cleanup after fallback
          ansible.builtin.command:
            argv:
              - /opt/e2e/scripts/verify-public-node-local.py
              - --state
              - "{{ e2e_state_file }}"
              - --kubeconfig
              - "{{ e2e_kubeconfig }}"
              - --baseline
              - "{{ e2e_node_lb_baseline }}"
              - --expect
              - absent
          register: e2e_public_local_fallback_absent
          changed_when: false
          retries: 180
          delay: 10
          until: e2e_public_local_fallback_absent.rc == 0
          no_log: true
          when: e2e_public_local_uid_journal is defined and e2e_public_local_uid_journal.rc == 0

        - name: Restore exact pre-public-node-local account inventory after fallback
          ansible.builtin.command:
            argv:
              - /opt/e2e/scripts/account-inventory.py
              - compare
              - --baseline
              - "{{ e2e_node_lb_baseline }}"
          register: e2e_public_local_fallback_inventory
          changed_when: false
          retries: 30
          delay: 10
          until: e2e_public_local_fallback_inventory.rc == 0
          no_log: true

    - name: Mark the full RKE2 CCM CSI Karpenter acceptance suite complete
      ansible.builtin.command:
        argv:
          - /opt/e2e/scripts/state-update.py
          - "{{ e2e_state_file }}"
          - testComplete
          - "true"
      changed_when: true

    - name: Mark the combined acceptance lifecycle complete
      ansible.builtin.command:
        argv:
          - /opt/e2e/scripts/state-update.py
          - "{{ e2e_state_file }}"
          - completed
          - "true"
      changed_when: true

    - name: Report acceptance completion
      ansible.builtin.debug:
        msg: >-
          Full InSpace RKE2/Cilium-native-routing/kube-proxy-replacement,
          CCM, CSI RWO, Karpenter, two same-port private LB-IPAM/L2 VIPs,
          L2 lease failover, explicit paid TCP NLB, and shared/conflict/dedicated
          public-Proxy/private-VIP NodeLB TCP/UDP/ICMP and aggregate-firewall mutation safety
          E2E passed; cleanup follows.
