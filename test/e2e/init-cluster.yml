---
- name: Provision the RKE2 control plane through the product bootstrap controller
  hosts: localhost
  gather_facts: false
  vars:
    e2e_run_id: "{{ lookup('env', 'E2E_RUN_ID') }}"
    e2e_state_dir: "{{ lookup('env', 'E2E_STATE_DIR') }}"
    e2e_cluster_resource_name: "inspace-e2e-{{ lookup('env', 'E2E_RUN_ID') }}"
    e2e_cluster_name: "inspace-e2e-{{ lookup('env', 'E2E_RUN_ID') }}"
    e2e_nodeclass_name: "inspace-e2e-workers-{{ lookup('env', 'E2E_RUN_ID') }}"
    e2e_nodepool_name: "general"
    e2e_cluster_file: "{{ lookup('env', 'E2E_STATE_DIR') }}/cluster.yaml"
    e2e_state_file: "{{ lookup('env', 'E2E_STATE_DIR') }}/state.json"
    e2e_token_file: "{{ lookup('env', 'E2E_STATE_DIR') }}/rke2-token"
    e2e_bootstrap_cache_key_file: "{{ lookup('env', 'E2E_STATE_DIR') }}/bootstrap-cache-key"
    e2e_bootstrap_cache_not_before_file: "{{ lookup('env', 'E2E_STATE_DIR') }}/bootstrap-cache-not-before"
    e2e_kubeconfig: "{{ lookup('env', 'E2E_STATE_DIR') }}/kubeconfig.yaml"
    e2e_bootstrap_result_file: "{{ lookup('env', 'E2E_STATE_DIR') }}/bootstrap-result.json"
    e2e_bootstrap_cache_ca_file: "{{ lookup('env', 'E2E_STATE_DIR') }}/bootstrap-cache-ca.crt"
    e2e_baseline_inventory_file: "{{ lookup('env', 'E2E_STATE_DIR') }}/baseline-inventory.json"
    e2e_ssh_config: "{{ lookup('env', 'E2E_STATE_DIR') }}/ssh-config"
    e2e_virtual_ip: "{{ lookup('env', 'INSPACE_CONTROL_PLANE_VIP') }}"
    e2e_private_lb_pool_start: "{{ lookup('env', 'INSPACE_PRIVATE_LOAD_BALANCER_POOL_START') }}"
    e2e_private_lb_pool_stop: "{{ lookup('env', 'INSPACE_PRIVATE_LOAD_BALANCER_POOL_STOP') }}"
    e2e_ssh_user: "{{ lookup('env', 'INSPACE_E2E_SSH_USERNAME') | default('inspacee2e', true) }}"
    e2e_api_base: "{{ lookup('env', 'INSPACE_API_URL') | regex_replace('/+$', '') }}/v1/{{ lookup('env', 'INSPACE_LOCATION') }}"
  tasks:
    - name: Require an exact released version and isolated-account confirmation
      ansible.builtin.assert:
        that:
          - lookup('env', 'INSPACE_E2E_VERSION') is match('^[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?$')
          - lookup('env', 'CONFIRM_INSPACE_CLUSTER_E2E') == lookup('env', 'INSPACE_BILLING_ACCOUNT_ID')
          - e2e_run_id | length <= 24
          - e2e_run_id is match('^[a-z0-9](?:[a-z0-9-]*[a-z0-9])?$')
          - e2e_ssh_user is match('^[a-z_][a-z0-9_-]{0,31}$')

    - name: Require a private control-plane VIP and bounded private Service VIP range
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - >-
            import ipaddress,sys;
            vip,start,stop=map(ipaddress.ip_address,sys.argv[1:]);
            assert all(a.version == 4 and a.is_private and not a.is_loopback and not a.is_multicast for a in (vip,start,stop));
            assert all(str(a) == raw for a,raw in zip((vip,start,stop),sys.argv[1:]));
            assert int(start) <= int(stop) and 16 <= int(stop)-int(start)+1 <= 256;
            assert not int(start) <= int(vip) <= int(stop);
            assert all(a not in ipaddress.ip_network('10.42.0.0/16') and a not in ipaddress.ip_network('10.43.0.0/16') for a in (start,stop))
          - "{{ e2e_virtual_ip }}"
          - "{{ e2e_private_lb_pool_start }}"
          - "{{ e2e_private_lb_pool_stop }}"
      changed_when: false

    - name: Detect the runner public IPv4
      ansible.builtin.uri:
        url: https://api.ipify.org
        return_content: true
        timeout: 30
      register: e2e_management_ip_response
      retries: 5
      delay: 3
      until: e2e_management_ip_response.status == 200

    - name: Validate the runner public IPv4
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - >-
            import ipaddress,sys;
            a=ipaddress.ip_address(sys.argv[1]);
            assert a.version == 4 and not a.is_private and not a.is_loopback and not a.is_multicast
          - "{{ e2e_management_ip_response.content | trim }}"
      changed_when: false

    - name: Record deterministic lifecycle facts
      ansible.builtin.set_fact:
        e2e_management_cidr: "{{ e2e_management_ip_response.content | trim }}/32"
        e2e_owner: "{{ ('inspace-e2e/' + e2e_cluster_resource_name) | hash('sha256') | truncate(16, true, '') }}"
        e2e_ssh_public_key: "{{ lookup('file', lookup('env', 'E2E_PUBLIC_KEY')) | trim }}"

    - name: Check whether an RKE2 token already exists for a resumed run
      ansible.builtin.stat:
        path: "{{ e2e_token_file }}"
      register: e2e_token_stat

    - name: Generate the RKE2 registration token inside the runner
      ansible.builtin.command:
        argv: [openssl, rand, -hex, "32"]
      register: e2e_generated_token
      no_log: true
      when: not e2e_token_stat.stat.exists

    - name: Persist the RKE2 registration token with restrictive permissions
      ansible.builtin.copy:
        content: "{{ e2e_generated_token.stdout }}"
        dest: "{{ e2e_token_file }}"
        mode: "0600"
      no_log: true
      when: not e2e_token_stat.stat.exists

    - name: Check whether a bootstrap cache key already exists for a resumed run
      ansible.builtin.stat:
        path: "{{ e2e_bootstrap_cache_key_file }}"
      register: e2e_bootstrap_cache_key_stat

    - name: Generate the 256-bit bootstrap cache key inside the runner
      ansible.builtin.command:
        argv: [openssl, rand, -hex, "32"]
      register: e2e_generated_bootstrap_cache_key
      no_log: true
      when: not e2e_bootstrap_cache_key_stat.stat.exists

    - name: Persist the bootstrap cache key with restrictive permissions
      ansible.builtin.copy:
        content: "{{ e2e_generated_bootstrap_cache_key.stdout }}"
        dest: "{{ e2e_bootstrap_cache_key_file }}"
        mode: "0600"
      no_log: true
      when: not e2e_bootstrap_cache_key_stat.stat.exists

    - name: Inspect the persisted bootstrap cache key
      ansible.builtin.stat:
        path: "{{ e2e_bootstrap_cache_key_file }}"
      register: e2e_persisted_bootstrap_cache_key

    - name: Require an exact persisted 32-byte bootstrap cache key
      ansible.builtin.assert:
        that:
          - e2e_persisted_bootstrap_cache_key.stat.isreg
          - e2e_persisted_bootstrap_cache_key.stat.mode == '0600'
          - lookup('file', e2e_bootstrap_cache_key_file) is match('^[0-9a-f]{64}$')
        fail_msg: "The persisted bootstrap cache key must be mode 0600 and exactly 64 lowercase hexadecimal characters."
      no_log: true

    - name: Check whether a bootstrap cache certificate epoch already exists
      ansible.builtin.stat:
        path: "{{ e2e_bootstrap_cache_not_before_file }}"
      register: e2e_bootstrap_cache_not_before_stat

    - name: Capture the bootstrap cache certificate epoch at cluster initialization
      ansible.builtin.command:
        argv: [date, -u, "+%Y-%m-%dT%H:%M:%SZ"]
      register: e2e_generated_bootstrap_cache_not_before
      when: not e2e_bootstrap_cache_not_before_stat.stat.exists

    - name: Persist the bootstrap cache certificate epoch with restrictive permissions
      ansible.builtin.copy:
        content: "{{ e2e_generated_bootstrap_cache_not_before.stdout }}"
        dest: "{{ e2e_bootstrap_cache_not_before_file }}"
        mode: "0600"
      when: not e2e_bootstrap_cache_not_before_stat.stat.exists

    - name: Inspect the persisted bootstrap cache certificate epoch
      ansible.builtin.stat:
        path: "{{ e2e_bootstrap_cache_not_before_file }}"
      register: e2e_persisted_bootstrap_cache_not_before

    - name: Require an exact persisted UTC bootstrap cache certificate epoch
      ansible.builtin.assert:
        that:
          - e2e_persisted_bootstrap_cache_not_before.stat.isreg
          - e2e_persisted_bootstrap_cache_not_before.stat.mode == '0600'
          - lookup('file', e2e_bootstrap_cache_not_before_file) is match('^[0-9]{4}-(0[1-9]|1[0-2])-([0-2][0-9]|3[01])T([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]Z$')
        fail_msg: "The persisted bootstrap cache certificate epoch must be mode 0600 UTC RFC3339."

    - name: Render the RKE2 bootstrap resource
      ansible.builtin.template:
        src: templates/cluster.yaml.j2
        dest: "{{ e2e_cluster_file }}"
        mode: "0600"

    - name: Verify released OCI charts exist before creating infrastructure
      ansible.builtin.command:
        argv:
          - helm
          - show
          - chart
          - "oci://ghcr.io/thanet-s/charts/{{ item }}"
          - --version
          - "{{ lookup('env', 'INSPACE_E2E_VERSION') }}"
      changed_when: false
      loop:
        - inspace-cloud-kube-modules-crds
        - inspace-cloud-kube-modules

    - name: Verify all released controller images exist before creating infrastructure
      ansible.builtin.command:
        argv:
          - skopeo
          - inspect
          - --retry-times
          - "5"
          - "docker://ghcr.io/thanet-s/{{ item }}:{{ lookup('env', 'INSPACE_E2E_VERSION') }}"
      changed_when: false
      loop:
        - inspace-cloud-controller-manager
        - inspace-csi-driver
        - karpenter-provider-inspace

    - name: Inspect the pinned kube-vip release before infrastructure creation
      ansible.builtin.command:
        argv:
          - skopeo
          - inspect
          - --retry-times
          - "5"
          - docker://ghcr.io/kube-vip/kube-vip:v1.2.1
      register: e2e_kube_vip_image
      changed_when: false

    - name: Require the audited kube-vip manifest digest
      ansible.builtin.assert:
        that:
          - (e2e_kube_vip_image.stdout | from_json).Digest == 'sha256:49b77655f9f109bedc5eb25723bb0e4c57d8513ba33cc69c31be3f243eb2386d'
        fail_msg: "kube-vip v1.2.1 tag no longer resolves to the audited digest"

    - name: Audit that this deterministic identity has no pre-existing resources
      ansible.builtin.command:
        argv:
          - /opt/e2e/scripts/cloud-audit.py
          - --state
          - "{{ e2e_state_file }}"
          - --owner
          - "{{ e2e_owner }}"
          - --cluster
          - "{{ e2e_cluster_name }}"
          - --nodepool
          - "{{ e2e_nodepool_name }}"
      environment:
        E2E_AUDIT_ALLOW_MISSING_STATE: "true"
      register: e2e_baseline_audit
      changed_when: false
      no_log: true

    - name: Refuse to adopt pre-existing resources
      ansible.builtin.assert:
        that: (e2e_baseline_audit.stdout | from_json).count == 0
        fail_msg: "The deterministic E2E identity already owns cloud resources; refusing adoption"

    - name: Capture every API-visible billable resource before mutation
      ansible.builtin.command:
        argv:
          - /opt/e2e/scripts/account-inventory.py
          - capture
          - --output
          - "{{ e2e_baseline_inventory_file }}"
      register: e2e_baseline_inventory
      changed_when: true
      no_log: true

    - name: Require the dedicated test account to contain no billable resources
      ansible.builtin.assert:
        that: >-
          ((e2e_baseline_inventory.stdout | from_json).counts.vms | int) == 0 and
          ((e2e_baseline_inventory.stdout | from_json).counts.firewalls | int) == 0 and
          ((e2e_baseline_inventory.stdout | from_json).counts.floatingIPs | int) == 0 and
          ((e2e_baseline_inventory.stdout | from_json).counts.loadBalancers | int) == 0 and
          ((e2e_baseline_inventory.stdout | from_json).counts.disks | int) == 0
        fail_msg: >-
          The release E2E account is not empty; no mutation is allowed outside a
          dedicated account with zero VMs, firewalls, FIPs, NLBs, and disks.

    - name: Initialize the fail-closed ownership journal
      ansible.builtin.copy:
        content: >-
          {{ {
            'runID': e2e_run_id,
            'owner': e2e_owner,
            'clusterName': e2e_cluster_name,
            'clusterResourceName': e2e_cluster_resource_name,
            'clusterResourceNamespace': 'inspace-e2e',
            'nodeClassName': e2e_nodeclass_name,
            'nodePoolName': e2e_nodepool_name,
            'managementCIDR': e2e_management_cidr,
            'version': lookup('env', 'INSPACE_E2E_VERSION'),
            'virtualIPv4': e2e_virtual_ip,
            'privateLoadBalancerPoolStart': e2e_private_lb_pool_start,
            'privateLoadBalancerPoolStop': e2e_private_lb_pool_stop,
            'sshUsername': e2e_ssh_user,
            'kubernetesOwnersPossible': false,
            'initComplete': false,
            'testComplete': false,
            'completed': false,
            'retained': false
          } | to_nice_json }}
        dest: "{{ e2e_state_file }}"
        mode: "0600"

    - name: Persist that remote mutations may now begin
      ansible.builtin.copy:
        content: "remote mutations may exist\n"
        dest: "{{ e2e_state_dir }}/mutations-may-exist"
        mode: "0600"

    - name: Clear the preflight-only checkpoint before the first mutation
      ansible.builtin.file:
        path: "{{ e2e_state_dir }}/mutations-not-started"
        state: absent

    - name: Run the bootstrap reconciler synchronously to readiness
      ansible.builtin.command:
        argv:
          - inspace-cluster-controller
          - --cluster-config
          - "{{ e2e_cluster_file }}"
          - --ssh-public-key-file
          - "{{ lookup('env', 'E2E_PUBLIC_KEY') }}"
          - --ssh-username
          - "{{ e2e_ssh_user }}"
          - --management-cidr
          - "{{ e2e_management_cidr }}"
          - --management-tcp-ports
          - "22"
          - --until-ready
          - --interval
          - 15s
          - --output=json
      environment:
        INSPACE_ALLOW_REMOTE_MUTATIONS: "true"
        INSPACE_API_URL: "{{ lookup('env', 'INSPACE_API_URL') }}"
        INSPACE_API_TOKEN: "{{ lookup('env', 'INSPACE_API_TOKEN') }}"
        INSPACE_RKE2_TOKEN: "{{ lookup('file', e2e_token_file) | trim }}"
        INSPACE_BOOTSTRAP_CACHE_KEY: "{{ lookup('file', e2e_bootstrap_cache_key_file) | trim }}"
        INSPACE_BOOTSTRAP_CACHE_NOT_BEFORE: "{{ lookup('file', e2e_bootstrap_cache_not_before_file) | trim }}"
      register: e2e_bootstrap_wait
      changed_when: true
      no_log: true

    - name: Decode the final reconciler result
      ansible.builtin.set_fact:
        e2e_bootstrap_result: >-
          {{ (e2e_bootstrap_wait.stdout_lines | select('match', '^\{') | list | last) | from_json }}

    - name: Persist the reconciler result for authoritative cloud binding
      ansible.builtin.copy:
        content: "{{ e2e_bootstrap_result | to_nice_json }}\n"
        dest: "{{ e2e_bootstrap_result_file }}"
        mode: "0600"

    - name: Persist the public bootstrap cache CA for certificate verification
      ansible.builtin.copy:
        content: "{{ e2e_bootstrap_result.bootstrapCacheCABundle }}"
        dest: "{{ e2e_bootstrap_cache_ca_file }}"
        mode: "0600"

    - name: Prove the cache CA is ECDSA P-256 with exactly fifteen years from the persisted epoch
      ansible.builtin.shell: |
        set -euo pipefail
        ca_text=$(openssl x509 -in "{{ e2e_bootstrap_cache_ca_file }}" -noout -text)
        grep -Fq 'Public Key Algorithm: id-ecPublicKey' <<<"$ca_text"
        grep -Fq 'ASN1 OID: prime256v1' <<<"$ca_text"
        expected_not_before=$(cat "{{ e2e_bootstrap_cache_not_before_file }}")
        actual_not_before=$(openssl x509 -in "{{ e2e_bootstrap_cache_ca_file }}" -noout -startdate -dateopt iso_8601 | sed -e 's/^notBefore=//' -e 's/ /T/')
        actual_not_after=$(openssl x509 -in "{{ e2e_bootstrap_cache_ca_file }}" -noout -enddate -dateopt iso_8601 | sed -e 's/^notAfter=//' -e 's/ /T/')
        python3 - "$expected_not_before" "$actual_not_before" "$actual_not_after" <<'PY'
        import datetime
        import sys

        def parse(value):
            return datetime.datetime.strptime(value, "%Y-%m-%dT%H:%M:%SZ").replace(tzinfo=datetime.timezone.utc)

        expected = parse(sys.argv[1])
        actual_start = parse(sys.argv[2])
        actual_stop = parse(sys.argv[3])
        try:
            expected_stop = expected.replace(year=expected.year + 15)
        except ValueError:
            expected_stop = expected.replace(year=expected.year + 15, month=3, day=1)
        if actual_start != expected or actual_stop != expected_stop:
            raise SystemExit("bootstrap cache CA validity does not equal the persisted initialization epoch plus 15 years")
        PY
      args:
        executable: /bin/bash
      changed_when: false

    - name: Prove exact and parallel three-control-plane provisioning
      ansible.builtin.assert:
        that:
          - e2e_bootstrap_result.ready | bool
          - e2e_bootstrap_result.controlPlaneVMs | length == 3
          - e2e_bootstrap_result.controlPlaneVMs | unique | length == 3
          - e2e_bootstrap_result.maxParallelControlPlaneCreates | int == 3
          - e2e_bootstrap_result.controlPlaneEndpoint == 'https://' + e2e_virtual_ip + ':6443'
          - e2e_bootstrap_result.privateControlPlaneEndpoint == 'https://' + e2e_virtual_ip + ':6443'
          - e2e_bootstrap_result.privateRegistrationEndpoint == 'https://' + e2e_virtual_ip + ':9345'
          - e2e_bootstrap_result.bastionVMUUID | length > 0
          - e2e_bootstrap_result.bastionFirewallUUID | length > 0
          - e2e_bootstrap_result.bastionPublicIPv4 | length > 0
          - e2e_bootstrap_result.bastionPrivateIPv4 | length > 0
          - e2e_bootstrap_result.bootstrapCacheEndpoint == 'https://cache.' + e2e_cluster_name + '.inspace.internal:8443'
          - e2e_bootstrap_result.bootstrapCacheRegistry == 'cache.' + e2e_cluster_name + '.inspace.internal:8443'
          - e2e_bootstrap_result.bootstrapCacheAddress == e2e_bootstrap_result.bastionPrivateIPv4
          - e2e_bootstrap_result.bootstrapCacheCABundle is match('^-----BEGIN CERTIFICATE-----\n')
          - e2e_bootstrap_result.bootstrapCacheCABundle is search('-----END CERTIFICATE-----\n$')
          - e2e_bootstrap_result.apiLoadBalancerUUID is not defined
          - e2e_bootstrap_result.registrationLoadBalancerUUID is not defined
          - e2e_bootstrap_result.allocatedEndpointIPv4 is not defined
        fail_msg: "Bootstrap did not prove the fixed three-way concurrent RKE2 control plane"

    - name: Bind the result to exact VPC VMs egress FIPs firewalls and zero control NLBs
      ansible.builtin.command:
        argv:
          - /opt/e2e/scripts/discover-bootstrap.py
          - --state
          - "{{ e2e_state_file }}"
          - --result
          - "{{ e2e_bootstrap_result_file }}"
      register: e2e_bootstrap_cloud
      changed_when: true
      no_log: true

    - name: Reload the exact private bootstrap topology
      ansible.builtin.set_fact:
        e2e_state: "{{ lookup('file', e2e_state_file) | from_json }}"

    - name: Bind the parallel-create contract to the authoritative three VM identities
      ansible.builtin.assert:
        that:
          - e2e_state.controlPlanes | length == 3
          - e2e_state.controlPlanes | map(attribute='uuid') | list | unique | length == 3
          - e2e_state.controlPlanes | map(attribute='uuid') | list | difference(e2e_bootstrap_result.controlPlaneVMs) | length == 0
          - e2e_bootstrap_result.controlPlaneVMs | difference(e2e_state.controlPlanes | map(attribute='uuid') | list) | length == 0
          - (e2e_bootstrap_result.maxParallelControlPlaneCreates | int) == (e2e_state.controlPlanes | length)
        fail_msg: "The measured parallel-create batch is not the authoritative three-control-plane VM set"

    - name: Render the pinned bastion and private-node SSH configuration
      ansible.builtin.command:
        argv:
          - /opt/e2e/scripts/render-ssh-config.py
          - --state
          - "{{ e2e_state_file }}"
          - --output
          - "{{ e2e_ssh_config }}"
      changed_when: true

    - name: Add the exact public bastion host
      ansible.builtin.add_host:
        name: e2e-bastion
        groups: rke2_bastion
        ansible_host: e2e-bastion
        ansible_user: "{{ e2e_ssh_user }}"
        ansible_ssh_common_args: "-F {{ e2e_ssh_config }}"
        e2e_public_ip: "{{ e2e_state.bastionPublicIPv4 }}"
        e2e_private_ip: "{{ e2e_state.bastionPrivateIPv4 }}"
        e2e_node_name: "{{ e2e_state.bastionName }}"
        e2e_cache_address: "{{ e2e_state.bootstrapCacheAddress }}"
        e2e_cache_endpoint: "{{ e2e_state.bootstrapCacheEndpoint }}"
        e2e_cache_registry: "{{ e2e_state.bootstrapCacheRegistry }}"
        e2e_cache_ca_bundle: "{{ e2e_state.bootstrapCacheCABundle }}"

    - name: Add exactly three dynamic RKE2 control-plane hosts
      ansible.builtin.add_host:
        name: "rke2-cp-{{ '%02d' | format(e2e_cp_index + 1) }}"
        groups: rke2_control_plane
        ansible_host: "rke2-cp-{{ '%02d' | format(e2e_cp_index + 1) }}"
        ansible_user: "{{ e2e_ssh_user }}"
        ansible_ssh_common_args: "-F {{ e2e_ssh_config }}"
        e2e_node_name: "{{ item.name }}"
        e2e_vm_uuid: "{{ item.uuid }}"
        e2e_private_ip: "{{ item.privateIPv4 }}"
        e2e_public_ip: "{{ item.publicIPv4 }}"
        e2e_known_hosts: "{{ e2e_state_dir }}/known-hosts-cp-{{ e2e_cp_index }}"
        e2e_cache_address: "{{ e2e_state.bootstrapCacheAddress }}"
        e2e_cache_endpoint: "{{ e2e_state.bootstrapCacheEndpoint }}"
        e2e_cache_registry: "{{ e2e_state.bootstrapCacheRegistry }}"
        e2e_cache_ca_bundle: "{{ e2e_state.bootstrapCacheCABundle }}"
      loop: "{{ e2e_state.controlPlanes }}"
      loop_control:
        index_var: e2e_cp_index
        label: "{{ item.uuid }}"

    - name: Persist the observed creation concurrency in the ownership journal
      ansible.builtin.command:
        argv:
          - /opt/e2e/scripts/state-update.py
          - "{{ e2e_state_file }}"
          - maxParallelControlPlaneCreates
          - "{{ e2e_bootstrap_result.maxParallelControlPlaneCreates | int | string }}"
      changed_when: true

- name: Establish the pinned public bastion
  hosts: rke2_bastion
  gather_facts: false
  tasks:
    - name: Wait for the bastion public SSH port
      ansible.builtin.wait_for:
        host: "{{ e2e_public_ip }}"
        port: 22
        connect_timeout: 10
        sleep: 5
        timeout: 1200
      delegate_to: localhost

    - name: Scan the exact bastion host key
      ansible.builtin.command:
        argv: [ssh-keyscan, -T, "15", -H, "{{ e2e_public_ip }}"]
      register: e2e_bastion_keyscan
      delegate_to: localhost
      changed_when: false
      retries: 20
      delay: 5
      until: e2e_bastion_keyscan.rc == 0 and e2e_bastion_keyscan.stdout | length > 0

    - name: Pin the bastion host key before authentication
      ansible.builtin.copy:
        content: "{{ e2e_bastion_keyscan.stdout }}\n"
        dest: "{{ lookup('env', 'E2E_STATE_DIR') }}/known-hosts-bastion"
        mode: "0600"
      delegate_to: localhost

    - name: Wait for authenticated bastion SSH
      ansible.builtin.wait_for_connection:
        connect_timeout: 10
        sleep: 5
        timeout: 1200

    - name: Wait for bounded bastion cloud-init completion
      ansible.builtin.raw: >-
        timeout --kill-after=5s 4800s sh -c
        'cloud-init status --wait >/dev/null 2>&1 || test $? -eq 2'
      become: true
      changed_when: false

    - name: Prove the bastion private address Ubuntu version and cloud-firewall-only state
      ansible.builtin.shell: |
        set -euo pipefail
        test "$(hostname)" = "{{ e2e_node_name }}"
        test "$(hostnamectl --static)" = "{{ e2e_node_name }}"
        test "$(tr -d '\n' </etc/hostname)" = "{{ e2e_node_name }}"
        test "$(awk '$1 == "127.0.1.1" { count++ } END { print count + 0 }' /etc/hosts)" -eq 1
        grep -Eq '^127\.0\.1\.1[[:space:]]+{{ e2e_node_name }}([[:space:]]|$)' /etc/hosts
        getent hosts "{{ e2e_node_name }}" | grep -Eq '^127\.0\.1\.1[[:space:]]'
        ip -4 -o addr show scope global | grep -F -- "{{ e2e_private_ip }}/"
        ! ip -4 -o addr show scope global | grep -F -- "{{ e2e_public_ip }}/"
        grep -Fqx 'APT::Periodic::Enable "0";' /etc/apt/apt.conf.d/99-inspace-disable-periodic
        grep -Fqx 'APT::Periodic::Update-Package-Lists "0";' /etc/apt/apt.conf.d/99-inspace-disable-periodic
        grep -Fqx 'APT::Periodic::Unattended-Upgrade "0";' /etc/apt/apt.conf.d/99-inspace-disable-periodic
        for apt_unit in apt-daily.service apt-daily-upgrade.service apt-daily.timer apt-daily-upgrade.timer unattended-upgrades.service; do
          ! systemctl is-active --quiet "$apt_unit"
          test "$(systemctl is-enabled "$apt_unit" 2>/dev/null || true)" = masked
        done
        if command -v ufw >/dev/null 2>&1; then
          ufw_status=$(ufw status)
          ! grep -Eiq '^Status:[[:space:]]+active' <<<"$ufw_status"
        fi
        ufw_load_state=$(systemctl show ufw.service --property=LoadState --value)
        case "$ufw_load_state" in
          loaded)
            ! systemctl is-active --quiet ufw.service
            ufw_enabled=$(systemctl is-enabled ufw.service 2>/dev/null || true)
            test "$ufw_enabled" = disabled || test "$ufw_enabled" = masked
            ;;
          not-found) ;;
          *) exit 1 ;;
        esac
        . /etc/os-release
        test "$ID" = ubuntu
        test "$VERSION_ID" = 24.04
      args:
        executable: /bin/bash
      become: true
      changed_when: false

    - name: Prove the default bastion cache is mounted healthy complete and read-only
      ansible.builtin.shell: |
        set -euo pipefail
        cache_address={{ e2e_cache_address | quote }}
        cache_endpoint={{ e2e_cache_endpoint | quote }}
        cache_registry={{ e2e_cache_registry | quote }}
        cache_host=${cache_registry%:8443}
        cache_ca=/etc/inspace-cache/tls/ca.crt
        compose_file=/opt/inspace-cache/compose.yaml
        test "$cache_address" = "{{ e2e_private_ip }}"
        test "$(stat -c %s /var/lib/inspace/bootstrap-cache.img)" = 10000000000
        mountpoint -q /var/lib/inspace/bootstrap-cache
        test "$(findmnt -n -o TARGET /var/lib/inspace/bootstrap-cache)" = /var/lib/inspace/bootstrap-cache
        test "$(findmnt -n -o FSTYPE /var/lib/inspace/bootstrap-cache)" = ext4
        grep -Fq '/var/lib/inspace/bootstrap-cache.img /var/lib/inspace/bootstrap-cache ext4 loop,nosuid,nodev 0 0' /etc/fstab
        for unit in containerd.service docker.service inspace-cache.service; do
          systemctl is-active --quiet "$unit"
        done
        for service in registry nginx; do
          test "$(docker compose -f "$compose_file" ps --services --status running "$service")" = "$service"
          container_id=$(docker compose -f "$compose_file" ps -q "$service")
          test -n "$container_id"
          test "$(docker inspect --format '{{ '{{' }}.State.Health.Status{{ '}}' }}' "$container_id")" = healthy
        done
        test "$(docker compose -f "$compose_file" ps --services --status running | wc -l)" -eq 2
        test "$(awk -F '\t' 'NF == 2 { count++ } END { print count + 0 }' /etc/inspace-cache/images.tsv)" -eq 32
        test "$(awk -F '\t' '$2 == "rancher/kube-webhook-certgen:v1.14.5-hardened2" { count++ } END { print count + 0 }' /etc/inspace-cache/images.tsv)" -eq 0
        test "$(awk -F '\t' '$2 == "rancher/nginx-ingress-controller:v1.14.5-hardened2" { count++ } END { print count + 0 }' /etc/inspace-cache/images.tsv)" -eq 0
        test "$(cat /var/lib/inspace/bootstrap-cache/state/ready)" = ready
        for certificate in "$cache_ca" /etc/inspace-cache/tls/server.crt; do
          certificate_text=$(openssl x509 -in "$certificate" -noout -text)
          grep -Fq 'Public Key Algorithm: id-ecPublicKey' <<<"$certificate_text"
          grep -Fq 'ASN1 OID: prime256v1' <<<"$certificate_text"
        done
        served_certificate=$(mktemp)
        trap 'rm -f "$served_certificate"' EXIT
        openssl s_client \
          -connect "$cache_address:8443" \
          -servername "$cache_host" \
          -verify_hostname "$cache_host" \
          -verify_return_error \
          -CAfile "$cache_ca" </dev/null 2>/dev/null | \
          openssl x509 -out "$served_certificate"
        cmp -s /etc/inspace-cache/tls/server.crt "$served_certificate"
        rm -f "$served_certificate"
        trap - EXIT
        resolve=(--resolve "$cache_host:8443:$cache_address")
        test "$(curl --fail --silent --show-error --cacert "$cache_ca" "${resolve[@]}" "$cache_endpoint/healthz")" = ready
        curl --fail --silent --show-error --cacert "$cache_ca" "${resolve[@]}" "$cache_endpoint/v2/" >/dev/null
        image_count=0
        while IFS="$(printf '\t')" read -r _ target; do
          test -n "$target" || continue
          repository=${target%:*}
          reference=${target##*:}
          test "$repository" != "$target"
          curl --fail --silent --show-error --cacert "$cache_ca" "${resolve[@]}" \
            --header 'Accept: application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.v2+json' \
            "$cache_endpoint/v2/$repository/manifests/$reference" >/dev/null
          image_count=$((image_count + 1))
        done </etc/inspace-cache/images.tsv
        test "$image_count" -eq 32
        write_status=$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
          --cacert "$cache_ca" "${resolve[@]}" --request POST \
          "$cache_endpoint/v2/inspace-e2e-write-denied/blobs/uploads/")
        test "$write_status" = 403
      args:
        executable: /bin/bash
      become: true
      changed_when: false

- name: Wait for all RKE2 servers independently and in parallel through the bastion
  hosts: rke2_control_plane
  gather_facts: false
  strategy: free
  any_errors_fatal: true
  tasks:
    - name: Probe every private control-plane SSH port from the bastion in parallel
      ansible.builtin.command:
        argv:
          - ssh
          - -F
          - "{{ lookup('env', 'E2E_STATE_DIR') }}/ssh-config"
          - e2e-bastion
          - "timeout --kill-after=2s 10s bash -c '</dev/tcp/{{ e2e_private_ip }}/22'"
      register: e2e_private_ssh_probe
      delegate_to: localhost
      changed_when: false
      retries: 120
      delay: 5
      until: e2e_private_ssh_probe.rc == 0

    - name: Scan each private control-plane host key from the bastion
      ansible.builtin.command:
        argv:
          - ssh
          - -F
          - "{{ lookup('env', 'E2E_STATE_DIR') }}/ssh-config"
          - e2e-bastion
          - "ssh-keyscan -T 15 -H {{ e2e_private_ip }}"
      register: e2e_host_keyscan
      delegate_to: localhost
      changed_when: false
      retries: 20
      delay: 5
      until: e2e_host_keyscan.rc == 0 and e2e_host_keyscan.stdout | length > 0

    - name: Pin the scanned host key before SSH login
      ansible.builtin.copy:
        content: "{{ e2e_host_keyscan.stdout }}\n"
        dest: "{{ e2e_known_hosts }}"
        mode: "0600"
      delegate_to: localhost

    - name: Wait for authenticated SSH on every control plane in parallel
      ansible.builtin.wait_for_connection:
        connect_timeout: 10
        sleep: 5
        timeout: 1200

    - name: Wait for cloud-init completion on every control plane in parallel
      ansible.builtin.raw: >-
        timeout --kill-after=5s 4800s sh -c
        'cloud-init status --wait >/dev/null 2>&1 || test $? -eq 2'
      become: true
      changed_when: false

    - name: Detect completed product node preparation on every control plane
      ansible.builtin.stat:
        path: /var/lib/inspace/kubernetes-node-prepared-v1
      register: e2e_node_preparation
      become: true

    - name: Disable active swap on every control plane in parallel
      ansible.builtin.shell: |
        set -euo pipefail
        if swapon --noheadings | grep -q .; then
          swapoff -a
        fi
      args:
        executable: /bin/bash
      become: true
      changed_when: false
      when: not e2e_node_preparation.stat.exists

    - name: Disable persistent swap entries on every control plane in parallel
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^(?!\s*#)(.*\s+swap\s+.*)$'
        replace: '#\1'
      become: true
      when: not e2e_node_preparation.stat.exists

    - name: Create the APT mirror directory on every control plane in parallel
      ansible.builtin.file:
        path: /etc/apt/mirrors
        state: directory
        owner: root
        group: root
        mode: "0755"
      become: true
      when: not e2e_node_preparation.stat.exists

    - name: Configure ordered TOT and KKU Ubuntu mirrors on every control plane in parallel
      ansible.builtin.copy:
        content: |
          http://mirror1.totbb.net/ubuntu/{{ "\t" }}priority:1
          https://mirror.kku.ac.th/ubuntu/{{ "\t" }}priority:2
        dest: /etc/apt/mirrors/inspace-ubuntu.list
        owner: root
        group: root
        mode: "0644"
      become: true
      when: not e2e_node_preparation.stat.exists

    - name: Configure Ubuntu update and security suites on every control plane in parallel
      ansible.builtin.copy:
        content: |
          Types: deb
          URIs: mirror+file:/etc/apt/mirrors/inspace-ubuntu.list
          Suites: noble noble-updates noble-backports
          Components: main restricted universe multiverse
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg

          Types: deb
          URIs: mirror+file:/etc/apt/mirrors/inspace-ubuntu.list
          Suites: noble-security
          Components: main restricted universe multiverse
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
        dest: /etc/apt/sources.list.d/ubuntu.sources
        owner: root
        group: root
        mode: "0644"
      become: true
      when: not e2e_node_preparation.stat.exists

    - name: Remove the legacy Ubuntu sources list on every control plane in parallel
      ansible.builtin.file:
        path: /etc/apt/sources.list
        state: absent
      become: true
      when: not e2e_node_preparation.stat.exists

    - name: Remove the systemd-resolved resolv.conf link on every control plane in parallel
      ansible.builtin.file:
        path: /etc/resolv.conf
        state: absent
      become: true
      when: not e2e_node_preparation.stat.exists

    - name: Configure static Google DNS on every control plane in parallel
      ansible.builtin.copy:
        content: |
          # Managed by InSpace Kubernetes bootstrap.
          nameserver 8.8.8.8
          nameserver 8.8.4.4
          options edns0
        dest: /etc/resolv.conf
        owner: root
        group: root
        mode: "0644"
      become: true
      when: not e2e_node_preparation.stat.exists

    - name: Disable systemd-resolved on every control plane in parallel
      ansible.builtin.systemd_service:
        name: systemd-resolved.service
        state: stopped
        enabled: false
        masked: true
      become: true
      when: not e2e_node_preparation.stat.exists

    - name: Update and upgrade every control plane in parallel
      ansible.builtin.apt:
        update_cache: true
        upgrade: 'yes'
        lock_timeout: 300
      environment:
        DEBIAN_FRONTEND: noninteractive
        NEEDRESTART_MODE: l
      become: true
      async: 600
      poll: 10
      when: not e2e_node_preparation.stat.exists

    - name: Persist disabled automatic APT updates on repaired control planes
      ansible.builtin.copy:
        content: |
          // Managed by InSpace cluster bootstrap.
          APT::Periodic::Enable "0";
          APT::Periodic::Update-Package-Lists "0";
          APT::Periodic::Download-Upgradeable-Packages "0";
          APT::Periodic::Unattended-Upgrade "0";
          APT::Periodic::AutocleanInterval "0";
          Unattended-Upgrade::Automatic-Reboot "false";
        dest: /etc/apt/apt.conf.d/99-inspace-disable-periodic
        owner: root
        group: root
        mode: "0644"
      become: true
      when: not e2e_node_preparation.stat.exists

    - name: Disable automatic APT update units on repaired control planes
      ansible.builtin.shell: |
        set -euo pipefail
        for apt_unit in apt-daily.service apt-daily-upgrade.service apt-daily.timer apt-daily-upgrade.timer unattended-upgrades.service; do
          systemctl mask --now "$apt_unit" >/dev/null
        done
        for apt_unit in apt-daily.service apt-daily-upgrade.service apt-daily.timer apt-daily-upgrade.timer unattended-upgrades.service; do
          ! systemctl is-active --quiet "$apt_unit"
          test "$(systemctl is-enabled "$apt_unit" 2>/dev/null || true)" = masked
        done
      args:
        executable: /bin/bash
      become: true
      when: not e2e_node_preparation.stat.exists

    - name: Persist Kubernetes sysctls on repaired control planes
      ansible.builtin.copy:
        content: |
          # Managed by InSpace Kubernetes bootstrap.
          net.ipv4.ip_forward = 1
          fs.inotify.max_user_instances = 8192
          fs.inotify.max_user_watches = 524288
        dest: /etc/sysctl.d/90-inspace-kubernetes.conf
        owner: root
        group: root
        mode: "0644"
      become: true
      when: not e2e_node_preparation.stat.exists

    - name: Persist Kubernetes PAM limits on repaired control planes
      ansible.builtin.copy:
        content: |
          # Managed by InSpace Kubernetes bootstrap.
          * soft nofile 1048576
          * hard nofile 1048576
          root soft nofile 1048576
          root hard nofile 1048576
        dest: /etc/security/limits.d/90-inspace-kubernetes.conf
        owner: root
        group: root
        mode: "0644"
      become: true
      when: not e2e_node_preparation.stat.exists

    - name: Create the repaired RKE2 server drop-in directory
      ansible.builtin.file:
        path: /etc/systemd/system/rke2-server.service.d
        state: directory
        owner: root
        group: root
        mode: "0755"
      become: true
      when: not e2e_node_preparation.stat.exists

    - name: Persist RKE2 server limits on repaired control planes
      ansible.builtin.copy:
        content: |
          [Service]
          LimitNOFILE=1048576
          LimitNPROC=infinity
          LimitMEMLOCK=infinity
          TasksMax=infinity
        dest: /etc/systemd/system/rke2-server.service.d/20-inspace-node-limits.conf
        owner: root
        group: root
        mode: "0644"
      become: true
      when: not e2e_node_preparation.stat.exists

    - name: Apply Kubernetes sysctls on repaired control planes
      ansible.builtin.command: sysctl --system
      become: true
      when: not e2e_node_preparation.stat.exists

    - name: Restart repaired RKE2 servers one at a time and prove local readiness
      ansible.builtin.shell: |
        set -euo pipefail
        systemctl daemon-reload
        old_pid=$(systemctl show rke2-server.service --property=MainPID --value)
        test "$old_pid" -gt 0
        systemctl restart --no-block rke2-server.service
        restart_deadline=$(( $(date +%s) + 1200 ))
        attempt=0
        while true; do
          new_pid=$(systemctl show rke2-server.service --property=MainPID --value)
          if test "$new_pid" -gt 0 && test "$new_pid" != "$old_pid" && \
             systemctl is-active --quiet rke2-server.service && \
             timeout 10s /var/lib/rancher/rke2/bin/kubectl \
               --kubeconfig /etc/rancher/rke2/rke2.yaml get --raw='/readyz?verbose' | \
               grep -F '[+]etcd ok'; then
            break
          fi
          attempt=$((attempt + 1))
          if systemctl is-failed --quiet rke2-server.service || [ "$attempt" -ge 180 ] || [ "$(date +%s)" -ge "$restart_deadline" ]; then exit 1; fi
          sleep 5
        done
        test -z "$(swapon --noheadings)"
        if awk '$0 !~ /^[[:space:]]*#/ && NF >= 3 && $3 == "swap" { found=1 } END { exit found ? 0 : 1 }' /etc/fstab; then exit 1; fi
        test "$(sysctl -n net.ipv4.ip_forward)" -eq 1
        test "$(sysctl -n fs.inotify.max_user_instances)" -ge 8192
        test "$(sysctl -n fs.inotify.max_user_watches)" -ge 524288
        test "$(systemctl show rke2-server.service --property=LimitNOFILE --value)" = 1048576
        test "$(systemctl show rke2-server.service --property=LimitNPROC --value)" = infinity
        test "$(systemctl show rke2-server.service --property=LimitMEMLOCK --value)" = infinity
        test "$(systemctl show rke2-server.service --property=TasksMax --value)" = infinity
      args:
        executable: /bin/bash
      become: true
      throttle: 1
      when: not e2e_node_preparation.stat.exists

    - name: Persist completed repaired node preparation
      ansible.builtin.file:
        path: /var/lib/inspace/kubernetes-node-prepared-v1
        state: touch
        owner: root
        group: root
        mode: "0600"
      become: true
      when: not e2e_node_preparation.stat.exists

    - name: Wait for every rke2-server service in parallel
      ansible.builtin.command: systemctl is-active rke2-server
      become: true
      register: e2e_rke2_service
      changed_when: false
      retries: 180
      delay: 10
      until: e2e_rke2_service.rc == 0 and e2e_rke2_service.stdout == 'active'

    - name: Wait for embedded etcd and the local API on every server in parallel
      ansible.builtin.shell: |
        set -euo pipefail
        timeout 30s /var/lib/rancher/rke2/bin/kubectl \
          --kubeconfig /etc/rancher/rke2/rke2.yaml get --raw='/readyz?verbose' |
          grep -F '[+]etcd ok'
      args:
        executable: /bin/bash
      become: true
      register: e2e_local_readyz
      changed_when: false
      retries: 120
      delay: 10
      until: e2e_local_readyz.rc == 0

    - name: Verify pinned RKE2 and Ubuntu versions on every control plane
      ansible.builtin.shell: |
        set -euo pipefail
        test "$(hostname)" = "{{ e2e_node_name }}"
        test "$(hostnamectl --static)" = "{{ e2e_node_name }}"
        test "$(cat /etc/hostname)" = "{{ e2e_node_name }}"
        test "$(awk '$1 == "127.0.1.1" { count++ } END { print count + 0 }' /etc/hosts)" -eq 1
        grep -Eq '^127\.0\.1\.1[[:space:]]+{{ e2e_node_name }}([[:space:]]|$)' /etc/hosts
        getent hosts "{{ e2e_node_name }}" | grep -Eq '^127\.0\.1\.1[[:space:]]'
        cache_registry={{ e2e_cache_registry | quote }}
        cache_host=${cache_registry%:8443}
        grep -Fqx -- "{{ e2e_cache_address }} $cache_host # inspace-bootstrap-cache" /etc/hosts
        grep -Fqx -- "system-default-registry: \"$cache_registry\"" /etc/rancher/rke2/config.yaml
        printf '%s' {{ e2e_cache_ca_bundle | quote }} | cmp -s - /etc/rancher/rke2/bootstrap-cache-ca.crt
        test "$(grep -Fc -- "  \"$cache_registry\":" /etc/rancher/rke2/registries.yaml)" -eq 1
        grep -Fqx -- '      ca_file: /etc/rancher/rke2/bootstrap-cache-ca.crt' /etc/rancher/rke2/registries.yaml
        /usr/local/bin/rke2 --version | grep -F 'v1.35.6+rke2r1'
        kube_vip_manifest=/var/lib/rancher/rke2/agent/pod-manifests/kube-vip.yaml
        grep -F "$cache_registry/kube-vip/kube-vip:v1.2.1@sha256:44035f68040c9eb99103c65f1f9ab9698d93f9f272110825705338ac1926f3d9" \
          "$kube_vip_manifest"
        ! grep -Fq 'ghcr.io/kube-vip/' "$kube_vip_manifest"
        test "$(grep -Fc '    - ip: "127.0.0.1"' "$kube_vip_manifest")" -eq 1
        test "$(grep -Fc '        - "kubernetes"' "$kube_vip_manifest")" -eq 1
        test "$(grep -Fc '        - name: vip_nodename' "$kube_vip_manifest")" -eq 1
        test "$(grep -Fc '              fieldPath: spec.nodeName' "$kube_vip_manifest")" -eq 1
        test "$(grep -Fc '          drop: ["ALL"]' "$kube_vip_manifest")" -eq 1
        test "$(grep -Fc '          add: ["NET_ADMIN", "NET_RAW"]' "$kube_vip_manifest")" -eq 1
        test "$(grep -Fc '          mountPath: /etc/kubernetes/admin.conf' "$kube_vip_manifest")" -eq 1
        test "$(grep -Fc '        path: /etc/rancher/rke2/rke2.yaml' "$kube_vip_manifest")" -eq 1
        ! grep -Fq 'k8s_config_file' "$kube_vip_manifest"
        ip -4 -o addr show scope global | grep -F -- "{{ e2e_private_ip }}/"
        ! ip -4 -o addr show scope global | grep -F -- "{{ e2e_public_ip }}/"
        ! pgrep -x kube-proxy
        test -f /var/lib/inspace/kubernetes-node-prepared-v1
        test -z "$(swapon --noheadings)"
        if awk '$0 !~ /^[[:space:]]*#/ && NF >= 3 && $3 == "swap" { found=1 } END { exit found ? 0 : 1 }' /etc/fstab; then exit 1; fi
        test ! -e /etc/apt/sources.list
        grep -Fqx $'http://mirror1.totbb.net/ubuntu/\tpriority:1' /etc/apt/mirrors/inspace-ubuntu.list
        grep -Fqx $'https://mirror.kku.ac.th/ubuntu/\tpriority:2' /etc/apt/mirrors/inspace-ubuntu.list
        test "$(grep -Fc 'URIs: mirror+file:/etc/apt/mirrors/inspace-ubuntu.list' /etc/apt/sources.list.d/ubuntu.sources)" -eq 2
        grep -Fqx 'Suites: noble noble-updates noble-backports' /etc/apt/sources.list.d/ubuntu.sources
        grep -Fqx 'Suites: noble-security' /etc/apt/sources.list.d/ubuntu.sources
        test ! -L /etc/resolv.conf
        grep -Fqx 'nameserver 8.8.8.8' /etc/resolv.conf
        grep -Fqx 'nameserver 8.8.4.4' /etc/resolv.conf
        test "$(systemctl is-enabled systemd-resolved.service 2>/dev/null || true)" = masked
        ! systemctl is-active --quiet systemd-resolved.service
        grep -Fqx 'APT::Periodic::Enable "0";' /etc/apt/apt.conf.d/99-inspace-disable-periodic
        grep -Fqx 'APT::Periodic::Update-Package-Lists "0";' /etc/apt/apt.conf.d/99-inspace-disable-periodic
        grep -Fqx 'APT::Periodic::Unattended-Upgrade "0";' /etc/apt/apt.conf.d/99-inspace-disable-periodic
        for apt_unit in apt-daily.service apt-daily-upgrade.service apt-daily.timer apt-daily-upgrade.timer unattended-upgrades.service; do
          ! systemctl is-active --quiet "$apt_unit"
          test "$(systemctl is-enabled "$apt_unit" 2>/dev/null || true)" = masked
        done
        grep -Fqx 'net.ipv4.ip_forward = 1' /etc/sysctl.d/90-inspace-kubernetes.conf
        grep -Fqx 'fs.inotify.max_user_instances = 8192' /etc/sysctl.d/90-inspace-kubernetes.conf
        grep -Fqx 'fs.inotify.max_user_watches = 524288' /etc/sysctl.d/90-inspace-kubernetes.conf
        test "$(sysctl -n net.ipv4.ip_forward)" -eq 1
        test "$(sysctl -n fs.inotify.max_user_instances)" -ge 8192
        test "$(sysctl -n fs.inotify.max_user_watches)" -ge 524288
        grep -Fqx 'root hard nofile 1048576' /etc/security/limits.d/90-inspace-kubernetes.conf
        test "$(systemctl show rke2-server.service --property=LimitNOFILE --value)" = 1048576
        test "$(systemctl show rke2-server.service --property=LimitNPROC --value)" = infinity
        test "$(systemctl show rke2-server.service --property=LimitMEMLOCK --value)" = infinity
        test "$(systemctl show rke2-server.service --property=TasksMax --value)" = infinity
        if command -v ufw >/dev/null 2>&1; then
          ufw_status=$(ufw status)
          ! grep -Eiq '^Status:[[:space:]]+active' <<<"$ufw_status"
        fi
        ufw_load_state=$(systemctl show ufw.service --property=LoadState --value)
        case "$ufw_load_state" in
          loaded)
            ! systemctl is-active --quiet ufw.service
            ufw_enabled=$(systemctl is-enabled ufw.service 2>/dev/null || true)
            test "$ufw_enabled" = disabled || test "$ufw_enabled" = masked
            ;;
          not-found) ;;
          *) exit 1 ;;
        esac
        . /etc/os-release
        test "$ID" = ubuntu
        test "$VERSION_ID" = 24.04
      args:
        executable: /bin/bash
      become: true
      changed_when: false

    - name: Persist one readiness checkpoint per parallel host
      ansible.builtin.copy:
        content: "ready\n"
        dest: "{{ lookup('env', 'E2E_STATE_DIR') }}/{{ inventory_hostname }}.ready"
        mode: "0600"
      delegate_to: localhost

- name: Configure the tunneled private API and install the released controllers
  hosts: localhost
  gather_facts: false
  vars:
    e2e_state_dir: "{{ lookup('env', 'E2E_STATE_DIR') }}"
    e2e_state_file: "{{ lookup('env', 'E2E_STATE_DIR') }}/state.json"
    e2e_kubeconfig: "{{ lookup('env', 'E2E_STATE_DIR') }}/kubeconfig.yaml"
    e2e_cluster_name: "inspace-e2e-{{ lookup('env', 'E2E_RUN_ID') }}"
    e2e_nodeclass_name: "inspace-e2e-workers-{{ lookup('env', 'E2E_RUN_ID') }}"
    e2e_nodepool_name: "general"
    e2e_marker: "inspace-e2e-{{ lookup('env', 'E2E_RUN_ID') }}"
    e2e_ssh_user: "{{ lookup('env', 'INSPACE_E2E_SSH_USERNAME') | default('inspacee2e', true) }}"
    e2e_ssh_public_key: "{{ lookup('file', lookup('env', 'E2E_PUBLIC_KEY')) | trim }}"
    e2e_state: "{{ lookup('file', lookup('env', 'E2E_STATE_DIR') + '/state.json') | from_json }}"
    e2e_bootstrap_result:
      firewallUUID: "{{ e2e_state.firewallUUID }}"
      privateRegistrationEndpoint: "{{ e2e_state.privateRegistrationEndpoint }}"
  environment:
    KUBECONFIG: "{{ e2e_kubeconfig }}"
  tasks:
    - name: Prove all three parallel readiness checkpoints exist
      ansible.builtin.stat:
        path: "{{ e2e_state_dir }}/{{ item }}.ready"
      loop: "{{ groups['rke2_control_plane'] }}"
      register: e2e_readiness_files

    - name: Require exactly three independently ready RKE2 servers
      ansible.builtin.assert:
        that:
          - groups['rke2_control_plane'] | length == 3
          - e2e_readiness_files.results | selectattr('stat.exists') | list | length == 3

    - name: Require private API and registration VIP reachability from the VPC bastion
      ansible.builtin.command:
        argv:
          - ssh
          - -F
          - "{{ e2e_state_dir }}/ssh-config"
          - e2e-bastion
          - >-
            timeout --kill-after=2s 10s bash -c
            '</dev/tcp/{{ e2e_state.virtualIPv4 }}/6443 && </dev/tcp/{{ e2e_state.virtualIPv4 }}/9345'
      register: e2e_private_vip_ports
      changed_when: false
      retries: 120
      delay: 5
      until: e2e_private_vip_ports.rc == 0

    - name: Read the RKE2 administrator kubeconfig from one ready server
      ansible.builtin.slurp:
        src: /etc/rancher/rke2/rke2.yaml
      become: true
      delegate_to: "{{ groups['rke2_control_plane'] | first }}"
      register: e2e_remote_kubeconfig
      no_log: true

    - name: Persist the kubeconfig only inside the state volume
      ansible.builtin.copy:
        content: "{{ e2e_remote_kubeconfig.content | b64decode }}"
        dest: "{{ e2e_kubeconfig }}"
        mode: "0600"
      no_log: true

    - name: Establish the container-local API tunnel through the bastion
      ansible.builtin.command:
        argv: [/opt/e2e/scripts/api-tunnel.sh, start, "{{ e2e_state_file }}"]
      changed_when: true

    - name: Point the kubeconfig at the local tunnel with the private VIP TLS name
      ansible.builtin.command:
        argv:
          - kubectl
          - config
          - set-cluster
          - default
          - --server=https://127.0.0.1:16443
          - "--tls-server-name={{ e2e_state.virtualIPv4 }}"
      changed_when: true

    - name: Wait robustly for the private RKE2 API through the local tunnel
      ansible.builtin.command:
        argv: [kubectl, --request-timeout=10s, get, --raw=/readyz]
      register: e2e_public_readyz
      changed_when: false
      retries: 120
      delay: 5
      until: e2e_public_readyz.rc == 0

    - name: Prove kubeconfig never exposes a node or public API endpoint
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl config view --raw -o json | jq -e '
          any(.clusters[];
            .name == "default" and
            .cluster.server == "https://127.0.0.1:16443" and
            .cluster["tls-server-name"] == "{{ e2e_state.virtualIPv4 }}")'
      args:
        executable: /bin/bash
      changed_when: false

    - name: Wait for exactly three Ready fixed control-plane nodes
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl wait --for=condition=Ready node --all --timeout=10m
        nodes=$(kubectl get nodes -o json)
        jq -e '
          .items | length == 3 and
          all(.[]; any(.status.conditions[]; .type == "Ready" and .status == "True"))' <<<"$nodes"
        expected_names=$(jq -c '[.controlPlanes[].name] | sort' "{{ e2e_state_file }}")
        actual_names=$(jq -c '[.items[].metadata.name] | sort' <<<"$nodes")
        test "$actual_names" = "$expected_names"
      args:
        executable: /bin/bash
      changed_when: false

    - name: Verify Cilium native routing and full kube-proxy replacement plus private L2 configuration
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl -n kube-system rollout status daemonset/cilium --timeout=15m
        kubectl -n kube-system get configmap cilium-config -o json | jq -e '
          .data["routing-mode"] == "native" and
          .data["ipv4-native-routing-cidr"] == "10.42.0.0/16" and
          .data["auto-direct-node-routes"] == "true" and
          .data["kube-proxy-replacement"] == "true" and
          .data["enable-ipv4-masquerade"] == "true" and
          .data["enable-bpf-masquerade"] == "true" and
          .data["enable-l2-announcements"] == "true" and
          .data["default-lb-service-ipam"] == "none"'
        values=$(kubectl -n kube-system get helmchartconfig rke2-cilium -o jsonpath='{.spec.valuesContent}')
        grep -Eq '^[[:space:]]*defaultLBServiceIPAM:[[:space:]]*none[[:space:]]*$' <<<"$values"
        grep -Eq '^[[:space:]]*nodeIPAM:[[:space:]]*$' <<<"$values"
        grep -Eq '^[[:space:]]*enabled:[[:space:]]*false[[:space:]]*$' <<<"$values"
        grep -Eq '^[[:space:]]*l2announcements:[[:space:]]*$' <<<"$values"
        export E2E_CILIUM_VALUES="$values"
        python3 - "$INSPACE_PRIVATE_LOAD_BALANCER_POOL_START" "$INSPACE_PRIVATE_LOAD_BALANCER_POOL_STOP" <<'PY'
        import ipaddress
        import math
        import os
        import sys
        import yaml

        values = yaml.safe_load(os.environ["E2E_CILIUM_VALUES"])
        start, stop = map(ipaddress.ip_address, sys.argv[1:])
        addresses = int(stop) - int(start) + 1
        qps = max(10, math.ceil(addresses / 5))
        assert values["enableIPv4Masquerade"] is True
        assert values["bpf"]["masquerade"] is True
        assert values["l2announcements"]["enabled"] is True
        assert values["defaultLBServiceIPAM"] == "none"
        assert values["nodeIPAM"]["enabled"] is False
        assert values["k8sClientRateLimit"] == {"qps": qps, "burst": max(20, 2 * qps)}
        PY
        kubectl get ciliumloadbalancerippool inspace-private -o json | jq -e \
          --arg start "$INSPACE_PRIVATE_LOAD_BALANCER_POOL_START" \
          --arg stop "$INSPACE_PRIVATE_LOAD_BALANCER_POOL_STOP" '
          .spec.disabled == false and
          .spec.blocks == [{"start":$start,"stop":$stop}] and
          .spec.serviceSelector.matchLabels["inspace.cloud/load-balancer-scope"] == "private" and
          all(.status.conditions[]?; .type != "cilium.io/PoolConflict" or .status == "False")'
        kubectl get ciliuml2announcementpolicy inspace-private -o json | jq -e '
          .spec.externalIPs == false and
          .spec.loadBalancerIPs == true and
          .spec.serviceSelector.matchLabels["inspace.cloud/load-balancer-scope"] == "private" and
          any(.spec.nodeSelector.matchExpressions[];
            .key == "kubernetes.io/os" and .operator == "In" and .values == ["linux"]) and
          any(.spec.nodeSelector.matchExpressions[];
            .key == "inspace.cloud/l2-announcement-disabled" and .operator == "DoesNotExist") and
          (.spec.interfaces | not)'
        kubectl -n kube-system get daemonsets -o json | jq -e '
          all(.items[]; .metadata.name != "kube-proxy")'
        kubectl -n kube-system get pods -o json | jq -e '
          all(.items[]; (.metadata.name | startswith("kube-proxy-")) | not)'
        cilium_status=$(kubectl -n kube-system exec daemonset/cilium -- cilium-dbg status --verbose)
        grep -E 'KubeProxyReplacement:[[:space:]]+True' <<<"$cilium_status"
        grep -E '(Routing:.*Native|Direct Routing)' <<<"$cilium_status"
        grep -E 'Masquerading:[[:space:]]+BPF' <<<"$cilium_status"
      args:
        executable: /bin/bash
      register: e2e_cilium_private_lb_ready
      changed_when: false
      retries: 120
      delay: 5
      until: e2e_cilium_private_lb_ready.rc == 0

    - name: Prove three pinned kube-vip mirror pods and one elected lease holder
      ansible.builtin.shell: |
        set -euo pipefail
        pods=$(kubectl -n kube-system get pods \
          -l 'app.kubernetes.io/name=kube-vip,app.kubernetes.io/component=control-plane-vip' -o json)
        jq -e --arg image "{{ e2e_state.bootstrapCacheRegistry }}/kube-vip/kube-vip:v1.2.1@sha256:44035f68040c9eb99103c65f1f9ab9698d93f9f272110825705338ac1926f3d9" '
          .items | length == 3 and
          ([.[].spec.nodeName] | unique | length) == 3 and
          all(.[];
            .status.phase == "Running" and
            ([.spec.hostAliases[]? |
              select(.ip == "127.0.0.1" and
                any(.hostnames[]?; . == "kubernetes"))] | length) == 1 and
            ([.spec.volumes[]? |
              select(.name == "kubeconfig" and
                .hostPath.path == "/etc/rancher/rke2/rke2.yaml" and
                .hostPath.type == "File")] | length) == 1 and
            any(.spec.containers[];
              .name == "kube-vip" and
              .image == $image and
              ([.env[]? | select(.name == "k8s_config_file")] | length) == 0 and
              ([.env[]? |
                select(.name == "vip_nodename" and
                  .valueFrom.fieldRef.fieldPath == "spec.nodeName")] | length) == 1 and
              (((.securityContext.capabilities.drop // []) | sort) == ["ALL"]) and
              (((.securityContext.capabilities.add // []) | sort) == ["NET_ADMIN", "NET_RAW"]) and
              ([.volumeMounts[]? |
                select(.name == "kubeconfig" and
                  .mountPath == "/etc/kubernetes/admin.conf" and
                  .readOnly == true)] | length) == 1))' <<<"$pods"
        kubectl -n kube-system get lease inspace-control-plane-vip -o json | jq -e '
          (.spec.holderIdentity // "") | length > 0'
      args:
        executable: /bin/bash
      register: e2e_kube_vip_ready
      changed_when: false
      retries: 120
      delay: 5
      until: e2e_kube_vip_ready.rc == 0

    - name: Exercise bounded kube-vip leader failover without stopping RKE2
      block:
        - name: Identify the one current VIP owner
          ansible.builtin.shell: |
            set -euo pipefail
            owners=''
            owner_index=''
            topology={{ e2e_state.controlPlanes | to_json | quote }}
            for index in 0 1 2; do
              host=$(printf 'rke2-cp-%02d' "$((index + 1))")
              addresses=$(ssh -F "{{ e2e_state_dir }}/ssh-config" "$host" \
                "ip -4 -o addr show scope global")
              if grep -Fq -- "{{ e2e_state.virtualIPv4 }}/" <<<"$addresses"; then
                owners+="$host"$'\n'
                owner_index=$index
              fi
            done
            test "$(grep -c . <<<"$owners")" -eq 1
            owner_node=$(jq -er --argjson index "$owner_index" '.[$index].name' <<<"$topology")
            holder=$(kubectl -n kube-system get lease inspace-control-plane-vip -o jsonpath='{.spec.holderIdentity}')
            pods=$(kubectl -n kube-system get pods \
              -l 'app.kubernetes.io/name=kube-vip,app.kubernetes.io/component=control-plane-vip' -o json)
            holder_node=$(jq -er --arg holder "$holder" '
              [.items[] |
                select(.spec.nodeName == $holder)] |
              if length == 1 then .[0].spec.nodeName else error("kube-vip Lease holder does not resolve to exactly one control-plane pod by node name") end' \
              <<<"$pods")
            test "$holder_node" = "$owner_node"
            head -n 1 <<<"$owners"
          args:
            executable: /bin/bash
          register: e2e_kube_vip_leader
          changed_when: false
          retries: 30
          delay: 2
          until: e2e_kube_vip_leader.rc == 0

        - name: Capture the original kube-vip lease holder
          ansible.builtin.command:
            argv:
              - kubectl
              - -n
              - kube-system
              - get
              - lease
              - inspace-control-plane-vip
              - -o
              - jsonpath={.spec.holderIdentity}
          register: e2e_kube_vip_holder_before
          changed_when: false

        - name: Remove any stale API continuity markers
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - "{{ e2e_state_dir }}/stop-api-monitor"
            - "{{ e2e_state_dir }}/ready-api-monitor"

        - name: Start strict API continuity monitoring
          ansible.builtin.command:
            argv:
              - /opt/e2e/scripts/monitor-readyz.sh
              - "{{ e2e_state_dir }}/stop-api-monitor"
              - "{{ e2e_state_dir }}/ready-api-monitor"
              - "300"
          async: 330
          poll: 0
          register: e2e_api_monitor_job
          changed_when: true

        - name: Wait for the continuity monitor first successful API probe
          ansible.builtin.wait_for:
            path: "{{ e2e_state_dir }}/ready-api-monitor"
            state: present
            timeout: 30

        - name: Temporarily remove the elected node static kube-vip manifest
          ansible.builtin.command:
            argv:
              - ssh
              - -F
              - "{{ e2e_state_dir }}/ssh-config"
              - "{{ e2e_kube_vip_leader.stdout | trim }}"
              - >-
                sudo mv /var/lib/rancher/rke2/agent/pod-manifests/kube-vip.yaml
                /var/lib/inspace/kube-vip.yaml.e2e-disabled
          changed_when: true

        - name: Require VIP ownership to move to exactly one different control plane
          ansible.builtin.shell: |
            set -euo pipefail
            owners=''
            owner_index=''
            topology={{ e2e_state.controlPlanes | to_json | quote }}
            for index in 0 1 2; do
              host=$(printf 'rke2-cp-%02d' "$((index + 1))")
              addresses=$(ssh -F "{{ e2e_state_dir }}/ssh-config" "$host" \
                "ip -4 -o addr show scope global")
              if grep -Fq -- "{{ e2e_state.virtualIPv4 }}/" <<<"$addresses"; then
                owners+="$host"$'\n'
                owner_index=$index
              fi
            done
            test "$(grep -c . <<<"$owners")" -eq 1
            test "$(head -n 1 <<<"$owners")" != "{{ e2e_kube_vip_leader.stdout | trim }}"
            owner_node=$(jq -er --argjson index "$owner_index" '.[$index].name' <<<"$topology")
            holder=$(kubectl -n kube-system get lease inspace-control-plane-vip -o jsonpath='{.spec.holderIdentity}')
            pods=$(kubectl -n kube-system get pods \
              -l 'app.kubernetes.io/name=kube-vip,app.kubernetes.io/component=control-plane-vip' -o json)
            holder_node=$(jq -er --arg holder "$holder" '
              [.items[] |
                select(.spec.nodeName == $holder)] |
              if length == 1 then .[0].spec.nodeName else error("kube-vip Lease holder does not resolve to exactly one control-plane pod by node name") end' \
              <<<"$pods")
            test "$holder_node" = "$owner_node"
            test "$holder" != "{{ e2e_kube_vip_holder_before.stdout | trim }}"
            kubectl --request-timeout=5s get --raw=/readyz >/dev/null
          args:
            executable: /bin/bash
          register: e2e_kube_vip_failover
          changed_when: false
          retries: 60
          delay: 2
          until: e2e_kube_vip_failover.rc == 0
      always:
        - name: Restore the elected node static kube-vip manifest
          ansible.builtin.command:
            argv:
              - ssh
              - -F
              - "{{ e2e_state_dir }}/ssh-config"
              - "{{ e2e_kube_vip_leader.stdout | default('') | trim }}"
              - >-
                sudo sh -c 'if test -e
                /var/lib/inspace/kube-vip.yaml.e2e-disabled;
                then mv /var/lib/inspace/kube-vip.yaml.e2e-disabled
                /var/lib/rancher/rke2/agent/pod-manifests/kube-vip.yaml; fi'
          register: e2e_kube_vip_restore
          retries: 12
          delay: 5
          until: e2e_kube_vip_restore.rc == 0
          changed_when: true
          when: e2e_kube_vip_leader is defined and e2e_kube_vip_leader.stdout | default('') | trim | length > 0

        - name: Require all three kube-vip mirror pods after restoration
          ansible.builtin.shell: |
            set -euo pipefail
            kubectl -n kube-system get pods \
              -l 'app.kubernetes.io/name=kube-vip,app.kubernetes.io/component=control-plane-vip' -o json | jq -e '
                .items | length == 3 and
                ([.[].spec.nodeName] | unique | length) == 3 and
                all(.[]; .status.phase == "Running")'
            owners=''
            owner_index=''
            topology={{ e2e_state.controlPlanes | to_json | quote }}
            for index in 0 1 2; do
              host=$(printf 'rke2-cp-%02d' "$((index + 1))")
              addresses=$(ssh -F "{{ e2e_state_dir }}/ssh-config" "$host" \
                "ip -4 -o addr show scope global")
              if grep -Fq -- "{{ e2e_state.virtualIPv4 }}/" <<<"$addresses"; then
                owners+="$host"$'\n'
                owner_index=$index
              fi
            done
            test "$(grep -c . <<<"$owners")" -eq 1
            owner_node=$(jq -er --argjson index "$owner_index" '.[$index].name' <<<"$topology")
            holder=$(kubectl -n kube-system get lease inspace-control-plane-vip -o jsonpath='{.spec.holderIdentity}')
            pods=$(kubectl -n kube-system get pods \
              -l 'app.kubernetes.io/name=kube-vip,app.kubernetes.io/component=control-plane-vip' -o json)
            holder_node=$(jq -er --arg holder "$holder" '
              [.items[] |
                select(.spec.nodeName == $holder)] |
              if length == 1 then .[0].spec.nodeName else error("kube-vip Lease holder does not resolve to exactly one control-plane pod by node name") end' \
              <<<"$pods")
            test "$holder_node" = "$owner_node"
          args:
            executable: /bin/bash
          register: e2e_kube_vip_recovered
          retries: 120
          delay: 5
          until: e2e_kube_vip_recovered.rc == 0
          changed_when: false
          when: e2e_kube_vip_leader is defined and e2e_kube_vip_leader.stdout | default('') | trim | length > 0

        - name: Stop the API continuity observation window
          ansible.builtin.file:
            path: "{{ e2e_state_dir }}/stop-api-monitor"
            state: touch
            mode: "0600"
          when: e2e_api_monitor_job is defined and e2e_api_monitor_job.ansible_job_id is defined

        - name: Require uninterrupted API reachability during kube-vip failover
          ansible.builtin.async_status:
            jid: "{{ e2e_api_monitor_job.ansible_job_id }}"
          register: e2e_api_monitor_wait
          retries: 30
          delay: 1
          until: e2e_api_monitor_wait.finished
          when: e2e_api_monitor_job is defined and e2e_api_monitor_job.ansible_job_id is defined

        - name: Assert the API continuity monitor succeeded
          ansible.builtin.assert:
            that: e2e_api_monitor_wait.rc == 0
            fail_msg: "the tunneled Kubernetes API was interrupted during kube-vip failover"
          when: e2e_api_monitor_job is defined and e2e_api_monitor_job.ansible_job_id is defined

    - name: Create the cloud and RKE2 registration secrets
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl -n kube-system create secret generic inspace-cloud-credentials \
          --from-literal="api-token=$INSPACE_API_TOKEN" \
          --from-literal="billing-account-id=$INSPACE_BILLING_ACCOUNT_ID" \
          --dry-run=client -o yaml | kubectl apply -f -
        kubectl -n kube-system create secret generic inspace-rke2-agent-token \
          --from-file="token={{ e2e_state_dir }}/rke2-token" \
          --dry-run=client -o yaml | kubectl apply -f -
      args:
        executable: /bin/bash
      no_log: true

    - name: Mark Kubernetes ownership possible before installing controllers
      ansible.builtin.command:
        argv:
          - /opt/e2e/scripts/state-update.py
          - "{{ e2e_state_file }}"
          - kubernetesOwnersPossible
          - "true"
      changed_when: true

    - name: Install the released CRDs chart
      ansible.builtin.command:
        argv:
          - helm
          - upgrade
          - --install
          - inspace-crds
          - oci://ghcr.io/thanet-s/charts/inspace-cloud-kube-modules-crds
          - --version
          - "{{ lookup('env', 'INSPACE_E2E_VERSION') }}"
          - --namespace
          - kube-system
          - --wait
          - --timeout
          - 5m
      changed_when: true

    - name: Install released CCM CSI and Karpenter controllers
      ansible.builtin.command:
        argv:
          - helm
          - upgrade
          - --install
          - inspace
          - oci://ghcr.io/thanet-s/charts/inspace-cloud-kube-modules
          - --version
          - "{{ lookup('env', 'INSPACE_E2E_VERSION') }}"
          - --namespace
          - kube-system
          - --wait
          - --timeout
          - 15m
          - --set
          - fullnameOverride=inspace
          - --set
          - "global.inspace.networkUUID={{ lookup('env', 'INSPACE_NETWORK_UUID') }}"
          - --set
          - "global.inspace.clusterID={{ e2e_cluster_name }}"
          - --set
          - "global.inspace.controlPlaneVIP={{ e2e_state.virtualIPv4 }}"
          - --set-string
          - "global.inspace.systemImageRegistry={{ e2e_state.bootstrapCacheRegistry }}"
          - --set
          - "global.inspace.privateLoadBalancerPool.start={{ lookup('env', 'INSPACE_PRIVATE_LOAD_BALANCER_POOL_START') }}"
          - --set
          - "global.inspace.privateLoadBalancerPool.stop={{ lookup('env', 'INSPACE_PRIVATE_LOAD_BALANCER_POOL_STOP') }}"
          - --set
          - ccm.replicaCount=1
          - --set
          - karpenter.replicaCount=1
          - --set
          - "karpenter.clusterName={{ e2e_cluster_name }}"
          - --set
          - "karpenter.defaultNodeClass={{ e2e_nodeclass_name }}"
      changed_when: true

    - name: Wait for all released controller workloads
      ansible.builtin.command:
        argv: [kubectl, -n, kube-system, rollout, status, "{{ item }}", --timeout=10m]
      loop:
        - deployment/inspace-ccm
        - deployment/inspace-csi-controller
        - daemonset/inspace-csi-node
        - deployment/inspace-karpenter
      changed_when: false

    - name: Prove the chart launched the exact released product image tags
      ansible.builtin.shell: |
        set -euo pipefail
        version={{ lookup('env', 'INSPACE_E2E_VERSION') | quote }}
        registry={{ e2e_state.bootstrapCacheRegistry | quote }}
        test "$(helm -n kube-system get values inspace -o json | jq -r '.global.inspace.systemImageRegistry')" = "$registry"
        test "$(kubectl -n kube-system get deployment/inspace-ccm -o json | jq -r '.spec.template.spec.containers[] | select(.name=="cloud-controller-manager") | .image')" = \
          "$registry/thanet-s/inspace-cloud-controller-manager:$version"
        test "$(kubectl -n kube-system get deployment/inspace-csi-controller -o json | jq -r '.spec.template.spec.containers[] | select(.name=="driver") | .image')" = \
          "$registry/thanet-s/inspace-csi-driver:$version"
        test "$(kubectl -n kube-system get daemonset/inspace-csi-node -o json | jq -r '.spec.template.spec.containers[] | select(.name=="driver") | .image')" = \
          "$registry/thanet-s/inspace-csi-driver:$version"
        test "$(kubectl -n kube-system get deployment/inspace-karpenter -o json | jq -r '.spec.template.spec.containers[] | select(.name=="controller") | .image')" = \
          "$registry/thanet-s/karpenter-provider-inspace:$version"
        test "$(kubectl -n kube-system get deployment/inspace-csi-controller -o json | jq -r '.spec.template.spec.containers[] | select(.name=="csi-provisioner") | .image')" = \
          "$registry/sig-storage/csi-provisioner:v5.2.0"
        test "$(kubectl -n kube-system get deployment/inspace-csi-controller -o json | jq -r '.spec.template.spec.containers[] | select(.name=="csi-attacher") | .image')" = \
          "$registry/sig-storage/csi-attacher:v4.8.1"
        test "$(kubectl -n kube-system get deployment/inspace-csi-controller -o json | jq -r '.spec.template.spec.containers[] | select(.name=="liveness-probe") | .image')" = \
          "$registry/sig-storage/livenessprobe:v2.15.0"
        test "$(kubectl -n kube-system get daemonset/inspace-csi-node -o json | jq -r '.spec.template.spec.containers[] | select(.name=="node-driver-registrar") | .image')" = \
          "$registry/sig-storage/csi-node-driver-registrar:v2.13.0"
        test "$(kubectl -n kube-system get daemonset/inspace-csi-node -o json | jq -r '.spec.template.spec.containers[] | select(.name=="liveness-probe") | .image')" = \
          "$registry/sig-storage/livenessprobe:v2.15.0"
      args:
        executable: /bin/bash
      changed_when: false

    - name: Verify CCM identity and dual node addresses converge
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl get nodes -o json | jq -e --arg location "$INSPACE_LOCATION" '
          .items | length == 3 and all(.[];
            (.spec.providerID | startswith("inspace://" + $location + "/")) and
            any(.status.addresses[]; .type == "InternalIP") and
            any(.status.addresses[]; .type == "ExternalIP") and
            all(.spec.taints[]?; .key != "node.cloudprovider.kubernetes.io/uninitialized"))'
      args:
        executable: /bin/bash
      register: e2e_ccm_convergence
      changed_when: false
      retries: 120
      delay: 5
      until: e2e_ccm_convergence.rc == 0

    - name: Render the RKE2 Karpenter node class and bounded pool
      ansible.builtin.template:
        src: templates/karpenter.yaml.j2
        dest: "{{ e2e_state_dir }}/karpenter.yaml"
        mode: "0600"

    - name: Apply Karpenter resources and require NodeClass readiness
      ansible.builtin.shell: |
        set -euo pipefail
        cache_address={{ e2e_state.bootstrapCacheAddress | quote }}
        cache_ca={{ e2e_state.bootstrapCacheCABundle | quote }}
        kubectl apply -f "{{ e2e_state_dir }}/karpenter.yaml"
        kubectl wait --for=condition=Ready "inspacenodeclass/{{ e2e_nodeclass_name }}" --timeout=10m
        kubectl get "inspacenodeclass/{{ e2e_nodeclass_name }}" -o json | jq -e \
          --arg amd "$INSPACE_AMD_HOST_POOL_UUID" \
          --arg intel "aac7dd66-f390-4edd-80c0-dd7cae49bd99" \
          --arg cacheAddress "$cache_address" \
          --arg cacheCA "$cache_ca" '
          (.spec | has("hostPoolSelector") | not) and
          (.spec.bootstrapCache | keys | sort) == ["address", "caBundle", "directDownload"] and
          .spec.bootstrapCache.directDownload == false and
          .spec.bootstrapCache.address == $cacheAddress and
          .spec.bootstrapCache.caBundle == $cacheCA and
          (.status.hostPoolUUIDs | sort) == ([$intel, $amd] | sort)'
        kubectl get "nodepool/{{ e2e_nodepool_name }}" -o json | jq -e '
          .spec.template.spec.requirements as $requirements |
          ([ $requirements[] | select(
            .key == "inspace.cloud/instance-family" and
            .operator == "In" and
            .values == ["general"])] | length) == 1 and
          ([ $requirements[] | select(
            .key == "inspace.cloud/instance-cpu" and
            .operator == "Gt" and
            .values == ["1"])] | length) == 1 and
          ([ $requirements[] | select(
            .key == "inspace.cloud/host-class" and
            .operator == "In" and
            .values == ["amd-epyc"])] | length) == 1 and
          all($requirements[]; .key != "inspace.cloud/instance-memory")'
      args:
        executable: /bin/bash
      changed_when: true

    - name: Render and apply the single-worker trigger
      ansible.builtin.template:
        src: templates/trigger.yaml.j2
        dest: "{{ e2e_state_dir }}/trigger.yaml"
        mode: "0600"

    - name: Force and verify exactly one Karpenter worker
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl apply -f "{{ e2e_state_dir }}/trigger.yaml"
        kubectl -n default rollout status deployment/inspace-e2e-trigger --timeout=20m
        test "$(kubectl -n default get deployment/inspace-e2e-trigger -o jsonpath='{.spec.template.spec.containers[0].image}')" = \
          '{{ e2e_state.bootstrapCacheRegistry }}/rancher/mirrored-pause:3.6@sha256:c2280d2f5f56cf9c9a01bb64b2db4651e35efd6d62a54dcfc12049fe6449c5e4'
        kubectl wait --for=condition=Ready node -l "karpenter.sh/nodepool={{ e2e_nodepool_name }}" --timeout=10m
        kubectl get nodeclaims -l "karpenter.sh/nodepool={{ e2e_nodepool_name }}" -o json | jq -e '
          .items | length == 1 and
          all(.[]; any(.status.conditions[]; .type == "Ready" and .status == "True"))'
      args:
        executable: /bin/bash
      changed_when: true

    - name: Render the direct public-registry egress probe
      ansible.builtin.template:
        src: templates/registry-egress-probe.yaml.j2
        dest: "{{ e2e_state_dir }}/registry-egress-probe.yaml"
        mode: "0600"

    - name: Replace only registry-timeout workers while retaining their FIPs
      ansible.builtin.command:
        argv:
          - /opt/e2e/scripts/ensure-worker-egress.sh
          - --kubeconfig
          - "{{ e2e_state_dir }}/kubeconfig.yaml"
          - --nodepool
          - "{{ e2e_nodepool_name }}"
          - --probe-template
          - "{{ e2e_state_dir }}/registry-egress-probe.yaml"
          - --result
          - "{{ e2e_state_dir }}/worker-egress.json"
      register: e2e_worker_egress
      changed_when: true

    - name: Require a bounded direct-registry egress result
      ansible.builtin.assert:
        that:
          - (e2e_worker_egress.stdout | from_json).attempts | int >= 1
          - (e2e_worker_egress.stdout | from_json).attempts | int <= 3
          - (e2e_worker_egress.stdout | from_json).winner.node | length > 0
          - (e2e_worker_egress.stdout | from_json).winner.nodeClaim | length > 0
          - (e2e_worker_egress.stdout | from_json).winner.publicIPv4 is match('^[0-9]+(?:\.[0-9]+){3}$')

    - name: Read the exact Karpenter worker identity
      ansible.builtin.shell: |
        set -euo pipefail
        node=$(kubectl get nodes -l "karpenter.sh/nodepool={{ e2e_nodepool_name }}" -o json | jq -cer '
          if (.items | length) == 1 then .items[0] else error("expected exactly one worker") end')
        provider_id=$(jq -er '.spec.providerID | select(length > 0)' <<<"$node")
        nodeclaim=$(kubectl get nodeclaims -l "karpenter.sh/nodepool={{ e2e_nodepool_name }}" -o json | jq -cer \
          --arg providerID "$provider_id" '
          [.items[] | select(.status.providerID == $providerID)] |
          if length == 1 then .[0] else error("expected one NodeClaim bound through the worker provider ID") end')
        node_name=$(jq -er '.metadata.name' <<<"$node")
        jq -e --arg nodeName "$node_name" '.status.nodeName == $nodeName' <<<"$nodeclaim" >/dev/null
        jq -e '
          .metadata.labels["inspace.cloud/host-class"] == "amd-epyc" and
          .metadata.labels["inspace.cloud/instance-cpu"] == "2" and
          .metadata.labels["inspace.cloud/instance-memory"] == "4096"' <<<"$node" >/dev/null
        jq -e '
          .metadata.labels["inspace.cloud/host-class"] == "amd-epyc" and
          .metadata.labels["inspace.cloud/instance-cpu"] == "2" and
          .metadata.labels["inspace.cloud/instance-memory"] == "4096"' <<<"$nodeclaim" >/dev/null
        jq -cn --argjson node "$node" --argjson nodeclaim "$nodeclaim" '
          {name:$node.metadata.name,nodeClaimName:$nodeclaim.metadata.name,providerID:$node.spec.providerID,
           internalIPs:[$node.status.addresses[]|select(.type=="InternalIP")|.address],
           externalIPs:[$node.status.addresses[]|select(.type=="ExternalIP")|.address]}'
      args:
        executable: /bin/bash
      register: e2e_worker_node_command
      changed_when: false

    - name: Persist exact worker cloud ownership and VPC proof
      ansible.builtin.command:
        argv:
          - /opt/e2e/scripts/discover-worker.py
          - --state
          - "{{ e2e_state_file }}"
          - --node
          - "{{ e2e_worker_node_command.stdout }}"
      register: e2e_worker_cloud_command
      changed_when: true
      no_log: true

    - name: Decode the worker cloud identity
      ansible.builtin.set_fact:
        e2e_worker_cloud: "{{ e2e_worker_cloud_command.stdout | from_json }}"

    - name: Regenerate SSH configuration with the private worker route
      ansible.builtin.command:
        argv:
          - /opt/e2e/scripts/render-ssh-config.py
          - --state
          - "{{ e2e_state_file }}"
          - --output
          - "{{ e2e_state_dir }}/ssh-config"
      changed_when: true

    - name: Add the dynamically created RKE2 worker for parallel-safe validation
      ansible.builtin.add_host:
        name: rke2-worker-01
        groups: rke2_worker
        ansible_host: rke2-worker-01
        ansible_user: "{{ e2e_ssh_user }}"
        ansible_ssh_common_args: "-F {{ e2e_state_dir }}/ssh-config"
        e2e_private_ip: "{{ e2e_worker_cloud.internalIPv4 }}"
        e2e_public_ip: "{{ e2e_worker_cloud.publicIPv4 }}"
        e2e_node_name: "{{ e2e_worker_cloud.name }}"
        e2e_nodeclaim_name: "{{ e2e_worker_cloud.nodeClaimName }}"
        e2e_known_hosts: "{{ e2e_state_dir }}/known-hosts-worker"

- name: Verify the dynamically provisioned RKE2 worker
  hosts: rke2_worker
  gather_facts: false
  vars:
    e2e_worker_state: "{{ lookup('file', lookup('env', 'E2E_STATE_DIR') + '/state.json') | from_json }}"
    e2e_private_registration_endpoint: >-
      {{ e2e_worker_state.privateRegistrationEndpoint }}
    e2e_cache_address: "{{ e2e_worker_state.bootstrapCacheAddress }}"
    e2e_cache_registry: "{{ e2e_worker_state.bootstrapCacheRegistry }}"
    e2e_cache_ca_bundle: "{{ e2e_worker_state.bootstrapCacheCABundle }}"
  tasks:
    - name: Probe worker private SSH from the bastion
      ansible.builtin.command:
        argv:
          - ssh
          - -F
          - "{{ lookup('env', 'E2E_STATE_DIR') }}/ssh-config"
          - e2e-bastion
          - "timeout --kill-after=2s 10s bash -c '</dev/tcp/{{ e2e_private_ip }}/22'"
      register: e2e_worker_private_ssh
      delegate_to: localhost
      changed_when: false
      retries: 120
      delay: 5
      until: e2e_worker_private_ssh.rc == 0

    - name: Scan the worker private SSH host key from the bastion
      ansible.builtin.command:
        argv:
          - ssh
          - -F
          - "{{ lookup('env', 'E2E_STATE_DIR') }}/ssh-config"
          - e2e-bastion
          - "ssh-keyscan -T 15 -H {{ e2e_private_ip }}"
      register: e2e_worker_keyscan
      delegate_to: localhost
      changed_when: false
      retries: 20
      delay: 5
      until: e2e_worker_keyscan.rc == 0 and e2e_worker_keyscan.stdout | length > 0

    - name: Store the pinned worker key
      ansible.builtin.copy:
        content: "{{ e2e_worker_keyscan.stdout }}\n"
        dest: "{{ e2e_known_hosts }}"
        mode: "0600"
      delegate_to: localhost

    - name: Wait for authenticated worker SSH
      ansible.builtin.wait_for_connection:
        connect_timeout: 10
        sleep: 5
        timeout: 900

    - name: Wait for worker cloud-init within a hard outer timeout
      ansible.builtin.raw: >-
        timeout --kill-after=5s 1200s sh -c
        'cloud-init status --wait >/dev/null 2>&1 || test $? -eq 2'
      become: true
      changed_when: false

    - name: Verify cloud-init Ubuntu and the RKE2 agent
      ansible.builtin.shell: |
        set -euo pipefail
        systemctl is-active --quiet rke2-agent
        /usr/local/bin/rke2 --version | grep -F 'v1.35.6+rke2r1'
        grep -F -- 'server: "{{ e2e_private_registration_endpoint }}"' /etc/rancher/rke2/config.yaml
        grep -Fqx -- 'node-name: "{{ e2e_node_name }}"' /etc/rancher/rke2/config.yaml
        cache_registry={{ e2e_cache_registry | quote }}
        cache_host=${cache_registry%:8443}
        grep -Fqx -- "{{ e2e_cache_address }} $cache_host # inspace-bootstrap-cache" /etc/hosts
        grep -Fqx -- "system-default-registry: \"$cache_registry\"" /etc/rancher/rke2/config.yaml
        printf '%s' {{ e2e_cache_ca_bundle | quote }} | cmp -s - /etc/rancher/rke2/bootstrap-cache-ca.crt
        test "$(grep -Fc -- "  \"$cache_registry\":" /etc/rancher/rke2/registries.yaml)" -eq 1
        grep -Fqx -- '      ca_file: "/etc/rancher/rke2/bootstrap-cache-ca.crt"' /etc/rancher/rke2/registries.yaml
        test "$(hostname)" = "{{ e2e_node_name }}"
        test "$(hostnamectl --static)" = "{{ e2e_node_name }}"
        test "$(cat /etc/hostname)" = "{{ e2e_node_name }}"
        test "$(awk '$1 == "127.0.1.1" { count++ } END { print count + 0 }' /etc/hosts)" -eq 1
        grep -Eq '^127\.0\.1\.1[[:space:]]+{{ e2e_node_name }}([[:space:]]|$)' /etc/hosts
        getent hosts "{{ e2e_node_name }}" | grep -Eq '^127\.0\.1\.1[[:space:]]'
        ip -4 -o addr show scope global | grep -F -- "{{ e2e_private_ip }}/"
        ! ip -4 -o addr show scope global | grep -F -- "{{ e2e_public_ip }}/"
        ! pgrep -x kube-proxy
        test -f /var/lib/inspace/kubernetes-node-prepared-v1
        test -z "$(swapon --noheadings)"
        if awk '$0 !~ /^[[:space:]]*#/ && NF >= 3 && $3 == "swap" { found=1 } END { exit found ? 0 : 1 }' /etc/fstab; then exit 1; fi
        test ! -e /etc/apt/sources.list
        grep -Fqx $'http://mirror1.totbb.net/ubuntu/\tpriority:1' /etc/apt/mirrors/inspace-ubuntu.list
        grep -Fqx $'https://mirror.kku.ac.th/ubuntu/\tpriority:2' /etc/apt/mirrors/inspace-ubuntu.list
        test "$(grep -Fc 'URIs: mirror+file:/etc/apt/mirrors/inspace-ubuntu.list' /etc/apt/sources.list.d/ubuntu.sources)" -eq 2
        grep -Fqx 'Suites: noble noble-updates noble-backports' /etc/apt/sources.list.d/ubuntu.sources
        grep -Fqx 'Suites: noble-security' /etc/apt/sources.list.d/ubuntu.sources
        test ! -L /etc/resolv.conf
        grep -Fqx 'nameserver 8.8.8.8' /etc/resolv.conf
        grep -Fqx 'nameserver 8.8.4.4' /etc/resolv.conf
        test "$(systemctl is-enabled systemd-resolved.service 2>/dev/null || true)" = masked
        ! systemctl is-active --quiet systemd-resolved.service
        grep -Fqx 'APT::Periodic::Enable "0";' /etc/apt/apt.conf.d/99-inspace-disable-periodic
        grep -Fqx 'APT::Periodic::Update-Package-Lists "0";' /etc/apt/apt.conf.d/99-inspace-disable-periodic
        grep -Fqx 'APT::Periodic::Unattended-Upgrade "0";' /etc/apt/apt.conf.d/99-inspace-disable-periodic
        for apt_unit in apt-daily.service apt-daily-upgrade.service apt-daily.timer apt-daily-upgrade.timer unattended-upgrades.service; do
          ! systemctl is-active --quiet "$apt_unit"
          test "$(systemctl is-enabled "$apt_unit" 2>/dev/null || true)" = masked
        done
        grep -Fqx 'net.ipv4.ip_forward = 1' /etc/sysctl.d/90-inspace-kubernetes.conf
        grep -Fqx 'fs.inotify.max_user_instances = 8192' /etc/sysctl.d/90-inspace-kubernetes.conf
        grep -Fqx 'fs.inotify.max_user_watches = 524288' /etc/sysctl.d/90-inspace-kubernetes.conf
        test "$(sysctl -n net.ipv4.ip_forward)" -eq 1
        test "$(sysctl -n fs.inotify.max_user_instances)" -ge 8192
        test "$(sysctl -n fs.inotify.max_user_watches)" -ge 524288
        grep -Fqx 'root hard nofile 1048576' /etc/security/limits.d/90-inspace-kubernetes.conf
        test "$(systemctl show rke2-agent.service --property=LimitNOFILE --value)" = 1048576
        test "$(systemctl show rke2-agent.service --property=LimitNPROC --value)" = infinity
        test "$(systemctl show rke2-agent.service --property=LimitMEMLOCK --value)" = infinity
        test "$(systemctl show rke2-agent.service --property=TasksMax --value)" = infinity
        if command -v ufw >/dev/null 2>&1; then
          ufw_status=$(ufw status)
          ! grep -Eiq '^Status:[[:space:]]+active' <<<"$ufw_status"
        fi
        ufw_load_state=$(systemctl show ufw.service --property=LoadState --value)
        case "$ufw_load_state" in
          loaded)
            ! systemctl is-active --quiet ufw.service
            ufw_enabled=$(systemctl is-enabled ufw.service 2>/dev/null || true)
            test "$ufw_enabled" = disabled || test "$ufw_enabled" = masked
            ;;
          not-found) ;;
          *) exit 1 ;;
        esac
        . /etc/os-release
        test "$ID" = ubuntu
        test "$VERSION_ID" = 24.04
      args:
        executable: /bin/bash
      become: true
      register: e2e_worker_ready
      changed_when: false
      retries: 120
      delay: 10
      until: e2e_worker_ready.rc == 0

    - name: Mark reusable cluster initialization complete
      ansible.builtin.command:
        argv:
          - /opt/e2e/scripts/state-update.py
          - "{{ lookup('env', 'E2E_STATE_DIR') }}/state.json"
          - initComplete
          - "true"
      delegate_to: localhost
      changed_when: true
