apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: inspacenodeclasses.karpenter.inspace.cloud
spec:
  group: karpenter.inspace.cloud
  scope: Cluster
  names:
    plural: inspacenodeclasses
    singular: inspacenodeclass
    kind: InSpaceNodeClass
    listKind: InSpaceNodeClassList
    categories:
      - karpenter
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Location
          type: string
          jsonPath: .spec.location
        - name: Host Class
          type: string
          jsonPath: .spec.hostPoolSelector.class
        - name: Ready
          type: string
          jsonPath: '.status.conditions[?(@.type=="Ready")].status'
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - clusterName
                - billingAccountID
                - location
                - networkUUID
                - privateLoadBalancerPool
                - reservePublicIPv4
                - firewallUUID
                - imageSelector
                - hostPoolSelector
                - rootDiskGiB
                - rke2
              x-kubernetes-validations:
                - rule: 'has(self.sshUsername) == has(self.sshPublicKey)'
                  message: sshUsername and sshPublicKey must be configured together
                - rule: 'self.privateLoadBalancerPool == oldSelf.privateLoadBalancerPool'
                  message: privateLoadBalancerPool is immutable
              properties:
                clusterName:
                  type: string
                  minLength: 1
                  maxLength: 253
                  pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$'
                billingAccountID:
                  type: integer
                  format: int64
                  minimum: 1
                location:
                  type: string
                  enum: [bkk01]
                networkUUID:
                  type: string
                  format: uuid
                  description: >-
                    Private worker VPC. Its RFC1918 prefix must be /27 or
                    shorter so it can contain the reserved Service range plus
                    a distinct usable RKE2 supervisor VIP, and must not overlap
                    10.42.0.0/16 or 10.43.0.0/16. It must exactly match the
                    controller-wide network UUID.
                privateLoadBalancerPool:
                  type: object
                  description: >-
                    Inclusive canonical RFC1918 IPv4 range reserved for
                    private Cilium LB IPAM Services. Both endpoints must be
                    usable hosts in networkUUID; the range must contain 16 to
                    256 addresses and must exclude the RKE2 supervisor VIP,
                    10.42.0.0/16, and 10.43.0.0/16. Worker NIC addresses are
                    forbidden from this exact configured range.
                  required: [start, stop]
                  properties:
                    start:
                      type: string
                      pattern: '^(10\.((25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])\.){2}(25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])|172\.(1[6-9]|2[0-9]|3[01])\.(25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])\.(25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])|192\.168\.(25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])\.(25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9]))$'
                    stop:
                      type: string
                      pattern: '^(10\.((25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])\.){2}(25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])|172\.(1[6-9]|2[0-9]|3[01])\.(25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])\.(25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])|192\.168\.(25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])\.(25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9]))$'
                reservePublicIPv4:
                  type: boolean
                  enum: [true]
                firewallUUID:
                  type: string
                  format: uuid
                  description: >-
                    Pre-created default-deny firewall. It must allow all-port
                    TCP, UDP, and ICMP ingress from both the VPC subnet and
                    Cilium pod CIDR 10.42.0.0/16, plus matching
                    any-destination egress, with no public inbound rule.
                imageSelector:
                  type: object
                  required: [osName, osVersion]
                  properties:
                    osName:
                      type: string
                      enum: [ubuntu]
                    osVersion:
                      type: string
                      enum: ["24.04"]
                hostPoolSelector:
                  type: object
                  required: [class]
                  properties:
                    class:
                      type: string
                      enum: [intel-scalable, amd-epyc]
                rootDiskGiB:
                  type: integer
                  format: int32
                  minimum: 30
                  maximum: 2000
                rke2:
                  type: object
                  required: [version, server, tokenSecretRef]
                  properties:
                    version:
                      type: string
                      pattern: '^v[0-9]+\.[0-9]+\.[0-9]+\+rke2r[0-9]+$'
                    server:
                      type: string
                      description: >-
                        Private RKE2 supervisor endpoint. The literal RFC1918
                        VIP must be a usable host address inside networkUUID
                        and outside 10.42.0.0/16 and 10.43.0.0/16; network,
                        broadcast, DNS, and public endpoints are invalid. The
                        VIP must exactly match the controller-wide control VIP.
                      pattern: '^https://(10\.((25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])\.){2}(25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])|172\.(1[6-9]|2[0-9]|3[01])\.(25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])\.(25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])|192\.168\.(25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])\.(25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])):9345$'
                      x-kubernetes-validations:
                        - rule: "!self.startsWith('https://10.42.')"
                          message: server must not use Cilium native-routing pod CIDR 10.42.0.0/16
                        - rule: "!self.startsWith('https://10.43.')"
                          message: server must not use Kubernetes Service CIDR 10.43.0.0/16
                    tokenSecretRef:
                      type: object
                      required: [name, key]
                      properties:
                        name:
                          type: string
                          minLength: 1
                          maxLength: 253
                          enum: [inspace-rke2-agent-token]
                        key:
                          type: string
                          minLength: 1
                          enum: [token]
                sshUsername:
                  type: string
                  minLength: 1
                  maxLength: 30
                  pattern: '^[a-z_][a-z0-9_-]{0,29}$'
                sshPublicKey:
                  type: string
                  minLength: 1
                  maxLength: 16384
                  pattern: '^(ssh-rsa|ssh-ed25519|ecdsa-sha2-nistp(256|384|521))[ \t]+[A-Za-z0-9+/]+={0,2}([ \t]+[^\r\n]*)?$'
                additionalUserData:
                  type: string
                  maxLength: 65536
            status:
              type: object
              properties:
                hostPoolUUID:
                  type: string
                firewallUUID:
                  type: string
                observedImageID:
                  type: string
                observedSpecHash:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
                observedBillingAccountID:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys: [type]
                  items:
                    type: object
                    required: [lastTransitionTime, message, reason, status, type]
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      reason:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", Unknown]
                      type:
                        type: string
