apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: inspaceclusters.infrastructure.inspace.cloud
spec:
  group: infrastructure.inspace.cloud
  names:
    kind: InSpaceCluster
    listKind: InSpaceClusterList
    plural: inspaceclusters
    singular: inspacecluster
    shortNames:
      - isc
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: Endpoint
          type: string
          jsonPath: .status.controlPlaneEndpoint
      schema:
        openAPIV3Schema:
          type: object
          required: [apiVersion, kind, metadata, spec]
          x-kubernetes-validations:
            - rule: 'self.metadata.name.matches("^[a-z0-9](?:[a-z0-9-]{0,53}[a-z0-9])?$") || (oldSelf.hasValue() && self.metadata.name == oldSelf.value().metadata.name)'
              message: metadata.name must be a lowercase DNS label of at most 55 characters so fixed bastion and control-plane hostnames fit within 63 characters
              optionalOldSelf: true
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required: [location, billingAccountID, credentialsSecretRef, controlPlane, bootstrapCache, rke2, network, firewall, publicIPv4, endpoint]
              x-kubernetes-validations:
                - rule: '!self.endpoint.virtualIPv4.startsWith("10.42.") && !self.endpoint.virtualIPv4.startsWith("10.43.")'
                  message: control-plane virtualIPv4 must not overlap podCIDR or serviceCIDR
              properties:
                location:
                  type: string
                  pattern: '^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?$'
                billingAccountID:
                  type: integer
                  format: int64
                  minimum: 1
                credentialsSecretRef:
                  type: object
                  required: [name, key]
                  properties:
                    name:
                      type: string
                      minLength: 1
                    key:
                      type: string
                      minLength: 1
                controlPlane:
                  type: object
                  required: [replicas, machine]
                  properties:
                    replicas:
                      type: integer
                      format: int32
                      enum:
                        - 1
                        - 3
                      x-kubernetes-validations:
                        - rule: self == oldSelf
                          message: control-plane replica count is immutable after cluster creation
                    machine:
                      type: object
                      required: [vcpu, memoryMiB, rootDiskGiB, hostPoolUUID, image]
                      properties:
                        vcpu:
                          type: integer
                          format: int32
                          minimum: 2
                          maximum: 16
                        memoryMiB:
                          type: integer
                          format: int32
                          minimum: 4096
                          maximum: 65536
                        rootDiskGiB:
                          type: integer
                          format: int32
                          minimum: 30
                          maximum: 2000
                        hostPoolUUID:
                          type: string
                          format: uuid
                        image:
                          type: object
                          required: [osName, osVersion]
                          properties:
                            osName:
                              type: string
                              enum: [ubuntu]
                            osVersion:
                              type: string
                              enum: ["24.04"]
                bootstrapCache:
                  type: object
                  properties:
                    directDownload:
                      type: boolean
                      default: false
                rke2:
                  type: object
                  required: [version, tokenSecretRef]
                  properties:
                    version:
                      type: string
                      pattern: '^v[0-9]+\.[0-9]+\.[0-9]+\+rke2r[0-9]+$'
                    skipOSUpgrade:
                      type: boolean
                      default: false
                      description: >-
                        Explicit optimization for short-lived test clusters.
                        Omitted or false performs the production OS package
                        upgrade. Package-index refresh and required package
                        installation always run.
                    tokenSecretRef:
                      type: object
                      required: [name, key]
                      properties:
                        name:
                          type: string
                          minLength: 1
                        key:
                          type: string
                          minLength: 1
                    disable:
                      type: array
                      x-kubernetes-list-type: set
                      items:
                        type: string
                      x-kubernetes-validations:
                        - rule: 'self.all(component, component != "rke2-cilium")'
                          message: rke2-cilium cannot be disabled while kube-proxy replacement is enabled
                    tlsSubjectAltNames:
                      type: array
                      items:
                        type: string
                network:
                  type: object
                  required: [uuid, podCIDR, serviceCIDR, privateLoadBalancerPool]
                  x-kubernetes-validations:
                    - rule: 'self.podCIDR != self.serviceCIDR'
                      message: podCIDR and serviceCIDR must differ
                  properties:
                    uuid:
                      type: string
                      format: uuid
                    podCIDR:
                      type: string
                      format: cidr
                      enum: [10.42.0.0/16]
                    serviceCIDR:
                      type: string
                      format: cidr
                      enum: [10.43.0.0/16]
                    privateLoadBalancerPool:
                      type: object
                      required: [start, stop]
                      x-kubernetes-validations:
                        - rule: 'self == oldSelf'
                          message: privateLoadBalancerPool is immutable
                        - rule: >-
                            (int(self.start.split('.')[0]) * 16777216 + int(self.start.split('.')[1]) * 65536 + int(self.start.split('.')[2]) * 256 + int(self.start.split('.')[3])) <=
                            (int(self.stop.split('.')[0]) * 16777216 + int(self.stop.split('.')[1]) * 65536 + int(self.stop.split('.')[2]) * 256 + int(self.stop.split('.')[3]))
                          message: privateLoadBalancerPool start must be less than or equal to stop
                        - rule: >-
                            ((int(self.stop.split('.')[0]) * 16777216 + int(self.stop.split('.')[1]) * 65536 + int(self.stop.split('.')[2]) * 256 + int(self.stop.split('.')[3])) -
                            (int(self.start.split('.')[0]) * 16777216 + int(self.start.split('.')[1]) * 65536 + int(self.start.split('.')[2]) * 256 + int(self.start.split('.')[3])) + 1) >= 16 &&
                            ((int(self.stop.split('.')[0]) * 16777216 + int(self.stop.split('.')[1]) * 65536 + int(self.stop.split('.')[2]) * 256 + int(self.stop.split('.')[3])) -
                            (int(self.start.split('.')[0]) * 16777216 + int(self.start.split('.')[1]) * 65536 + int(self.start.split('.')[2]) * 256 + int(self.start.split('.')[3])) + 1) <= 256
                          message: privateLoadBalancerPool must contain between 16 and 256 addresses
                        - rule: >-
                            (int(self.stop.split('.')[0]) * 16777216 + int(self.stop.split('.')[1]) * 65536 + int(self.stop.split('.')[2]) * 256 + int(self.stop.split('.')[3])) < 170524672 ||
                            (int(self.start.split('.')[0]) * 16777216 + int(self.start.split('.')[1]) * 65536 + int(self.start.split('.')[2]) * 256 + int(self.start.split('.')[3])) > 170655743
                          message: privateLoadBalancerPool must not overlap podCIDR or serviceCIDR
                      properties:
                        start:
                          type: string
                          format: ipv4
                          maxLength: 15
                          x-kubernetes-validations:
                            - rule: 'isIP(self) && ip.isCanonical(self) && ip(self).family() == 4'
                              message: start must be a canonical IPv4 address
                            - rule: 'self.startsWith("10.") || self.matches("^192\\.168\\.") || self.matches("^172\\.(1[6-9]|2[0-9]|3[01])\\.")'
                              message: start must be an RFC1918 IPv4 address
                        stop:
                          type: string
                          format: ipv4
                          maxLength: 15
                          x-kubernetes-validations:
                            - rule: 'isIP(self) && ip.isCanonical(self) && ip(self).family() == 4'
                              message: stop must be a canonical IPv4 address
                            - rule: 'self.startsWith("10.") || self.matches("^192\\.168\\.") || self.matches("^172\\.(1[6-9]|2[0-9]|3[01])\\.")'
                              message: stop must be an RFC1918 IPv4 address
                firewall:
                  type: object
                  required: [managed]
                  properties:
                    managed:
                      type: boolean
                      enum: [true]
                publicIPv4:
                  type: object
                  required: [managed]
                  properties:
                    managed:
                      type: boolean
                      enum: [true]
                endpoint:
                  type: object
                  required: [virtualIPv4, port]
                  properties:
                    virtualIPv4:
                      type: string
                      format: ipv4
                      x-kubernetes-validations:
                        - rule: 'self.startsWith("10.") || self.matches("^192\\.168\\.") || self.matches("^172\\.(1[6-9]|2[0-9]|3[01])\\.")'
                          message: virtualIPv4 must be an RFC1918 private IPv4 address
                    port:
                      type: integer
                      format: int32
                      minimum: 6443
                      maximum: 6443
                      default: 6443
            status:
              type: object
              properties:
                ready:
                  type: boolean
                observedGeneration:
                  type: integer
                  format: int64
                controlPlaneEndpoint:
                  type: string
                message:
                  type: string
                createAttempts:
                  type: object
                  maxProperties: 14
                  additionalProperties:
                    type: object
                    required: [resourceKind, resourceName, intentHash, phase]
                    properties:
                      resourceKind:
                        type: string
                        enum: [virtual-machine, firewall, firewall-assignment, floating-ip-update]
                      resourceName:
                        type: string
                        minLength: 1
                        maxLength: 255
                      intentHash:
                        type: string
                        pattern: '^[0-9a-f]{64}$'
                      phase:
                        type: string
                        enum: [intent, issued, rejection-pending, materialized, adopted]
                      issueID:
                        type: string
                        pattern: '^[0-9a-f]{32}$'
                      issuedAt:
                        type: string
                        format: date-time
                      absenceObservedAt:
                        type: string
                        format: date-time
                      resourceUUID:
                        type: string
                        format: uuid
                deleteAttempts:
                  type: object
                  maxProperties: 10
                  additionalProperties:
                    type: object
                    required: [resourceKind, resourceName, location, owner, purpose, phase]
                    properties:
                      resourceKind:
                        type: string
                        enum: [virtual-machine, floating-ip, firewall]
                      resourceName:
                        type: string
                        minLength: 1
                        maxLength: 255
                      resourceUUID:
                        type: string
                        format: uuid
                      firewallUUID:
                        type: string
                        format: uuid
                      relatedResourceUUID:
                        type: string
                        format: uuid
                      location:
                        type: string
                        minLength: 1
                        maxLength: 63
                      owner:
                        type: string
                        minLength: 1
                        maxLength: 64
                      purpose:
                        type: string
                        enum: [destroy, malformed-create-rollback]
                      phase:
                        type: string
                        enum: [rollback-fip-discovery, rollback-fip-after-vm, rollback-fip-unassign-intent, rollback-fip-unassign-issued, rollback-fip-delete-intent, rollback-fip-delete-issued, vm-delete-intent, vm-delete-issued, floating-ip-unassign-intent, floating-ip-unassign-issued, floating-ip-delete-intent, floating-ip-delete-issued, firewall-delete-intent, firewall-delete-issued, absent]
                      issueID:
                        type: string
                        pattern: '^[0-9a-f]{32}$'
                      issuedAt:
                        type: string
                        format: date-time
                      absenceObservedAt:
                        type: string
                        format: date-time
                      floatingIPName:
                        type: string
                        minLength: 1
                        maxLength: 255
                      floatingIPAddress:
                        type: string
                        format: ipv4
