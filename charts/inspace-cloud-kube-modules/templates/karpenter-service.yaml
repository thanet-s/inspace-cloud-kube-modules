{{- if .Values.karpenter.enabled }}
{{- $component := "karpenter" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "inspace.componentName" (dict "root" . "component" $component) }}
  namespace: {{ include "inspace.karpenterNamespace" . }}
  labels:
    {{- include "inspace.componentLabels" (dict "root" . "component" $component) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "inspace.selectorLabels" (dict "root" . "component" $component) | nindent 4 }}
  ports:
    - name: http-metrics
      port: 8080
      targetPort: metrics
      protocol: TCP
{{- end }}
