{{- if .Values.csi.enabled }}
{{- $controller := "csi-controller" }}
{{- $node := "csi-node" }}
{{- if .Values.csi.controller.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "inspace.serviceAccountName" (dict "root" . "component" $controller "serviceAccount" .Values.csi.controller.serviceAccount) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "inspace.componentLabels" (dict "root" . "component" $controller) | nindent 4 }}
  {{- with .Values.csi.controller.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
{{- end }}
{{- if .Values.csi.node.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "inspace.serviceAccountName" (dict "root" . "component" $node "serviceAccount" .Values.csi.node.serviceAccount) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "inspace.componentLabels" (dict "root" . "component" $node) | nindent 4 }}
  {{- with .Values.csi.node.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
{{- end }}
