apiVersion: v1
kind: Service
metadata:
  name: example-private
  labels:
    app.kubernetes.io/name: example-private
    inspace.cloud/load-balancer-scope: private
spec:
  type: LoadBalancer
  loadBalancerClass: io.cilium/l2-announcer
  # Cilium L2 Announcements does not support externalTrafficPolicy: Local.
  externalTrafficPolicy: Cluster
  selector:
    app.kubernetes.io/name: example-private
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
