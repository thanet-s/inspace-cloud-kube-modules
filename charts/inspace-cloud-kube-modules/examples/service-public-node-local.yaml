apiVersion: karpenter.inspace.cloud/v1alpha1
kind: InSpaceNodeClass
metadata:
  name: ubuntu-public-edge
spec:
  clusterName: example-rke2
  billingAccountID: 12345
  location: bkk01
  networkUUID: 11111111-1111-4111-8111-111111111111
  privateLoadBalancerPool:
    start: 10.20.30.200
    stop: 10.20.30.239
  reservePublicIPv4: true
  # Keep the normal private-node firewall as the base. This profile permits
  # only CCM-owned per-Service TCP/UDP firewalls in addition to it.
  firewallUUID: 22222222-2222-4222-8222-222222222222
  firewallProfile: public-node-local
  imageSelector:
    osName: ubuntu
    osVersion: "24.04"
  rootDiskGiB: 30
  bootstrapCache:
    # Use the bastion cache address and CA here when the cluster cache is on.
    directDownload: true
  rke2:
    version: v1.35.6+rke2r1
    server: https://10.20.30.10:9345
    tokenSecretRef:
      name: inspace-rke2-agent-token
      key: token
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: public-edge
spec:
  # Static NodePools maintain an operator-selected node count. Change this
  # value, or use `kubectl scale nodepool public-edge --replicas=N`.
  replicas: 2
  limits:
    # One spare slot allows Karpenter to replace a node before removing it.
    nodes: 3
  template:
    metadata:
      labels:
        inspace.cloud.node-restriction.kubernetes.io/public-local-pool: edge
    spec:
      expireAfter: Never
      nodeClassRef:
        group: karpenter.inspace.cloud
        kind: InSpaceNodeClass
        name: ubuntu-public-edge
      taints:
        - key: inspace.cloud/public-local
          value: "true"
          effect: NoSchedule
      requirements:
        - key: inspace.cloud/instance-family
          operator: In
          values: [general]
        - key: inspace.cloud/instance-cpu
          operator: In
          values: ["1"]
        - key: inspace.cloud/instance-memory
          operator: In
          values: ["2048"]
        - key: inspace.cloud/host-class
          operator: In
          values: [amd-epyc]
        - key: karpenter.sh/capacity-type
          operator: In
          values: [on-demand]
        - key: kubernetes.io/arch
          operator: In
          values: [amd64]
        - key: kubernetes.io/os
          operator: In
          values: [linux]
  disruption:
    # These settings prevent voluntary replacement of the reserved edge pool.
    # Static pools ignore consolidation, but the CRD still requires this field.
    consolidateAfter: Never
    budgets:
      - nodes: "0"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-public-local
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: example-public-local
  template:
    metadata:
      labels:
        app.kubernetes.io/name: example-public-local
    spec:
      nodeSelector:
        inspace.cloud.node-restriction.kubernetes.io/public-local-pool: edge
      tolerations:
        - key: inspace.cloud/public-local
          operator: Equal
          value: "true"
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: example-public-local
      containers:
        - name: web
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: example-public-local
  annotations:
    service.inspace.cloud/node-lb-mode: public-node-local
    service.inspace.cloud/node-lb-pool: edge
spec:
  type: LoadBalancer
  loadBalancerClass: inspace.cloud/node
  # This disables data-port NodePorts. Kubernetes still allocates the standard
  # healthCheckNodePort required by externalTrafficPolicy: Local.
  allocateLoadBalancerNodePorts: false
  externalTrafficPolicy: Local
  # The CCM rejects true because it would weaken the Ready-endpoint gate.
  publishNotReadyAddresses: false
  selector:
    app.kubernetes.io/name: example-public-local
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
