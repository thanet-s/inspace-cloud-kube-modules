apiVersion: v1
kind: Service
metadata:
  name: example-public
  labels:
    app.kubernetes.io/name: example-public
    inspace.cloud/load-balancer-scope: public
  annotations:
    service.beta.kubernetes.io/inspace-load-balancer-public: "true"
spec:
  type: LoadBalancer
  # The InSpace CCM watches EndpointSlices and targets only nodes with a local,
  # Ready, non-terminating endpoint for this Service. Kubernetes otherwise
  # defaults this field to Cluster; CCM does not mutate Service specs.
  externalTrafficPolicy: Local
  # Deliberately omit loadBalancerClass: the generic external CCM handles only
  # classless Services. InSpace public NLB forwarding is TCP-only.
  selector:
    app.kubernetes.io/name: example-public
  ports:
    - name: https
      protocol: TCP
      port: 443
      targetPort: 8443
