apiVersion: v1
kind: Service
metadata:
  name: example-public-dedicated
  annotations:
    service.inspace.cloud/node-lb-mode: public-node-dedicated
    # These are optional. Dedicated mode defaults to 1 CPU and 2 GiB.
    # This is also the enforced minimum.
    service.inspace.cloud/node-lb-cpu: "4"
    service.inspace.cloud/node-lb-memory: 8Gi
spec:
  type: LoadBalancer
  loadBalancerClass: inspace.cloud/node
  allocateLoadBalancerNodePorts: false
  externalTrafficPolicy: Cluster
  selector:
    app.kubernetes.io/name: example
  ports:
    - name: https
      protocol: TCP
      port: 443
      targetPort: 8443
