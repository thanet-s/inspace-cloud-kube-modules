apiVersion: v1
kind: Service
metadata:
  name: example-public-shared
  # Omit service.inspace.cloud/node-lb-mode: public-node-shared; shared is the
  # default. Non-conflicting TCP/UDP ports automatically reuse one shard.
spec:
  type: LoadBalancer
  loadBalancerClass: inspace.cloud/node
  allocateLoadBalancerNodePorts: false
  externalTrafficPolicy: Cluster
  selector:
    app.kubernetes.io/name: example
  ports:
    - name: https
      protocol: TCP
      port: 443
      targetPort: 8443
