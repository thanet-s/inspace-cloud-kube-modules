nameOverride: ""
fullnameOverride: ""

global:
  imagePullSecrets: []
  inspace:
    apiBaseURL: https://api.inspace.cloud
    location: bkk01
    region: thailand
    # Optional registry host (without a scheme or path) for chart-owned system
    # images. Empty keeps direct pulls from GHCR and registry.k8s.io.
    systemImageRegistry: ""
    networkUUID: ""
    clusterID: ""
    # Private kube-vip used by the RKE2 API and supervisor endpoints. CCM uses
    # it to reject an InSpace NLB address collision.
    controlPlaneVIP: ""
    # An inclusive 16-256-address RFC1918 range reserved exclusively for Cilium
    # LoadBalancer IPAM. The operator must exclude it from InSpace VM and NLB
    # allocation; the current InSpace API cannot reserve it for the chart.
    privateLoadBalancerPool:
      start: ""
      stop: ""
    # This chart never creates or copies the cloud API credential. Create one
    # Secret with both keys before installing; all three controllers use it.
    apiSecret:
      name: inspace-cloud-credentials
      tokenKey: api-token
      billingAccountIDKey: billing-account-id

ccm:
  enabled: true
  nodeLoadBalancer:
    # Public node load balancers use CCM-managed shared/dedicated shards backed
    # by static Karpenter capacity and Cilium private-IP Service frontends.
    enabled: true
    nodesPerShard: 1
  replicaCount: 2
  image:
    repository: ghcr.io/thanet-s/inspace-cloud-controller-manager
    # Empty follows Chart.appVersion; release packaging replaces it with the exact version.
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  priorityClassName: system-cluster-critical
  hostNetwork: true
  dnsPolicy: Default
  podAnnotations: {}
  podLabels: {}
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: node.cloudprovider.kubernetes.io/uninitialized
      operator: Exists
      effect: NoSchedule
    - key: node.kubernetes.io/not-ready
      operator: Exists
      effect: NoSchedule
  affinity: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
  extraArgs: []
  extraEnv: []

csi:
  enabled: true
  image:
    repository: ghcr.io/thanet-s/inspace-csi-driver
    # Empty follows Chart.appVersion; release packaging replaces it with the exact version.
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  controller:
    replicaCount: 1
    serviceAccount:
      create: true
      name: ""
      annotations: {}
    priorityClassName: system-cluster-critical
    podAnnotations: {}
    podLabels: {}
    nodeSelector:
      node-role.kubernetes.io/control-plane: "true"
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: node.cloudprovider.kubernetes.io/uninitialized
        operator: Exists
        effect: NoSchedule
    affinity: {}
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 256Mi
  node:
    serviceAccount:
      create: true
      name: ""
      annotations: {}
    priorityClassName: system-node-critical
    podAnnotations: {}
    podLabels: {}
    kubeletDir: /var/lib/kubelet
    nodeSelector: {}
    tolerations:
      - operator: Exists
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 256Mi
  sidecars:
    provisioner:
      image: registry.k8s.io/sig-storage/csi-provisioner:v5.2.0
      # Allow up to 120 seconds of CSI preflight before the driver's final
      # dispatch guard requires 480 seconds for the five-minute HTTP mutation,
      # two-minute destructive recovery, and one-minute persistence reserve.
      timeoutSeconds: 600
    attacher:
      image: registry.k8s.io/sig-storage/csi-attacher:v4.8.1
      # Uses the same 120-second preflight allowance and 480-second mandatory
      # dispatch reserve for attach and detach.
      timeoutSeconds: 600
    registrar:
      image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.13.0
    livenessProbe:
      image: registry.k8s.io/sig-storage/livenessprobe:v2.15.0
  storageClass:
    create: true
    name: inspace-rwo
    annotations: {}
    reclaimPolicy: Delete
    volumeBindingMode: WaitForFirstConsumer
    fsType: ext4

karpenter:
  enabled: true
  # Empty uses the Helm release namespace (recommended: install in kube-system
  # so exactly one cloud API Secret object is needed).
  namespace: ""
  createNamespace: false
  replicaCount: 1
  image:
    repository: ghcr.io/thanet-s/karpenter-provider-inspace
    # Empty follows Chart.appVersion; release packaging replaces it with the exact version.
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  clusterName: ""
  defaultNodeClass: ""
  # The provider only accepts this fixed Secret name and key. Creating it
  # outside Helm is preferred so the token is not stored in Helm release data.
  agentTokenSecret:
    create: false
    token: ""
  featureGates:
    reservedCapacity: true
    nodeOverlay: false
    staticCapacity: true
    spotToSpotConsolidation: false
    nodeRepair: false
    capacityBuffer: true
  logLevel: info
  priorityClassName: system-cluster-critical
  podAnnotations: {}
  podLabels: {}
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule
    - key: node.cloudprovider.kubernetes.io/uninitialized
      operator: Exists
      effect: NoSchedule
  affinity: {}
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  extraEnv: []
