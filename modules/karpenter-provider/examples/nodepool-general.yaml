apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: general
spec:
  limits:
    cpu: "64"
    memory: 128Gi
  template:
    spec:
      nodeClassRef:
        group: karpenter.inspace.cloud
        kind: InSpaceNodeClass
        name: ubuntu-workers
      requirements:
        - key: inspace.cloud/instance-family
          operator: In
          values: [general]
        # Allow either class in one pool. Constrain this list to one value when
        # a workload requires a specific hardware class.
        - key: inspace.cloud/host-class
          operator: In
          values: [intel-scalable, amd-epyc]
        # Numeric CPU cores and memory MiB support Gt/Lt/Gte/Lte.
        - key: inspace.cloud/instance-cpu
          operator: Gte
          values: ["4"]
        - key: inspace.cloud/instance-memory
          operator: Gte
          values: ["8192"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: [on-demand]
        - key: kubernetes.io/arch
          operator: In
          values: [amd64]
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 5m
    budgets:
      - nodes: "1"
