apiVersion: karpenter.inspace.cloud/v1alpha1
kind: InSpaceNodeClass
metadata:
  name: ubuntu-workers-amd
spec:
  clusterName: example-rke2
  billingAccountID: 12345
  location: bkk01
  networkUUID: 11111111-1111-4111-8111-111111111111
  # Replace with the exact inclusive private Service VIP range configured on
  # the controller. It must contain 16-256 usable VPC hosts, exclude the RKE2
  # supervisor and 10.42.0.0/16 + 10.43.0.0/16, and contain no VM addresses.
  privateLoadBalancerPool:
    start: 10.0.0.200
    stop: 10.0.0.219
  # InSpace has no managed NAT. This public address is egress-only; the cloud
  # firewall controls ingress and RKE2 uses the RFC1918 node IP. Keep the VPC
  # subnet disjoint from pod CIDR 10.42.0.0/16 and Service CIDR 10.43.0.0/16.
  reservePublicIPv4: true
  # Pre-create this default-deny firewall. Readiness requires all-port TCP,
  # UDP, and ICMP ingress from this VPC subnet and pod CIDR 10.42.0.0/16,
  # plus all three protocols outbound to any endpoint. No public inbound rule
  # is allowed. The provider never mutates firewall rules.
  firewallUUID: 22222222-2222-4222-8222-222222222222
  imageSelector:
    osName: ubuntu
    osVersion: "24.04"
  hostPoolSelector:
    class: amd-epyc
  rootDiskGiB: 40
  rke2:
    version: v1.35.6+rke2r1
    # Replace with the private RFC1918 supervisor VIP inside networkUUID. It
    # must not be a VM address or overlap 10.42.0.0/16 or 10.43.0.0/16.
    server: https://10.0.0.10:9345
    tokenSecretRef:
      name: inspace-rke2-agent-token
      key: token
