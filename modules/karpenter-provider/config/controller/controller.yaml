apiVersion: v1
kind: Namespace
metadata:
  name: karpenter
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: karpenter-inspace
  namespace: karpenter
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: karpenter-inspace
rules:
  # Karpenter core read permissions, pinned to the v1.14 controller contract.
  - apiGroups: [karpenter.sh]
    resources: [nodepools, nodepools/status, nodeclaims, nodeclaims/status, nodeoverlays, nodeoverlays/status]
    verbs: [get, list, watch]
  - apiGroups: [autoscaling.x-k8s.io]
    resources: [capacitybuffers, capacitybuffers/status]
    verbs: [get, list, watch, update, patch]
  - apiGroups: [""]
    resources: [pods, nodes, persistentvolumes, persistentvolumeclaims, replicationcontrollers, namespaces, podtemplates]
    verbs: [get, list, watch]
  - apiGroups: [storage.k8s.io]
    resources: [storageclasses, csinodes, volumeattachments]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [daemonsets, deployments, replicasets, statefulsets]
    verbs: [get, list, watch]
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [get, list, watch]
  - apiGroups: [policy]
    resources: [poddisruptionbudgets]
    verbs: [get, list, watch]
  # Karpenter core write permissions.
  - apiGroups: [karpenter.sh]
    resources: [nodeclaims, nodeclaims/status, nodeclaims/finalizers]
    verbs: [create, delete, update, patch]
  - apiGroups: [karpenter.sh]
    resources: [nodepools, nodepools/status, nodepools/finalizers, nodeoverlays/status]
    verbs: [update, patch]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [""]
    resources: [nodes]
    verbs: [create, patch, delete, update]
  - apiGroups: [""]
    resources: [pods/eviction]
    verbs: [create]
  - apiGroups: [""]
    resources: [pods]
    verbs: [delete]
  # InSpace NodeClass permissions.
  - apiGroups: [karpenter.inspace.cloud]
    resources: [inspacenodeclasses]
    verbs: [get, list, watch]
  - apiGroups: [karpenter.inspace.cloud]
    resources: [inspacenodeclasses/status]
    verbs: [get, patch, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: karpenter-inspace
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: karpenter-inspace
subjects:
  - kind: ServiceAccount
    name: karpenter-inspace
    namespace: karpenter
---
# Agent-token access and leader election are limited to the controller
# namespace. The cloud API Secret is deliberately not readable through RBAC.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: karpenter-inspace-controller
  namespace: karpenter
rules:
  - apiGroups: [""]
    resources: [secrets]
    resourceNames: [inspace-rke2-agent-token]
    verbs: [get]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, watch, create]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    resourceNames: [karpenter-leader-election]
    verbs: [patch, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: karpenter-inspace-controller
  namespace: karpenter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: karpenter-inspace-controller
subjects:
  - kind: ServiceAccount
    name: karpenter-inspace
    namespace: karpenter
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: karpenter-inspace-node-leases
  namespace: kube-node-lease
rules:
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: karpenter-inspace-node-leases
  namespace: kube-node-lease
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: karpenter-inspace-node-leases
subjects:
  - kind: ServiceAccount
    name: karpenter-inspace
    namespace: karpenter
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: karpenter-inspace-dns
  namespace: kube-system
rules:
  - apiGroups: [""]
    resources: [services]
    resourceNames: [kube-dns, coredns]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: karpenter-inspace-dns
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: karpenter-inspace-dns
subjects:
  - kind: ServiceAccount
    name: karpenter-inspace
    namespace: karpenter
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: karpenter-inspace
  namespace: karpenter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: karpenter-inspace
  template:
    metadata:
      labels:
        app.kubernetes.io/name: karpenter-inspace
    spec:
      serviceAccountName: karpenter-inspace
      containers:
        - name: controller
          image: ghcr.io/thanet-s/karpenter-provider-inspace:dev
          env:
            - name: INSPACE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: inspace-api
                  key: token
            - name: INSPACE_CLUSTER_NAME
              value: example-rke2
            - name: INSPACE_DEFAULT_NODECLASS
              value: ubuntu-workers
            - name: INSPACE_NETWORK_UUID
              value: 11111111-1111-4111-8111-111111111111
            - name: INSPACE_CONTROL_PLANE_VIP
              value: 10.0.0.10
            - name: INSPACE_PRIVATE_LOAD_BALANCER_POOL_START
              value: 10.0.0.200
            - name: INSPACE_PRIVATE_LOAD_BALANCER_POOL_STOP
              value: 10.0.0.219
            - name: INSPACE_SECRET_NAMESPACE
              value: karpenter
            - name: INSPACE_ALLOW_REMOTE_MUTATIONS
              value: "true"
            - name: LEADER_ELECTION_NAMESPACE
              value: karpenter
            - name: FEATURE_GATES
              value: StaticCapacity=true
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      # Keep autoscaler control loops on the fixed control-plane pool so worker
      # scale-down cannot evict the component responsible for provisioning.
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - key: node.cloudprovider.kubernetes.io/uninitialized
          operator: Exists
          effect: NoSchedule
