apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: inspaceclusters.infrastructure.inspace.cloud
spec:
  group: infrastructure.inspace.cloud
  names:
    kind: InSpaceCluster
    listKind: InSpaceClusterList
    plural: inspaceclusters
    singular: inspacecluster
    shortNames:
      - isc
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: Endpoint
          type: string
          jsonPath: .status.controlPlaneEndpoint
      schema:
        openAPIV3Schema:
          type: object
          required: [apiVersion, kind, metadata, spec]
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required: [location, billingAccountID, credentialsSecretRef, controlPlane, k3s, network, firewall, publicIPv4, endpoint]
              properties:
                location:
                  type: string
                  pattern: '^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?$'
                billingAccountID:
                  type: integer
                  format: int64
                  minimum: 1
                credentialsSecretRef:
                  type: object
                  required: [name, key]
                  properties:
                    name:
                      type: string
                      minLength: 1
                    key:
                      type: string
                      minLength: 1
                controlPlane:
                  type: object
                  required: [replicas, machine]
                  properties:
                    replicas:
                      type: integer
                      format: int32
                      minimum: 3
                      maximum: 3
                    machine:
                      type: object
                      required: [vcpu, memoryMiB, rootDiskGiB, hostPoolUUID, image]
                      properties:
                        vcpu:
                          type: integer
                          format: int32
                          minimum: 1
                          maximum: 16
                        memoryMiB:
                          type: integer
                          format: int32
                          minimum: 2048
                          maximum: 65536
                        rootDiskGiB:
                          type: integer
                          format: int32
                          minimum: 30
                          maximum: 2000
                        hostPoolUUID:
                          type: string
                          format: uuid
                        image:
                          type: object
                          required: [osName, osVersion]
                          properties:
                            osName:
                              type: string
                              enum: [ubuntu]
                            osVersion:
                              type: string
                              minLength: 1
                k3s:
                  type: object
                  required: [version, tokenSecretRef]
                  properties:
                    version:
                      type: string
                      minLength: 1
                    tokenSecretRef:
                      type: object
                      required: [name, key]
                      properties:
                        name:
                          type: string
                          minLength: 1
                        key:
                          type: string
                          minLength: 1
                    disable:
                      type: array
                      items:
                        type: string
                    tlsSubjectAltNames:
                      type: array
                      items:
                        type: string
                network:
                  type: object
                  required: [uuid, podCIDR, serviceCIDR]
                  x-kubernetes-validations:
                    - rule: 'self.podCIDR != self.serviceCIDR'
                      message: podCIDR and serviceCIDR must differ
                  properties:
                    uuid:
                      type: string
                      format: uuid
                    podCIDR:
                      type: string
                      format: cidr
                      enum: [10.42.0.0/16]
                    serviceCIDR:
                      type: string
                      format: cidr
                      enum: [10.43.0.0/16]
                firewall:
                  type: object
                  properties:
                    uuid:
                      type: string
                      format: uuid
                    managed:
                      type: boolean
                  x-kubernetes-validations:
                    - rule: '(has(self.uuid) && !has(self.managed)) || (!has(self.uuid) && has(self.managed) && self.managed)'
                      message: set exactly one of uuid or managed true
                publicIPv4:
                  type: object
                  required: [managed]
                  properties:
                    managed:
                      type: boolean
                      enum: [true]
                endpoint:
                  type: object
                  required: [host, port]
                  properties:
                    host:
                      type: string
                      minLength: 1
                    port:
                      type: integer
                      format: int32
                      minimum: 6443
                      maximum: 6443
                      default: 6443
                    public:
                      type: boolean
                      default: false
            status:
              type: object
              properties:
                ready:
                  type: boolean
                observedGeneration:
                  type: integer
                  format: int64
                controlPlaneEndpoint:
                  type: string
                message:
                  type: string
