apiVersion: v1
kind: ServiceAccount
metadata:
  name: inspace-cloud-controller-manager
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: system:inspace-cloud-controller-manager
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch", "update", "delete"]
  - apiGroups: [""]
    resources: ["nodes/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: [""]
    resources: ["services/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["karpenter.sh"]
    resources: ["nodepools"]
    verbs: ["get", "list", "create", "update", "delete"]
  - apiGroups: ["karpenter.sh"]
    resources: ["nodeclaims"]
    verbs: ["get", "list"]
  - apiGroups: ["karpenter.inspace.cloud"]
    resources: ["inspacenodeclasses"]
    verbs: ["get", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch", "update"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: system:inspace-cloud-controller-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:inspace-cloud-controller-manager
subjects:
  - kind: ServiceAccount
    name: inspace-cloud-controller-manager
    namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: inspace-cloud-controller-manager-auth-reader
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: extension-apiserver-authentication-reader
subjects:
  - kind: ServiceAccount
    name: inspace-cloud-controller-manager
    namespace: kube-system
---
# Replace placeholder values before applying. API credentials belong in the
# separately created inspace-cloud-credentials Secret, never this ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: inspace-cloud-config
  namespace: kube-system
data:
  location: bkk01
  region: thailand
  networkUUID: REPLACE_WITH_PRIVATE_NETWORK_UUID
  billingAccountID: "REPLACE_WITH_BILLING_ACCOUNT_ID"
  clusterID: REPLACE_WITH_STABLE_CLUSTER_ID
  controlPlaneVIP: REPLACE_WITH_CONTROL_PLANE_VIP
  privateLoadBalancerPoolStart: REPLACE_WITH_PRIVATE_LOAD_BALANCER_POOL_START
  privateLoadBalancerPoolStop: REPLACE_WITH_PRIVATE_LOAD_BALANCER_POOL_STOP
  nodeLoadBalancerDefaultNodeClass: REPLACE_WITH_DEFAULT_INSPACE_NODECLASS
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inspace-cloud-controller-manager
  namespace: kube-system
  labels:
    app.kubernetes.io/name: inspace-cloud-controller-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: inspace-cloud-controller-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inspace-cloud-controller-manager
    spec:
      serviceAccountName: inspace-cloud-controller-manager
      priorityClassName: system-cluster-critical
      hostNetwork: true
      dnsPolicy: Default
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node.cloudprovider.kubernetes.io/uninitialized
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoSchedule
      containers:
        - name: cloud-controller-manager
          image: ghcr.io/thanet-s/inspace-cloud-controller-manager:dev
          imagePullPolicy: IfNotPresent
          args:
            - --cloud-provider=inspace
            - --leader-elect=true
            - --configure-cloud-routes=false
            - --controllers=cloud-node-controller,cloud-node-lifecycle-controller,service-lb-controller
          env:
            - name: INSPACE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: inspace-cloud-credentials
                  key: apikey
            - name: INSPACE_API_URL
              value: https://api.inspace.cloud
            - name: INSPACE_ALLOW_REMOTE_MUTATIONS
              value: "true"
            - name: INSPACE_LOCATION
              valueFrom:
                configMapKeyRef:
                  name: inspace-cloud-config
                  key: location
            - name: INSPACE_REGION
              valueFrom:
                configMapKeyRef:
                  name: inspace-cloud-config
                  key: region
            - name: INSPACE_NETWORK_UUID
              valueFrom:
                configMapKeyRef:
                  name: inspace-cloud-config
                  key: networkUUID
            - name: INSPACE_BILLING_ACCOUNT_ID
              valueFrom:
                configMapKeyRef:
                  name: inspace-cloud-config
                  key: billingAccountID
                  optional: false
            - name: INSPACE_CLUSTER_ID
              valueFrom:
                configMapKeyRef:
                  name: inspace-cloud-config
                  key: clusterID
            - name: INSPACE_CONTROL_PLANE_VIP
              valueFrom:
                configMapKeyRef:
                  name: inspace-cloud-config
                  key: controlPlaneVIP
            - name: INSPACE_PRIVATE_LOAD_BALANCER_POOL_START
              valueFrom:
                configMapKeyRef:
                  name: inspace-cloud-config
                  key: privateLoadBalancerPoolStart
            - name: INSPACE_PRIVATE_LOAD_BALANCER_POOL_STOP
              valueFrom:
                configMapKeyRef:
                  name: inspace-cloud-config
                  key: privateLoadBalancerPoolStop
            - name: INSPACE_NODE_LOAD_BALANCER_ENABLED
              value: "true"
            - name: INSPACE_NODE_LOAD_BALANCER_DEFAULT_NODE_CLASS
              valueFrom:
                configMapKeyRef:
                  name: inspace-cloud-config
                  key: nodeLoadBalancerDefaultNodeClass
            - name: INSPACE_NODE_LOAD_BALANCER_NODES_PER_SHARD
              value: "1"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
