version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]
  - package-ecosystem: gomod
    directory: /modules/cloud-provider
    schedule:
      interval: weekly
    ignore:
      # Keep the CCM on the Kubernetes minor used by the K3s control plane.
      # Patch updates within the current minor remain enabled.
      - dependency-name: "k8s.io/*"
        update-types:
          - version-update:semver-minor
          - version-update:semver-major
    groups:
      go-dependencies:
        patterns: ["*"]
  - package-ecosystem: gomod
    directory: /modules/csi-driver
    schedule:
      interval: weekly
    groups:
      go-dependencies:
        patterns: ["*"]
  - package-ecosystem: gomod
    directory: /modules/karpenter-provider
    schedule:
      interval: weekly
    ignore:
      # Upgrade the Kubernetes and controller-runtime minor lines together as
      # an explicit platform change, not as an independent dependency bump.
      - dependency-name: "k8s.io/*"
        update-types:
          - version-update:semver-minor
          - version-update:semver-major
      - dependency-name: sigs.k8s.io/controller-runtime
        update-types:
          - version-update:semver-minor
          - version-update:semver-major
    groups:
      go-dependencies:
        patterns: ["*"]
  - package-ecosystem: docker
    directory: /modules/cloud-provider
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: /modules/csi-driver
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: /modules/karpenter-provider
    schedule:
      interval: weekly
