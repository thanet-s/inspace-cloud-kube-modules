name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go / ${{ matrix.module }}
    runs-on: ubuntu-26.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: client
            directory: modules/client
            cache_dependency_path: modules/client/go.mod
          - module: cloud-provider
            directory: modules/cloud-provider
            cache_dependency_path: modules/cloud-provider/go.sum
          - module: csi-driver
            directory: modules/csi-driver
            cache_dependency_path: modules/csi-driver/go.sum
          - module: karpenter-provider
            directory: modules/karpenter-provider
            cache_dependency_path: modules/karpenter-provider/go.sum
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: ${{ matrix.directory }}/go.mod
          cache: true
          cache-dependency-path: ${{ matrix.cache_dependency_path }}

      - name: Check formatting
        working-directory: ${{ matrix.directory }}
        shell: bash
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l .)"
          if [[ -n "$unformatted" ]]; then
            printf 'The following Go files are not formatted:\n%s\n' "$unformatted"
            exit 1
          fi

      - name: Test
        working-directory: ${{ matrix.directory }}
        env:
          GOWORK: "off"
        run: go test ./...

      - name: Vet
        working-directory: ${{ matrix.directory }}
        env:
          GOWORK: "off"
        run: go vet ./...

      - name: Build packages
        working-directory: ${{ matrix.directory }}
        env:
          GOWORK: "off"
        run: go build ./...

      - name: Scan for known vulnerabilities
        working-directory: ${{ matrix.directory }}
        env:
          GOWORK: "off"
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

  containers:
    name: Container / ${{ matrix.image }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-26.04-arm' || 'ubuntu-26.04' }}
    strategy:
      fail-fast: false
      # GitHub-hosted Ubuntu 26.04 runners are currently public preview.
      matrix:
        image:
          - inspace-cloud-controller-manager
          - inspace-csi-driver
          - karpenter-provider-inspace
        # InSpace currently offers x86_64 CPUs only. Set the repository variable
        # ENABLE_ARM64_IMAGES=true to restore native ARM64 image validation.
        arch: ${{ fromJSON(vars.ENABLE_ARM64_IMAGES == 'true' && '["amd64","arm64"]' || '["amd64"]') }}
        include:
          - image: inspace-cloud-controller-manager
            dockerfile: modules/cloud-provider/Dockerfile
          - image: inspace-csi-driver
            dockerfile: modules/csi-driver/Dockerfile
          - image: karpenter-provider-inspace
            dockerfile: modules/karpenter-provider/Dockerfile
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build linux/${{ matrix.arch }} image natively
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/${{ matrix.arch }}
          push: false
          load: true
          tags: local/${{ matrix.image }}:ci
          cache-from: type=gha,scope=ci-${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=ci-${{ matrix.image }}-${{ matrix.arch }}

      - name: Execute the native image entrypoint
        shell: bash
        run: |
          set -euo pipefail
          image='local/${{ matrix.image }}:ci'
          test "$(docker image inspect --format '{{.Architecture}}' "$image")" = "${{ matrix.arch }}"
          if [[ '${{ matrix.image }}' == karpenter-provider-inspace ]]; then
            set +e
            output="$(docker run --rm "$image" --help 2>&1)"
            rc=$?
            set -e
            test "$rc" -eq 1
            grep -F \
              'INSPACE_API_TOKEN, INSPACE_CLUSTER_NAME, INSPACE_DEFAULT_NODECLASS, INSPACE_NETWORK_UUID, and INSPACE_CONTROL_PLANE_VIP are required' \
              <<<"$output" >/dev/null
          else
            docker run --rm "$image" --help >/dev/null 2>&1
          fi

  helm:
    name: Helm
    runs-on: ubuntu-slim
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v4.2.3

      - name: Verify vendored CRDs
        shell: bash
        run: |
          set -euo pipefail
          for directory in \
            modules/client \
            modules/cloud-provider \
            modules/csi-driver \
            modules/karpenter-provider \
            charts/inspace-cloud-kube-modules \
            charts/inspace-cloud-kube-modules-crds; do
            cmp LICENSE "$directory/LICENSE"
            cmp NOTICE "$directory/NOTICE"
          done
          sha256sum --check <<'EOF'
          66fd5680b902b38fb9657ad2b432196a06c42b37d078e53be2e39909200a6342  charts/inspace-cloud-kube-modules-crds/templates/autoscaling.x-k8s.io_capacitybuffers.yaml
          712e207ad9da26b95717b82bff8bc89a2b5fc048309f97207e407788b426faf9  charts/inspace-cloud-kube-modules-crds/templates/karpenter.sh_nodeclaims.yaml
          f65f0f3edd3afe96dc2b6b4fa648982dab557af077d7ab22e6ec26207b6465ed  charts/inspace-cloud-kube-modules-crds/templates/karpenter.sh_nodeoverlays.yaml
          62990043212a239704c0195bbd37abd0fddad90a586f5b37dfb403a0a0aefe1e  charts/inspace-cloud-kube-modules-crds/templates/karpenter.sh_nodepools.yaml
          EOF
          cmp modules/cloud-provider/config/crd/bases/infrastructure.inspace.cloud_inspaceclusters.yaml \
            charts/inspace-cloud-kube-modules-crds/templates/infrastructure.inspace.cloud_inspaceclusters.yaml
          cmp modules/karpenter-provider/config/crd/bases/karpenter.inspace.cloud_inspacenodeclasses.yaml \
            charts/inspace-cloud-kube-modules-crds/templates/karpenter.inspace.cloud_inspacenodeclasses.yaml
          crd_count="$(grep -h -c '^kind: CustomResourceDefinition$' charts/inspace-cloud-kube-modules-crds/templates/*.yaml \
            | awk '{ total += $1 } END { print total }')"
          test "$crd_count" = "6"

      - name: Lint charts
        run: |
          helm lint charts/inspace-cloud-kube-modules-crds
          helm lint charts/inspace-cloud-kube-modules \
            --values charts/inspace-cloud-kube-modules/ci/test-values.yaml

      - name: Render charts
        run: |
          helm template ci-crds charts/inspace-cloud-kube-modules-crds \
            --include-crds >/tmp/inspace-crds.yaml
          helm template ci charts/inspace-cloud-kube-modules \
            --namespace kube-system \
            --values charts/inspace-cloud-kube-modules/ci/test-values.yaml \
            >/tmp/inspace.yaml
          helm template ci-split charts/inspace-cloud-kube-modules \
            --namespace kube-system \
            --values charts/inspace-cloud-kube-modules/ci/test-values.yaml \
            --set karpenter.namespace=karpenter \
            --set karpenter.createNamespace=true \
            >/tmp/inspace-split-namespace.yaml
          ./scripts/verify-bootstrap-manifests.sh

      - name: Validate Docker-only E2E launcher syntax
        run: bash -n test/e2e/run.sh

  e2e-harness:
    name: E2E harness
    runs-on: ubuntu-26.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build the container-only Ansible runner
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: test/e2e/Dockerfile
          target: local-validation
          load: true
          tags: local/inspace-rke2-e2e:ci
          cache-from: type=gha,scope=ci-e2e-harness-amd64
          cache-to: type=gha,mode=max,scope=ci-e2e-harness-amd64

      - name: Verify Ansible and runner syntax without live mutations
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm --entrypoint /bin/bash local/inspace-rke2-e2e:ci -ceu '
            python3 /opt/e2e/verify-static.py
            for script in /opt/e2e/scripts/*.sh; do bash -n "$script"; done
            ansible-inventory --inventory /opt/e2e/inventory.yml --list >/dev/null
            ansible-playbook --inventory /opt/e2e/inventory.yml /opt/e2e/playbook.yml --syntax-check
            ansible-playbook --inventory /opt/e2e/inventory.yml /opt/e2e/cleanup.yml --syntax-check
          '
