name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  # Stable releases update shared major, minor, and latest tags; serialize all
  # releases so a prerelease cannot race a stable manifest publication.
  group: release
  cancel-in-progress: false

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-slim
    outputs:
      version: ${{ steps.semver.outputs.version }}
      prerelease: ${{ steps.semver.outputs.prerelease }}
      arm64_images: ${{ steps.platforms.outputs.arm64_images }}
    steps:
      - name: Require a SemVer tag without build metadata
        id: semver
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Docker tags cannot preserve SemVer's '+' build-metadata separator,
          # so accepting it would make image and chart versions disagree.
          if [[ ! "$TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must be valid SemVer prefixed with v and without build metadata; got $TAG" >&2
            exit 1
          fi
          version="${TAG#v}"
          echo "version=$version" >>"$GITHUB_OUTPUT"
          if [[ "$version" == *-* ]]; then
            echo "prerelease=true" >>"$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >>"$GITHUB_OUTPUT"
          fi

      - name: Select release image platforms
        id: platforms
        shell: bash
        env:
          ENABLE_ARM64_IMAGES: ${{ vars.ENABLE_ARM64_IMAGES }}
        run: |
          set -euo pipefail
          arm64_images=false
          if [[ "$ENABLE_ARM64_IMAGES" == "true" ]]; then
            arm64_images=true
          fi
          echo "arm64_images=$arm64_images" >>"$GITHUB_OUTPUT"
          echo "ARM64 image publication: $arm64_images"

      - name: Refuse to republish a completed release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          error_file="$(mktemp)"
          if draft="$(gh api "repos/$GH_REPO/releases/tags/$TAG" --jq .draft 2>"$error_file")"; then
            if [[ "$draft" != "true" ]]; then
              echo "Release $TAG already exists and is not a recoverable draft" >&2
              exit 1
            fi
          elif ! grep -q 'HTTP 404' "$error_file"; then
            cat "$error_file" >&2
            echo "Could not determine whether release $TAG already exists" >&2
            exit 1
          fi

      - name: Check out source history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Require a tag reachable from main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin '+refs/heads/main:refs/remotes/origin/main'
          if ! git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            echo "Release tag target must be reachable from main" >&2
            exit 1
          fi

  quality:
    name: Release quality gate
    uses: ./.github/workflows/ci.yaml

  image-platforms:
    name: Native image / ${{ matrix.image }} / ${{ matrix.arch }}
    needs: [validate, quality]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-26.04-arm' || 'ubuntu-26.04' }}
    permissions:
      contents: read
      packages: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      # GitHub-hosted Ubuntu 26.04 runners are currently public preview.
      matrix:
        # InSpace currently offers x86-64 CPUs. Keep native ARM64 publication
        # available without paying its release cost until it is needed.
        image:
          - inspace-cloud-controller-manager
          - inspace-csi-driver
          - karpenter-provider-inspace
        arch: ${{ fromJSON(needs.validate.outputs.arm64_images == 'true' && '["amd64","arm64"]' || '["amd64"]') }}
        include:
          - image: inspace-cloud-controller-manager
            title: InSpace Cloud Controller Manager
            description: External Kubernetes cloud controller manager for InSpace Cloud
            context: .
            dockerfile: modules/cloud-provider/Dockerfile
          - image: inspace-csi-driver
            title: InSpace CSI Driver
            description: Kubernetes RWO block storage CSI driver for InSpace Cloud
            context: .
            dockerfile: modules/csi-driver/Dockerfile
          - image: karpenter-provider-inspace
            title: Karpenter Provider for InSpace Cloud
            description: Karpenter provider for elastic RKE2 workers on InSpace Cloud
            context: .
            dockerfile: modules/karpenter-provider/Dockerfile
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ needs.validate.outputs.prerelease == 'false' }}
            type=semver,pattern={{major}},enable=${{ needs.validate.outputs.prerelease == 'false' && !startsWith(github.ref, 'refs/tags/v0.') }}
            type=raw,value=latest,enable=${{ needs.validate.outputs.prerelease == 'false' }}
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.version=${{ needs.validate.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push linux/${{ matrix.arch }} image by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/${{ matrix.arch }}
          build-args: VERSION=${{ needs.validate.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: false
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}

      - name: Record platform digest marker
        shell: bash
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          digest="${DIGEST#sha256:}"
          if [[ ! "$digest" =~ ^[0-9a-f]{64}$ ]]; then
            echo "build returned an invalid image digest" >&2
            exit 1
          fi
          mkdir -p platform-digest
          : >"platform-digest/$digest"

      - name: Upload platform digest marker
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: platform-digest-${{ matrix.image }}-${{ matrix.arch }}
          path: platform-digest/
          if-no-files-found: error
          retention-days: 7

  images:
    name: Image / ${{ matrix.image }}
    needs: [validate, image-platforms]
    runs-on: ubuntu-26.04
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: inspace-cloud-controller-manager
            title: InSpace Cloud Controller Manager
            description: External Kubernetes cloud controller manager for InSpace Cloud
          - image: inspace-csi-driver
            title: InSpace CSI Driver
            description: Kubernetes RWO block storage CSI driver for InSpace Cloud
          - image: karpenter-provider-inspace
            title: Karpenter Provider for InSpace Cloud
            description: Karpenter provider for elastic RKE2 workers on InSpace Cloud
    steps:
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ needs.validate.outputs.prerelease == 'false' }}
            type=semver,pattern={{major}},enable=${{ needs.validate.outputs.prerelease == 'false' && !startsWith(github.ref, 'refs/tags/v0.') }}
            type=raw,value=latest,enable=${{ needs.validate.outputs.prerelease == 'false' }}
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.version=${{ needs.validate.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Download platform digest markers
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: platform-digest-${{ matrix.image }}-*
          path: /tmp/platform-digests
          merge-multiple: true

      - name: Merge and tag multi-platform image
        id: merge
        shell: bash
        env:
          ENABLE_ARM64_IMAGES: ${{ needs.validate.outputs.arm64_images }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          METADATA_JSON: ${{ steps.meta.outputs.json }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          expected_arches=(amd64)
          if [[ "$ENABLE_ARM64_IMAGES" == "true" ]]; then
            expected_arches+=(arm64)
          fi
          expected_platforms="${#expected_arches[@]}"

          digest_files=(/tmp/platform-digests/*)
          if (( ${#digest_files[@]} != expected_platforms )); then
            echo "expected $expected_platforms platform digest(s), found ${#digest_files[@]}" >&2
            exit 1
          fi

          tags=()
          tag_args=()
          while IFS= read -r tag; do
            if [[ -n "$tag" ]]; then
              tags+=("$tag")
              tag_args+=(--tag "$tag")
            fi
          done < <(jq -r '.tags[]' <<<"$METADATA_JSON")
          if (( ${#tags[@]} == 0 )); then
            echo "image metadata produced no tags" >&2
            exit 1
          fi

          source_args=()
          for digest_file in "${digest_files[@]}"; do
            digest="$(basename "$digest_file")"
            if [[ ! "$digest" =~ ^[0-9a-f]{64}$ ]]; then
              echo "invalid platform digest marker: $digest" >&2
              exit 1
            fi
            source_args+=("$IMAGE@sha256:$digest")
          done

          metadata_file="$(mktemp)"
          converged=false
          final_digest=""
          for attempt in $(seq 1 6); do
            : >"$metadata_file"
            if ! docker buildx imagetools create \
              --metadata-file "$metadata_file" \
              "${tag_args[@]}" \
              "${source_args[@]}"; then
              echo "GHCR has not accepted the platform manifests (attempt $attempt/6)" >&2
              sleep $((attempt * 5))
              continue
            fi

            final_digest="$(jq -r \
              '."containerimage.digest" // ."containerimage.descriptor".digest // .digest // empty' \
              "$metadata_file")"
            if [[ ! "$final_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "imagetools returned an invalid final digest" >&2
              exit 1
            fi

            if ! docker buildx imagetools inspect "$IMAGE@$final_digest" --raw \
              >/tmp/final-index.json; then
              echo "GHCR cannot read the merged digest yet (attempt $attempt/6)" >&2
              sleep $((attempt * 5))
              continue
            fi

            valid_index=true
            linux_platforms="$(jq \
              '[.manifests[]? | select(.platform.os == "linux")] | length' \
              /tmp/final-index.json)"
            if (( linux_platforms != expected_platforms )); then
              echo "merged image index has $linux_platforms Linux platform(s); expected $expected_platforms" >&2
              valid_index=false
            fi
            for arch in "${expected_arches[@]}"; do
              arch_count="$(jq --arg arch "$arch" \
                '[.manifests[]? | select(.platform.os == "linux" and .platform.architecture == $arch)] | length' \
                /tmp/final-index.json)"
              if (( arch_count != 1 )); then
                echo "merged image index has $arch_count linux/$arch manifest(s); expected one" >&2
                valid_index=false
                continue
              fi
              arch_digest="$(jq -r --arg arch "$arch" \
                '.manifests[]? | select(.platform.os == "linux" and .platform.architecture == $arch) | .digest' \
                /tmp/final-index.json)"
              arch_sbom_count="$(jq --arg digest "$arch_digest" \
                '[.manifests[]? | select(
                  .annotations["vnd.docker.reference.type"] == "attestation-manifest" and
                  .annotations["vnd.docker.reference.digest"] == $digest
                )] | length' \
                /tmp/final-index.json)"
              if (( arch_sbom_count != 1 )); then
                echo "merged image index has $arch_sbom_count SBOM attestation(s) for linux/$arch; expected one" >&2
                valid_index=false
              fi
            done
            sbom_count="$(jq \
              '[.manifests[]? | select(.annotations["vnd.docker.reference.type"] == "attestation-manifest")] | length' \
              /tmp/final-index.json)"
            if (( sbom_count != expected_platforms )); then
              echo "merged image index retained $sbom_count SBOM attestation(s); expected $expected_platforms" >&2
              valid_index=false
            fi

            expected_hash="${final_digest#sha256:}"
            for tag in "${tags[@]}"; do
              tag_index="$(mktemp)"
              if ! docker buildx imagetools inspect "$tag" --raw >"$tag_index"; then
                echo "GHCR cannot read tag $tag yet" >&2
                valid_index=false
                rm -f "$tag_index"
                continue
              fi
              actual_hash="$(sha256sum "$tag_index" | awk '{ print $1 }')"
              rm -f "$tag_index"
              if [[ "$actual_hash" != "$expected_hash" ]]; then
                echo "GHCR tag $tag has not converged to $final_digest" >&2
                valid_index=false
              fi
            done

            if [[ "$valid_index" == "true" ]]; then
              converged=true
              break
            fi
            echo "GHCR has not converged for the merged image (attempt $attempt/6)" >&2
            sleep $((attempt * 5))
          done
          if [[ "$converged" != "true" ]]; then
            echo "failed to publish and read back every tag for $IMAGE" >&2
            exit 1
          fi
          echo "digest=$final_digest" >>"$GITHUB_OUTPUT"

      - name: Attest final image-index provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          subject-digest: ${{ steps.merge.outputs.digest }}
          push-to-registry: true

      - name: Record immutable image digest
        shell: bash
        env:
          DIGEST: ${{ steps.merge.outputs.digest }}
          IMAGE: ${{ matrix.image }}
        run: |
          set -euo pipefail
          mkdir -p image-digests
          printf 'ghcr.io/%s/%s@%s\n' "$GITHUB_REPOSITORY_OWNER" "$IMAGE" "$DIGEST" \
            >"image-digests/$IMAGE.txt"

      - name: Upload image digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-digest-${{ matrix.image }}
          path: image-digests/${{ matrix.image }}.txt
          if-no-files-found: error
          retention-days: 7

  charts:
    name: OCI Helm charts
    needs: [validate, quality]
    runs-on: ubuntu-26.04
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v4.2.3

      - name: Log in to GHCR
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "$GH_TOKEN" | helm registry login ghcr.io \
            --username "${GITHUB_ACTOR}" \
            --password-stdin

      - name: Lint, package, and push charts
        shell: bash
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          mkdir -p dist
          values_file=charts/inspace-cloud-kube-modules/values.yaml
          if [[ "$(grep -Ec '^    tag: ""$' "$values_file")" -ne 3 ]]; then
            echo "expected exactly three release-managed empty image tags" >&2
            exit 1
          fi
          sed -i "s/^    tag: \"\"$/    tag: \"$VERSION\"/" "$values_file"
          if [[ "$(grep -Fxc "    tag: \"$VERSION\"" "$values_file")" -ne 3 ]]; then
            echo "failed to pin every controller image tag to $VERSION" >&2
            exit 1
          fi
          helm lint charts/inspace-cloud-kube-modules-crds
          helm lint charts/inspace-cloud-kube-modules \
            --values charts/inspace-cloud-kube-modules/ci/test-values.yaml
          helm package charts/inspace-cloud-kube-modules-crds \
            --version "$VERSION" \
            --app-version 1.14.0 \
            --destination dist
          helm package charts/inspace-cloud-kube-modules \
            --version "$VERSION" \
            --app-version "$VERSION" \
            --destination dist
          if [[ "$(helm show values "dist/inspace-cloud-kube-modules-$VERSION.tgz" | \
            grep -Fxc "    tag: \"$VERSION\"")" -ne 3 ]]; then
            echo "packaged chart does not pin every controller image tag to $VERSION" >&2
            exit 1
          fi
          charts=(
            "inspace-cloud-kube-modules-crds|dist/inspace-cloud-kube-modules-crds-$VERSION.tgz"
            "inspace-cloud-kube-modules|dist/inspace-cloud-kube-modules-$VERSION.tgz"
          )
          for chart in "${charts[@]}"; do
            chart_name="${chart%%|*}"
            package="${chart#*|}"
            published=false
            for attempt in $(seq 1 6); do
              if helm push "$package" "oci://ghcr.io/$owner/charts"; then
                for read_attempt in $(seq 1 6); do
                  if helm show chart "oci://ghcr.io/$owner/charts/$chart_name" \
                    --version "$VERSION" >/dev/null; then
                    published=true
                    break
                  fi
                  sleep $((read_attempt * 5))
                done
              fi
              [[ "$published" == true ]] && break
              echo "OCI registry has not converged for $chart_name (attempt $attempt/6)" >&2
              sleep $((attempt * 5))
            done
            if [[ "$published" != true ]]; then
              echo "failed to publish and read back $chart_name:$VERSION" >&2
              exit 1
            fi
          done
          (
            cd dist
            sha256sum ./*.tgz >SHA256SUMS
          )

      - name: Attest Helm chart packages
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: dist/*.tgz

      - name: Upload chart packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: helm-charts
          path: dist/
          if-no-files-found: error
          retention-days: 7

  github-release:
    name: GitHub release
    needs: [validate, images, charts]
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download chart packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: helm-charts
          path: dist

      - name: Download image digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: image-digest-*
          path: dist
          merge-multiple: true

      - name: Create immutable release from a draft
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PRERELEASE: ${{ needs.validate.outputs.prerelease }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          existing="$(gh release view "$TAG" --json isDraft --jq .isDraft 2>/dev/null || true)"
          if [[ -n "$existing" && "$existing" != "true" ]]; then
            echo "Release $TAG already exists and is not a recoverable draft" >&2
            exit 1
          fi
          if [[ -z "$existing" ]]; then
            flags=(--verify-tag --generate-notes --draft --title "InSpace Cloud Kubernetes Modules $TAG")
            if [[ "$PRERELEASE" == "true" ]]; then
              flags+=(--prerelease)
            fi
            gh release create "$TAG" "${flags[@]}"
          fi

          generated_notes="$(mktemp)"
          filtered_notes="$(mktemp)"
          trap 'rm -f "$generated_notes" "$filtered_notes"' EXIT
          gh release view "$TAG" --json body --jq .body >"$generated_notes"
          awk -f scripts/filter-release-notes.awk "$generated_notes" >"$filtered_notes"
          if [[ ! -s "$filtered_notes" ]]; then
            echo "Refusing to publish $TAG with empty release notes" >&2
            exit 1
          fi
          if ! cmp -s "$generated_notes" "$filtered_notes"; then
            gh release edit "$TAG" --notes-file "$filtered_notes"
          fi

          gh release upload "$TAG" dist/* --clobber
          gh release edit "$TAG" --draft=false
