name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      prerelease: ${{ steps.semver.outputs.prerelease }}
    steps:
      - name: Require a SemVer tag
        id: semver
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "$TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must be valid SemVer prefixed with v; got $TAG" >&2
            exit 1
          fi
          version="${TAG#v}"
          echo "version=$version" >>"$GITHUB_OUTPUT"
          if [[ "$version" == *-* ]]; then
            echo "prerelease=true" >>"$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >>"$GITHUB_OUTPUT"
          fi

      - name: Check out source history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Require a tag reachable from main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin '+refs/heads/main:refs/remotes/origin/main'
          if ! git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            echo "Release tag target must be reachable from main" >&2
            exit 1
          fi

  quality:
    name: Release quality gate
    uses: ./.github/workflows/ci.yaml

  images:
    name: Image / ${{ matrix.image }}
    needs: [validate, quality]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: inspace-cloud-controller-manager
            title: InSpace Cloud Controller Manager
            description: External Kubernetes cloud controller manager for InSpace Cloud
            context: modules/cloud-provider-inspace
            dockerfile: modules/cloud-provider-inspace/Dockerfile
          - image: inspace-csi-driver
            title: InSpace CSI Driver
            description: Kubernetes RWO block storage CSI driver for InSpace Cloud
            context: .
            dockerfile: modules/inspace-csi-driver/Dockerfile
          - image: karpenter-provider-inspace
            title: Karpenter Provider for InSpace Cloud
            description: Karpenter provider for elastic K3s workers on InSpace Cloud
            context: .
            dockerfile: modules/karpenter-provider-inspace/Dockerfile
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=raw,value=latest,enable=${{ needs.validate.outputs.prerelease == 'false' }}
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.version=${{ needs.validate.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push multi-platform image
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: false
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Attest image provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Record immutable image digest
        shell: bash
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          IMAGE: ${{ matrix.image }}
        run: |
          set -euo pipefail
          mkdir -p image-digests
          printf 'ghcr.io/%s/%s@%s\n' "$GITHUB_REPOSITORY_OWNER" "$IMAGE" "$DIGEST" \
            >"image-digests/$IMAGE.txt"

      - name: Upload image digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-digest-${{ matrix.image }}
          path: image-digests/${{ matrix.image }}.txt
          if-no-files-found: error
          retention-days: 7

  charts:
    name: OCI Helm charts
    needs: [validate, quality]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v4.2.3

      - name: Log in to GHCR
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "$GH_TOKEN" | helm registry login ghcr.io \
            --username "${GITHUB_ACTOR}" \
            --password-stdin

      - name: Lint, package, and push charts
        shell: bash
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          mkdir -p dist
          helm lint charts/inspace-cloud-kube-modules-crds
          helm lint charts/inspace-cloud-kube-modules \
            --values charts/inspace-cloud-kube-modules/ci/test-values.yaml
          helm package charts/inspace-cloud-kube-modules-crds \
            --version "$VERSION" \
            --app-version 1.14.0 \
            --destination dist
          helm package charts/inspace-cloud-kube-modules \
            --version "$VERSION" \
            --app-version "$VERSION" \
            --destination dist
          for package in dist/*.tgz; do
            helm push "$package" "oci://ghcr.io/$owner/charts"
          done
          (
            cd dist
            sha256sum ./*.tgz >SHA256SUMS
          )

      - name: Attest Helm chart packages
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: dist/*.tgz

      - name: Upload chart packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: helm-charts
          path: dist/
          if-no-files-found: error
          retention-days: 7

  github-release:
    name: GitHub release
    needs: [validate, images, charts]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download chart packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: helm-charts
          path: dist

      - name: Download image digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: image-digest-*
          path: dist
          merge-multiple: true

      - name: Create immutable release from a draft
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PRERELEASE: ${{ needs.validate.outputs.prerelease }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          existing="$(gh release view "$TAG" --json isDraft --jq .isDraft 2>/dev/null || true)"
          if [[ -n "$existing" && "$existing" != "true" ]]; then
            echo "Release $TAG already exists and is not a recoverable draft" >&2
            exit 1
          fi
          if [[ -z "$existing" ]]; then
            flags=(--verify-tag --generate-notes --draft --title "InSpace Cloud Kubernetes Modules $TAG")
            if [[ "$PRERELEASE" == "true" ]]; then
              flags+=(--prerelease)
            fi
            gh release create "$TAG" "${flags[@]}"
          fi
          gh release upload "$TAG" dist/* --clobber
          gh release edit "$TAG" --draft=false
