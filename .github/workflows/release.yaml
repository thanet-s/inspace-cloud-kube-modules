name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      prerelease: ${{ steps.semver.outputs.prerelease }}
    steps:
      - name: Require a SemVer tag
        id: semver
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "$TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must be valid SemVer prefixed with v; got $TAG" >&2
            exit 1
          fi
          version="${TAG#v}"
          echo "version=$version" >>"$GITHUB_OUTPUT"
          if [[ "$version" == *-* ]]; then
            echo "prerelease=true" >>"$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >>"$GITHUB_OUTPUT"
          fi

  images:
    name: Image / ${{ matrix.image }}
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: inspace-cloud-controller-manager
            title: InSpace Cloud Controller Manager
            description: External Kubernetes cloud controller manager for InSpace Cloud
            context: cloud-provider-inspace
            dockerfile: cloud-provider-inspace/Dockerfile
          - image: inspace-csi-driver
            title: InSpace CSI Driver
            description: Kubernetes RWO block storage CSI driver for InSpace Cloud
            context: .
            dockerfile: inspace-csi-driver/Dockerfile
          - image: karpenter-provider-inspace
            title: Karpenter Provider for InSpace Cloud
            description: Karpenter provider for elastic K3s workers on InSpace Cloud
            context: .
            dockerfile: karpenter-provider-inspace/Dockerfile
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ needs.validate.outputs.prerelease == 'false' }}
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.version=${{ needs.validate.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push multi-platform image
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: false
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Attest image provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  charts:
    name: OCI Helm charts
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Helm
        uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a # v4
        with:
          version: v4.2.3

      - name: Log in to GHCR
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "$GH_TOKEN" | helm registry login ghcr.io \
            --username "${GITHUB_ACTOR}" \
            --password-stdin

      - name: Lint, package, and push charts
        shell: bash
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          mkdir -p dist
          helm lint charts/inspace-cloud-kube-modules-crds
          helm lint charts/inspace-cloud-kube-modules \
            --values charts/inspace-cloud-kube-modules/ci/test-values.yaml
          helm package charts/inspace-cloud-kube-modules-crds \
            --version "$VERSION" \
            --app-version 1.14.0 \
            --destination dist
          helm package charts/inspace-cloud-kube-modules \
            --version "$VERSION" \
            --app-version "$VERSION" \
            --destination dist
          for package in dist/*.tgz; do
            helm push "$package" "oci://ghcr.io/$owner/charts"
          done
          (
            cd dist
            sha256sum ./*.tgz >SHA256SUMS
          )

      - name: Upload chart packages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: helm-charts
          path: dist/
          if-no-files-found: error
          retention-days: 7

  github-release:
    name: GitHub release
    needs: [validate, images, charts]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download chart packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: helm-charts
          path: dist

      - name: Create release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PRERELEASE: ${{ needs.validate.outputs.prerelease }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          flags=(--verify-tag --generate-notes --title "InSpace Cloud Kubernetes Modules $TAG")
          if [[ "$PRERELEASE" == "true" ]]; then
            flags+=(--prerelease)
          fi
          gh release create "$TAG" dist/* "${flags[@]}"
